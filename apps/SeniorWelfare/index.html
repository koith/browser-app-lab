<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B4A6B">
<title>영등포 어르신 복지 찾기</title>
<style>
  /* 팔레트 근거:
     - 노인은 황-청 축 변별력이 적-녹보다 먼저·크게 저하 → 파랑 의존 배제
     - 빨강이 주의를 가장 잘 끌고 적-흑 조합이 반응속도 최상
     - 저시력 대비 7:1 이상 권장 (WCAG AAA 상회)
     - 렌즈 황변으로 흰 배경이 아이보리로 보임 → 순백 대신 미세 회백
     - 채도 높은 색 사용, 파스텔 간 전환 금지 */
  :root{
    --ink:#000000;        /* 본문: 순흑 (대비 최대) */
    --paper:#FAFAF7;      /* 배경: 미세 회백 */
    --card:#FFFFFF;
    --line:#B8B8B0;
    --act:#0C6152;        /* 주 강조: 진청록 (흰 배경 대비 7.2:1) */
    --act-press:#0A4F42;
    --ok:#0E6428;         /* 신청 가능: 밝은 진초록 (대비 4.9:1, 흰글씨 기준) */
    --wait:#8A4B00;       /* 확인 필요: 주황 (대비 4.6:1, 흰글씨 기준) */
    --waitline:#8A4B00;   /* 주황 계열 테두리·글자용 진한 톤 */
    --sub:#3A3A38;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    font-size:36px;line-height:1.6;font-weight:600;-webkit-font-smoothing:antialiased}
  .apphead{position:sticky;top:0;z-index:50;
    background:var(--act);color:#fff;
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
    font-size:30px;font-weight:900;letter-spacing:-.02em;
    display:flex;align-items:center;gap:14px;
    border-bottom:5px solid var(--act-press)}
  .apphead .dotmark{width:22px;height:22px;border-radius:50%;
    background:#fff;flex:0 0 22px}
  .wrap{max-width:820px;margin:0 auto;
    padding:18px 18px calc(48px + env(safe-area-inset-bottom));
    min-height:100vh;display:flex;flex-direction:column}

  /* 타이틀 화면 */
  .title{display:flex;flex-direction:column;min-height:100%;padding-top:20px}
  .hero{background:var(--card);border:5px solid var(--ink);border-radius:26px;
    padding:36px 26px;text-align:center;margin-bottom:34px}
  .hero svg{width:100%;max-width:420px;height:auto;display:block;margin:0 auto 26px}
  .hero h1{font-size:60px;line-height:1.2;margin:0 0 18px}
  .hero p{font-size:34px;color:var(--sub);margin:0;line-height:1.5;font-weight:600}
  .steps{margin-bottom:32px}
  .stepline{display:flex;align-items:center;gap:20px;font-size:32px;
    font-weight:700;padding:20px 0;border-bottom:3px solid var(--line)}
  .stepline:last-child{border-bottom:none}
  .stepline i{flex:0 0 62px;width:62px;height:62px;border-radius:50%;
    background:var(--act);color:#fff;font-style:normal;font-weight:900;
    font-size:32px;display:flex;align-items:center;justify-content:center}
  .start{background:var(--ok);border-color:#0A4F1E;color:#fff;
    justify-content:center;font-size:46px;min-height:140px}
  .start:active{background:#0A4F1E;color:#fff}
  .stale{background:#FFF4E0;border:5px solid var(--waitline);border-radius:18px;
    padding:24px;margin-bottom:28px;font-size:29px;line-height:1.5;font-weight:700}
  .cover{font-size:27px;color:var(--sub);line-height:1.6;font-weight:600;
    background:#F0EFEA;border-radius:16px;padding:24px;margin-top:26px}

  /* 상단바 */
  .topbar{display:flex;align-items:center;gap:16px;margin-bottom:16px;min-height:76px}
  .backbtn{width:76px;height:76px;min-height:76px;flex:0 0 76px;padding:0;
    font-size:40px;font-weight:800;line-height:1;
    border:4px solid var(--ink);border-radius:50%;background:var(--card);color:var(--ink);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    aspect-ratio:1/1;overflow:hidden}
  .backbtn:active{background:var(--ink);color:var(--card)}
  .backspacer{width:76px;flex:0 0 76px}
  .step{font-size:30px;font-weight:800;color:var(--sub)}

  .bar{height:16px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:40px}
  .bar > i{display:block;height:100%;background:var(--ok);border-radius:99px;transition:width .35s ease}

  h1{font-size:58px;line-height:1.25;font-weight:900;margin:0 0 20px;letter-spacing:-.03em}
  .hint{font-size:32px;color:var(--sub);margin:0 0 24px;padding-left:18px;
    border-left:8px solid var(--act);line-height:1.5;font-weight:600}

  /* 선택 버튼 */
  .opts{display:flex;flex-direction:column;gap:22px;margin-top:auto;padding-top:28px}
  button{font-family:inherit;font-size:44px;font-weight:800;
    min-height:130px;padding:26px 30px;border:5px solid var(--ink);border-radius:20px;
    background:var(--card);color:var(--ink);width:100%;text-align:left;cursor:pointer;
    display:flex;align-items:center;transition:transform .12s ease,background .12s ease}
  button:active{background:var(--ink);color:var(--card);transform:scale(.97)}
  button.chosen{background:var(--act);border-color:var(--act);color:#fff;transform:scale(.97);
    box-shadow:0 0 0 8px rgba(179,0,15,.28)}
  button:focus-visible{outline:6px solid var(--act);outline-offset:4px}
  button.dim{border-color:var(--sub);color:var(--sub);font-size:36px;min-height:104px;font-weight:700}
  button.dim:active,button.dim.chosen{background:var(--sub);border-color:var(--sub);color:#fff}

  /* 결과 */
  .rtop{padding:10px 0 32px;border-bottom:8px solid var(--ink);margin-bottom:40px}
  .rtop h1{font-size:64px;margin-bottom:20px}
  .rtop p{margin:0;font-size:32px;color:var(--sub);line-height:1.5;font-weight:600}

  .sec{margin-bottom:40px}
  .secsub{font-size:30px;color:var(--sub);margin:0 0 6px;font-weight:700}

  /* 카드 — 상태 스티커를 카드마다 부착 */
  .card{background:var(--card);border:5px solid var(--ink);border-radius:22px;
    padding:64px 24px 28px;margin-top:44px;position:relative}
  .badge{position:absolute;top:-32px;right:14px;color:#fff;
    font-size:32px;font-weight:900;border-radius:16px;padding:14px 24px;
    letter-spacing:-.02em;border:4px solid #fff;
    box-shadow:0 5px 14px rgba(0,0,0,.22)}
  .b-ok{background:var(--ok)}
  .b-wait{background:var(--wait)}
  .cnum{position:absolute;top:-26px;left:20px;background:var(--ink);color:#fff;
    font-size:28px;font-weight:900;border-radius:99px;
    width:60px;height:60px;display:flex;align-items:center;justify-content:center}
  .card h2{font-size:46px;font-weight:900;margin:6px 0 16px;line-height:1.3}
  .card .sum{font-size:32px;color:var(--sub);margin:0 0 24px;line-height:1.55;font-weight:600}

  .tel{display:flex;align-items:center;justify-content:center;gap:20px;
    min-height:130px;background:var(--act);color:#fff;border-radius:18px;
    font-size:44px;font-weight:900;text-decoration:none;margin-top:10px;
    border:5px solid var(--act-press)}
  .tel svg{width:52px;height:52px;flex:0 0 52px;fill:#fff}
  .tel:active{background:var(--act-press)}

  .warn{margin-top:22px;padding:22px;background:#FFF0D6;
    border-radius:14px;font-size:30px;line-height:1.5;
    border-left:10px solid var(--waitline);font-weight:700}

  .more{margin-top:22px;border-top:4px solid var(--line);padding-top:6px}
  .more summary{font-size:34px;font-weight:800;color:var(--act);
    padding:26px 0;cursor:pointer;list-style:none;min-height:96px;
    display:flex;align-items:center;justify-content:space-between;gap:16px}
  .more summary::-webkit-details-marker{display:none}
  .more summary::after{content:"▼";font-size:44px;line-height:1;
    color:var(--act);flex:0 0 auto}
  .more[open] summary::after{content:"▲"}
  .row{font-size:33px;margin:28px 0;line-height:1.5;font-weight:600;color:var(--ink)}
  .row b{display:block;color:#fff;background:var(--sub);font-weight:800;
    font-size:24px;margin-bottom:12px;letter-spacing:.06em;
    padding:6px 16px;border-radius:8px;width:fit-content}
  .note{margin-top:22px;padding:22px;background:#F0EFEA;border-radius:14px;
    font-size:29px;line-height:1.55}

  .tip{background:#FFF4E0;border:5px solid var(--waitline);border-radius:22px;
    padding:28px;margin-top:24px;font-size:32px;line-height:1.55;font-weight:600}
  .tip b{display:block;font-size:38px;margin-bottom:14px;color:var(--waitline);font-weight:900}

  .restmore{margin-top:34px;border-top:none}
  .restmore > summary{justify-content:center;border:5px dashed var(--line);
    border-radius:18px;padding:26px;color:var(--sub)}

  .skip{margin-bottom:32px}
  .skip summary{font-size:30px;font-weight:800;color:var(--sub);padding:28px 0;
    cursor:pointer;list-style:none;min-height:92px;display:flex;align-items:center}
  .skip summary{justify-content:space-between;gap:16px}
  .skip summary::-webkit-details-marker{display:none}
  .skip summary::after{content:"▼";font-size:40px;line-height:1;flex:0 0 auto}
  .skip[open] summary::after{content:"▲"}
  .mini{font-size:29px;color:var(--sub);padding:22px 0;border-top:3px solid var(--line);line-height:1.45}
  .mini small{font-size:26px}

  .restart{justify-content:center;font-size:38px;border-color:var(--sub);color:var(--sub)}
  .foot{margin-top:40px;padding-top:32px;border-top:4px solid var(--line);
    font-size:26px;color:var(--sub);line-height:1.6;font-weight:600}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<script>

/* ---------- 판정 엔진 (3값 논리) ---------- */
function evalRule(r,p){
  if(r.op==='AND'||r.op==='OR') return evalGroup(r,p);
  var a=p[r.f];
  if(a===undefined||a===UNKNOWN) return UNKNOWN;
  switch(r.op){
    case '>=': return a>=r.v;
    case '<=': return a<=r.v;
    case '==': return a===r.v;
    case '!=': return a!==r.v;
    case 'in': return r.v.indexOf(a)!==-1;
    default: return UNKNOWN;
  }
}
function evalGroup(g,p){
  var res=g.rules.map(function(r){return evalRule(r,p)});
  if(g.op==='AND'){
    if(res.indexOf(false)!==-1) return false;
    if(res.indexOf(UNKNOWN)!==-1) return UNKNOWN;
    return true;
  }
  if(res.indexOf(true)!==-1) return true;
  if(res.indexOf(UNKNOWN)!==-1) return UNKNOWN;
  return false;
}
function blockers(r,p,out){
  out=out||{failed:[],unknown:[]};
  if(r.op==='AND'||r.op==='OR'){ r.rules.forEach(function(x){blockers(x,p,out)}); return out; }
  var v=evalRule(r,p);
  if(v===false) out.failed.push(r.f);
  if(v===UNKNOWN) out.unknown.push(r.f);
  return out;
}
var FIELD_KO={ age:'나이', residence_gu:'영등포구 거주', living_alone:'혼자 사시는지',
  basic_pension:'기초연금', livelihood_benefit:'생활비 지원', medical_benefit:'병원비 지원',
  ltc_grade:'장기요양 등급', employed_insured:'직장 여부', mobility:'거동', care_need:'돌봄 필요' };

function inSeason(p){
  if(!p.season || p.season==='always') return true;
  var m=new Date().getMonth()+1;
  return p.season.indexOf(m)!==-1;
}
function monthsUntil(p){
  if(!p.season || p.season==='always') return 0;
  var m=new Date().getMonth()+1, best=99;
  p.season.forEach(function(s){ var d=(s-m+12)%12; if(d<best) best=d; });
  return best;
}
function diagnose(profile){
  var out={eligible:[],maybe:[],ineligible:[],later:[],tips:[]};
  PROGRAMS.forEach(function(pg){
    var v=evalGroup(pg.rules,profile), b=blockers(pg.rules,profile);
    var uniq=function(a){return a.filter(function(x,i){return a.indexOf(x)===i})};
    var item={p:pg,missing:uniq(b.unknown),failed:uniq(b.failed)};
    if(v===false){ out.ineligible.push(item); return; }
    if(!inSeason(pg)){ item.wait=monthsUntil(pg); out.later.push(item); return; }
    if(v===true) out.eligible.push(item);
    else out.maybe.push(item);
  });
  var order={verified:0,partial:1,unverified:2};
  [out.eligible,out.maybe].forEach(function(l){
    l.sort(function(a,b){return order[a.p.conf]-order[b.p.conf]});
  });

  // 대체 경로 안내
  var jobs=PROGRAMS.filter(function(x){return x.category==='일자리'}).map(function(x){return x.id});
  var jobItems=out.ineligible.filter(function(i){return jobs.indexOf(i.p.id)!==-1});
  // 나이·거주지·거동 때문에 막힌 경우는 취업 안내가 무의미
  var hard=['age','residence_gu','mobility'];
  var blockedByHard=jobItems.some(function(i){
    return i.failed.some(function(f){return hard.indexOf(f)!==-1});
  });
  if(jobItems.length===jobs.length && !blockedByHard){
    out.tips.push({t:'일자리를 찾고 계신다면',
      m:'다른 일자리 사업은 어렵지만 취업알선형은 조건 제한이 없습니다. 영등포시니어클럽에 연중 상담할 수 있습니다.'});
  }
  if(profile.care_need===true && (profile.ltc_grade===null||profile.ltc_grade===UNKNOWN)){
    out.tips.push({t:'장기요양 등급을 먼저 신청해 보세요',
      m:'등급을 받으면 요양보호사 방문, 목욕 도움, 주야간 보호를 이용할 수 있습니다. 국민건강보험공단 1577-1000으로 전화하세요.'});
  }
  if(profile.mobility==='homebound'){
    out.tips.push({t:'집으로 찾아오는 서비스부터 신청하세요',
      m:'노인맞춤돌봄서비스와 찾아가는 상담은 직접 집으로 방문합니다. 도시락 배달도 요청할 수 있습니다.'});
  }
  return out;
}

var actx=null;
function ensureAudio(){
  try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state!=='running') actx.resume();
  }catch(e){}
}
/* iOS는 앱을 벗어났다 돌아오면 AudioContext를 suspended로 만든다.
   복귀·터치 시점마다 재개해야 소리가 계속 난다. */
document.addEventListener('visibilitychange',function(){
  if(!document.hidden) ensureAudio();
});
window.addEventListener('pageshow',ensureAudio);
window.addEventListener('focus',ensureAudio);
document.addEventListener('touchstart',ensureAudio,{passive:true});

function tick(){
  try{
    ensureAudio();
    if(!actx || actx.state!=='running') return;
    var o=actx.createOscillator(), g=actx.createGain();
    o.frequency.value=660; o.type='sine';
    g.gain.setValueAtTime(0.10, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.09);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+0.09);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate(30);
}

    h+='<details class="skip"><summary>가을에 신청하는 일자리 '+r.later.length+'개</summary>';
    h+='<div class="mini"><b>지금은 모집 기간이 아닙니다.</b><br>'+
       '<small>약 '+w+'개월 뒤인 11~12월에 모집합니다. 그때 다시 확인해 보세요.</small></div>';
    r.later.forEach(function(i){
      h+='<div class="mini">'+esc(i.p.name)+'<br><small>'+esc(i.p.when)+'</small></div>';
    });
    h+='</details>';
  }

  if(r.ineligible.length){
    h+='<details class="skip"><summary>해당 안 되는 사업 '+r.ineligible.length+'개</summary>';
    r.ineligible.forEach(function(i){
      var why=i.failed.map(function(f){return FIELD_KO[f]||f}).join(', ');
      h+='<div class="mini">'+esc(i.p.name)+'<br><small>'+esc(why)+' 조건이 안 맞습니다</small></div>';
    });
    h+='</details>';
  }

  h+='<button class="restart" id="again">처음부터 다시</button>';
  h+='<div class="foot">이 안내는 참고용입니다.<br>'+
     '실제 신청 자격은 담당 기관에서 정합니다.<br><br>'+
     '2026년 7월 확인<br>영등포구청 · 보건복지부 · 서울시 자료</div>';

  app.innerHTML=h;
  document.getElementById('again').onclick=function(){
    tick(); state={idx:0,profile:{},history:[],started:false}; render();
  };
  document.querySelectorAll('details').forEach(function(d){
    d.addEventListener('toggle',function(){ if(d.open) tick(); });
  });
}

/* 외부 데이터 우선 로드 — programs-live.json만 교체하면 요건 갱신 가능.
   실패 시 내장 데이터로 동작하므로 오프라인에서도 앱이 죽지 않는다. */
fetch('programs-live.json?t='+Date.now())
  .then(function(r){ if(!r.ok) throw 0; return r.json(); })
  .then(function(d){
    if(d && d.programs && d.programs.length){
      PROGRAMS = d.programs;
      if(d.checked_at) DATA_CHECKED = d.checked_at;
      if(!state.started) renderTitle();
    }
  })
  .catch(function(){ /* 내장 데이터 유지 */ });

render();
</script>
</body>
</html>
