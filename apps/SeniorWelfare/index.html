<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B4A6B">
<title>영등포 어르신 복지 찾기</title>
<style>
  :root{
    --ink:#14202B; --paper:#FBF8F3; --deep:#1B4A6B; --deep-press:#0E2A3E;
    --gold:#C8892A; --line:#D9D2C6;
    --good:#1E6B3A; --maybe:#8A5A00; --warn-bg:#FFF4DC;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    font-size:22px;line-height:1.65;-webkit-font-smoothing:antialiased}
  .wrap{max-width:600px;margin:0 auto;
    padding:max(14px,env(safe-area-inset-top)) 20px calc(40px + env(safe-area-inset-bottom));
    min-height:100vh;display:flex;flex-direction:column}

  /* 상단바 — 뒤로가기를 구석에 격리 */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;min-height:56px}
  .backbtn{width:56px;height:56px;flex:0 0 auto;font-size:30px;font-weight:700;
    border:2px solid var(--line);border-radius:50%;background:#fff;color:#54606B;
    display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer}
  .backbtn:active{background:var(--line)}
  .backspacer{width:56px;flex:0 0 auto}
  .step{font-size:19px;font-weight:700;color:#54606B;letter-spacing:.01em}

  .bar{height:10px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:38px}
  .bar > i{display:block;height:100%;background:var(--gold);border-radius:99px;transition:width .35s ease}

  h1{font-size:40px;line-height:1.28;font-weight:800;margin:0 0 14px;letter-spacing:-.025em}
  .hint{font-size:20px;color:#54606B;margin:0 0 20px;padding-left:14px;
    border-left:4px solid var(--gold);line-height:1.55}

  /* 선택 버튼 */
  .opts{display:flex;flex-direction:column;gap:16px;margin-top:auto;padding-top:20px}
  button{font-family:inherit;font-size:28px;font-weight:700;
    min-height:88px;padding:20px 24px;border:2px solid var(--deep);border-radius:16px;
    background:#fff;color:var(--deep);width:100%;text-align:left;cursor:pointer;
    display:flex;align-items:center;transition:transform .12s ease,background .12s ease}
  button:active{background:var(--deep);color:#fff;transform:scale(.97)}
  button.chosen{background:var(--deep);color:#fff;transform:scale(.97);
    box-shadow:0 0 0 5px rgba(27,74,107,.22)}
  button:focus-visible{outline:4px solid var(--gold);outline-offset:3px}
  button.dim{border-color:#A8B1B9;color:#5A666F;font-size:24px;min-height:72px;font-weight:600}
  button.dim:active,button.dim.chosen{background:#5A666F;color:#fff}

  /* 결과 화면 */
  .rtop{padding:12px 0 30px;border-bottom:4px solid var(--ink);margin-bottom:34px}
  .rtop h1{font-size:44px;margin-bottom:16px}
  .rtop p{margin:0;font-size:21px;color:#54606B;line-height:1.6}

  .sec{margin-bottom:44px}
  .sechead{display:flex;align-items:center;gap:12px;font-size:25px;font-weight:800;
    margin-bottom:6px;padding-bottom:12px;border-bottom:2px solid var(--line)}
  .sechead .dot{width:18px;height:18px;border-radius:50%;flex:0 0 auto}
  .g-good{color:var(--good)} .g-good .dot{background:var(--good)}
  .g-maybe{color:var(--maybe)} .g-maybe .dot{background:var(--maybe)}
  .g-tip{color:var(--deep)} .g-tip .dot{background:var(--deep)}
  .secsub{font-size:19px;color:#54606B;margin:10px 0 0}

  .card{background:#fff;border:2px solid var(--line);border-radius:16px;
    padding:24px 22px;margin-top:18px;position:relative}
  .cnum{position:absolute;top:-14px;left:20px;background:var(--ink);color:#fff;
    font-size:19px;font-weight:800;border-radius:99px;padding:3px 15px}
  .card h2{font-size:29px;font-weight:800;margin:8px 0 12px;line-height:1.35}
  .card .sum{font-size:20px;color:#3D4954;margin:0 0 20px;line-height:1.6}

  .tel{display:flex;align-items:center;justify-content:center;gap:10px;
    min-height:82px;background:var(--deep);color:#fff;border-radius:14px;
    font-size:26px;font-weight:800;text-decoration:none;margin-top:6px}
  .tel:active{background:var(--deep-press)}

  .warn{margin-top:16px;padding:16px 18px;background:var(--warn-bg);
    border-radius:11px;font-size:19px;line-height:1.6;border-left:5px solid var(--gold)}

  .more{margin-top:16px;border-top:2px solid var(--line);padding-top:6px}
  .more summary{font-size:21px;font-weight:700;color:var(--deep);
    padding:16px 0;cursor:pointer;list-style:none;min-height:56px;display:flex;align-items:center}
  .more summary::-webkit-details-marker{display:none}
  .more summary::after{content:"  ▾";font-size:19px}
  .more[open] summary::after{content:"  ▴"}
  .mbody{padding-bottom:8px}
  .row{font-size:20px;margin:14px 0;display:flex;gap:12px;align-items:flex-start;line-height:1.55}
  .row b{flex:0 0 74px;color:#54606B;font-weight:700}
  .note{margin-top:16px;padding:16px 18px;background:#F2EFE9;border-radius:11px;
    font-size:19px;line-height:1.65}

  .tip{background:#EAF1F6;border:2px solid #B9CEDD;border-radius:16px;
    padding:22px;margin-top:18px;font-size:20px;line-height:1.65}
  .tip b{display:block;font-size:23px;margin-bottom:10px;color:var(--deep)}

  .skip{margin-bottom:28px}
  .skip summary{font-size:20px;font-weight:700;color:#6B7680;padding:20px 0;
    cursor:pointer;list-style:none;min-height:60px;display:flex;align-items:center}
  .skip summary::-webkit-details-marker{display:none}
  .skip summary::after{content:"  ▾"}
  .skip[open] summary::after{content:"  ▴"}
  .mini{font-size:20px;color:#54606B;padding:16px 0;border-top:1px solid var(--line);line-height:1.5}
  .mini small{font-size:18px;color:#7A848C}

  .restmore{margin-top:22px;border-top:none}
  .restmore > summary{justify-content:center;border:2px dashed var(--line);
    border-radius:14px;padding:18px;color:#54606B}
  .restart{justify-content:center;font-size:25px;border-color:#A8B1B9;
    color:#3D4954;margin-top:10px}
  .foot{margin-top:34px;padding-top:26px;border-top:2px solid var(--line);
    font-size:18px;color:#6B7680;line-height:1.7}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ============================================================
   영등포구 어르신 복지 자격 진단
   요건 출처: 영등포구청 / 보건복지부 / 서울시 (2026-07-19 확인)

var UNKNOWN = 'unknown';

/* ---------- 질문 흐름 ---------- */
var QUESTIONS = [
  { id:'age1', field:'_ageband', type:'branch',

    benefit:'근로계약에 따름 (하루 최대 8시간)', period:'12개월',

  { id:'job-place', name:'취업알선형 일자리',

    category:'생활지원', org:'영등포구', tel:'02-2670-3408',
    benefit:'제휴 업소 할인', period:'연중 상시',
    how:'사시는 동 주민센터에서 신청하면 카드와 안내책자를 받습니다', when:'아무 때나',
    rules:{ op:'AND', rules:[
      {f:'age',op:'>=',v:65},{f:'residence_gu',op:'==',v:true} ]},
    notes:['나이 기준은 동 주민센터에 다시 확인해 보세요.'],
    conf:'unverified' },

  { id:'50plus', name:'서울시 50+ 영등포센터',
    summary:'새로운 것을 배우고, 취미 활동을 하고, 사람들을 만나는 곳입니다.',
    category:'교육·여가', org:'서울시 50플러스 영등포센터', tel:null,
    benefit:'교육 및 커뮤니티 프로그램', period:'수시 모집',
    how:'50plus.or.kr 또는 센터 방문', when:'수시',
    rules:{ op:'AND', rules:[
      {f:'age',op:'>=',v:50},
      {f:'mobility',op:'in',v:['independent','assisted']} ]},
    notes:['서울시에 사는 분이면 신청할 수 있습니다.'],
    conf:'partial' }
];

/* ---------- 판정 엔진 (3값 논리) ---------- */
function evalRule(r,p){
  if(r.op==='AND'||r.op==='OR') return evalGroup(r,p);
  var a=p[r.f];
  if(a===undefined||a===UNKNOWN) return UNKNOWN;
  switch(r.op){
    case '>=': return a>=r.v;
    case '<=': return a<=r.v;
    case '==': return a===r.v;
    case '!=': return a!==r.v;
    case 'in': return r.v.indexOf(a)!==-1;
    default: return UNKNOWN;
  }
}
function evalGroup(g,p){
  var res=g.rules.map(function(r){return evalRule(r,p)});
  if(g.op==='AND'){
    if(res.indexOf(false)!==-1) return false;
    if(res.indexOf(UNKNOWN)!==-1) return UNKNOWN;
    return true;
  }
  if(res.indexOf(true)!==-1) return true;
  if(res.indexOf(UNKNOWN)!==-1) return UNKNOWN;
  return false;
}
function blockers(r,p,out){
  out=out||{failed:[],unknown:[]};
  if(r.op==='AND'||r.op==='OR'){ r.rules.forEach(function(x){blockers(x,p,out)}); return out; }
  var v=evalRule(r,p);
  if(v===false) out.failed.push(r.f);
  if(v===UNKNOWN) out.unknown.push(r.f);
  return out;
}
var FIELD_KO={ age:'나이', residence_gu:'영등포구 거주', living_alone:'혼자 사시는지',
  basic_pension:'기초연금', livelihood_benefit:'생활비 지원', medical_benefit:'병원비 지원',
  ltc_grade:'장기요양 등급', employed_insured:'직장 여부', mobility:'거동', care_need:'돌봄 필요' };

function diagnose(profile){
  var out={eligible:[],maybe:[],ineligible:[],tips:[]};
  PROGRAMS.forEach(function(pg){
    var v=evalGroup(pg.rules,profile), b=blockers(pg.rules,profile);
    var uniq=function(a){return a.filter(function(x,i){return a.indexOf(x)===i})};
    var item={p:pg,missing:uniq(b.unknown),failed:uniq(b.failed)};
    if(v===true) out.eligible.push(item);
    else if(v===UNKNOWN) out.maybe.push(item);
    else out.ineligible.push(item);
  });
  var order={verified:0,partial:1,unverified:2};
  [out.eligible,out.maybe].forEach(function(l){
    l.sort(function(a,b){return order[a.p.conf]-order[b.p.conf]});
  });

  // 대체 경로 안내
  var jobs=PROGRAMS.filter(function(x){return x.category==='일자리'}).map(function(x){return x.id});
  var jobItems=out.ineligible.filter(function(i){return jobs.indexOf(i.p.id)!==-1});
  // 나이·거주지·거동 때문에 막힌 경우는 취업 안내가 무의미
  var hard=['age','residence_gu','mobility'];
  var blockedByHard=jobItems.some(function(i){
    return i.failed.some(function(f){return hard.indexOf(f)!==-1});
  });
  if(jobItems.length===jobs.length && !blockedByHard){
    out.tips.push({t:'일자리를 찾고 계신다면',
      m:'다른 일자리 사업은 어렵지만 취업알선형은 조건 제한이 없습니다. 영등포시니어클럽에 연중 상담할 수 있습니다.'});
  }
  if(profile.care_need===true && (profile.ltc_grade===null||profile.ltc_grade===UNKNOWN)){
    out.tips.push({t:'장기요양 등급을 먼저 신청해 보세요',
      m:'등급을 받으면 요양보호사 방문, 목욕 도움, 주야간 보호를 이용할 수 있습니다. 국민건강보험공단 1577-1000으로 전화하세요.'});
  }
  if(profile.mobility==='homebound'){
    out.tips.push({t:'집으로 찾아오는 서비스부터 신청하세요',
      m:'노인맞춤돌봄서비스와 찾아가는 상담은 직접 집으로 방문합니다. 도시락 배달도 요청할 수 있습니다.'});
  }
  return out;
}

/* ---------- 화면 ---------- */
var state={idx:0,profile:{},history:[]};
var app=document.getElementById('app');
var esc=function(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML};

/* 탭 피드백: iOS Safari는 navigator.vibrate 미지원 → 시각+청각으로 대체 */
var actx=null;
function tick(){
  try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    var o=actx.createOscillator(), g=actx.createGain();
    o.frequency.value=660; o.type='sine';
    g.gain.setValueAtTime(0.10, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.09);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+0.09);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate(30); // 안드로이드에서만 동작
}

function visibleQuestions(){
  return QUESTIONS.filter(function(q){
    if(!q.showIf) return true;
    return state.profile[q.showIf.f]===q.showIf.v;
  });
}

function render(){
  window.scrollTo(0,0);
  var list=visibleQuestions();
  if(state.idx>=list.length){ renderResult(); return; }
  var q=list[state.idx];
  var pct=Math.round(state.idx/list.length*100);

  var h='';
  h+='<div class="topbar">'+
     (state.idx>0?'<button class="backbtn" id="back" aria-label="앞 질문으로">←</button>':'<span class="backspacer"></span>')+
     '<div class="step">'+list.length+'개 중 '+(state.idx+1)+'번째</div>'+
     '</div>'+
     '<div class="bar"><i style="width:'+pct+'%"></i></div>'+
     '<h1>'+esc(q.q)+'</h1>'+
     (q.hint?'<p class="hint">'+esc(q.hint)+'</p>':'')+
     '<div class="opts" id="opts"></div>';
  app.innerHTML=h;

  var box=document.getElementById('opts');
  q.opts.forEach(function(o){
    var b=mkBtn(o.t, function(){ answer(q.field,o.v); });
    if(o.dim) b.className='dim';
    box.appendChild(b);
  });

  var bk=document.getElementById('back');
  if(bk) bk.onclick=function(){
    tick();
    var prev=state.history.pop();
    if(prev) delete state.profile[prev];
    state.idx--;
    render();
  };
}

function mkBtn(text,fn){
  var b=document.createElement('button');
  b.innerHTML='<span>'+esc(text)+'</span>';
  b.onclick=function(){
    if(b.dataset.done) return;
    b.dataset.done='1';
    b.classList.add('chosen');
    tick();
    setTimeout(fn,180); // 눌린 상태를 보여준 뒤 이동
  };
  return b;
}

function answer(field,val){
  state.profile[field]=val;
  state.history.push(field);
  state.idx++;
  render();
}

function card(item,kind,n){
  var p=item.p;
  var unver = (p.conf==='unverified');
  var h='<div class="card"><div class="cnum">'+n+'</div>'+
        '<h2>'+esc(p.name)+'</h2>'+
        '<p class="sum">'+esc(p.summary)+'</p>';

  if(p.tel) h+='<a class="tel" href="tel:'+p.tel.replace(/-/g,'')+'">전화 걸기  '+esc(p.tel)+'</a>';

  if(unver) h+='<div class="warn">이 사업은 조건을 다시 확인해야 합니다. 꼭 전화로 물어보세요.</div>';
  else if(kind==='maybe' && item.missing.length){
    var ko=item.missing.map(function(f){return FIELD_KO[f]||f}).join(', ');
    h+='<div class="warn">전화해서 '+esc(ko)+'만 확인하면 됩니다.</div>';
  }

  h+='<details class="more"><summary>자세히 보기</summary><div class="mbody">'+
     '<div class="row"><b>받는 것</b><span>'+esc(p.benefit)+'</span></div>'+
     '<div class="row"><b>신청</b><span>'+esc(p.how)+'</span></div>'+
     '<div class="row"><b>시기</b><span>'+esc(p.when)+'</span></div>';
  if(p.notes && p.notes.length) h+='<div class="note">'+p.notes.map(esc).join('<br><br>')+'</div>';
  h+='</div></details></div>';
  return h;
}

function renderResult(){
  var r=diagnose(state.profile);
  var total=r.eligible.length+r.maybe.length;

  var h='<div class="rtop"><h1>'+total+'가지를<br>찾았습니다</h1>'+
        '<p>하나씩 천천히 보세요.<br>전화 한 통이면 물어볼 수 있습니다.</p></div>';

  var n=0;
  var TOP=3;
  if(r.eligible.length){
    h+='<div class="sec"><div class="sechead g-good">'+
       '<span class="dot"></span>받으실 수 있어요</div>';
    var head=r.eligible.slice(0,TOP), rest=r.eligible.slice(TOP);
    head.forEach(function(i){ h+=card(i,'good',++n) });
    if(rest.length){
      h+='<details class="more restmore"><summary>더 있어요 ('+rest.length+'개 보기)</summary><div>';
      rest.forEach(function(i){ h+=card(i,'good',++n) });
      h+='</div></details>';
    }
    h+='</div>';
  }

  if(r.maybe.length){
    h+='<div class="sec"><div class="sechead g-maybe">'+
       '<span class="dot"></span>아마 되실 거예요</div>'+
       '<p class="secsub">한 가지만 확인하면 됩니다.</p>';
    r.maybe.forEach(function(i){ h+=card(i,'maybe',++n) });
    h+='</div>';
  }

  if(!total){
    h+='<div class="sec"><div class="tip"><b>맞는 사업을 찾지 못했습니다</b>'+
       '영등포구청에 전화하시면 다른 도움을 알려드립니다.'+
       '<a class="tel" href="tel:0226703408">전화 걸기  02-2670-3408</a></div></div>';
  }

  if(r.tips.length){
    h+='<div class="sec"><div class="sechead g-tip"><span class="dot"></span>이것도 해보세요</div>';
    r.tips.forEach(function(t){
      h+='<div class="tip"><b>'+esc(t.t)+'</b>'+esc(t.m)+'</div>';
    });
    h+='</div>';
  }

  if(r.ineligible.length){
    h+='<details class="skip"><summary>해당 안 되는 사업 '+r.ineligible.length+'개</summary>';
    r.ineligible.forEach(function(i){
      var why=i.failed.map(function(f){return FIELD_KO[f]||f}).join(', ');
      h+='<div class="mini">'+esc(i.p.name)+'<br><small>'+esc(why)+' 조건이 안 맞습니다</small></div>';
    });
    h+='</details>';
  }

  h+='<button class="restart" id="again">처음부터 다시</button>';
  h+='<div class="foot">이 안내는 참고용입니다.<br>실제 신청 자격은 담당 기관에서 정합니다.<br><br>'+
     '2026년 7월 확인 · 영등포구청, 보건복지부, 서울시 자료<br>'+
     '입력하신 내용은 저장되지 않습니다.</div>';

  app.innerHTML=h;
  var ag=document.getElementById('again');
  ag.onclick=function(){ tick(); state={idx:0,profile:{},history:[]}; render(); };
  document.querySelectorAll('details').forEach(function(d){
    d.addEventListener('toggle',function(){ if(d.open) tick(); });
  });
}

render();
</script>
