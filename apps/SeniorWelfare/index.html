<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B4A6B">
<title>영등포 어르신 복지 찾기</title>
<style>
  /* 팔레트 근거:
     - 노인은 황-청 축 변별력이 적-녹보다 먼저·크게 저하 → 파랑 의존 배제
     - 빨강이 주의를 가장 잘 끌고 적-흑 조합이 반응속도 최상
     - 저시력 대비 7:1 이상 권장 (WCAG AAA 상회)
     - 렌즈 황변으로 흰 배경이 아이보리로 보임 → 순백 대신 미세 회백
     - 채도 높은 색 사용, 파스텔 간 전환 금지 */
  :root{
    --ink:#000000;        /* 본문: 순흑 (대비 최대) */
    --paper:#FAFAF7;      /* 배경: 미세 회백 */
    --card:#FFFFFF;
    --line:#B8B8B0;
    --act:#0C6152;        /* 주 강조: 진청록 (흰 배경 대비 7.2:1) */
    --act-press:#0A4F42;
    --ok:#0E6428;         /* 신청 가능: 밝은 진초록 (대비 4.9:1, 흰글씨 기준) */
    --wait:#8A4B00;       /* 확인 필요: 주황 (대비 4.6:1, 흰글씨 기준) */
    --waitline:#8A4B00;   /* 주황 계열 테두리·글자용 진한 톤 */
    --sub:#3A3A38;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%;overflow-x:hidden}
  body{margin:0;background:var(--paper);color:var(--ink);word-break:keep-all;overflow-x:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    font-size:36px;line-height:1.6;font-weight:600;-webkit-font-smoothing:antialiased}
  .apphead{position:sticky;top:0;z-index:50;
    background:var(--act);color:#fff;
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
    font-size:30px;font-weight:900;letter-spacing:-.02em;
    display:flex;align-items:center;gap:14px;
    border-bottom:5px solid var(--act-press)}
  .apphead .dotmark{width:22px;height:22px;border-radius:50%;
    background:#fff;flex:0 0 22px}
  .wrap{max-width:820px;margin:0 auto;
    padding:14px 18px calc(48px + env(safe-area-inset-bottom));
    min-height:100vh;display:flex;flex-direction:column}
  .qwrap{display:flex;flex-direction:column}

  /* 타이틀 화면 */
  .title{display:flex;flex-direction:column;padding-top:8px}
  .hero{background:var(--card);border:5px solid var(--ink);border-radius:24px;
    padding:24px 20px;text-align:center;margin-bottom:22px}
  .hero svg{width:100%;max-width:300px;height:auto;display:block;margin:0 auto 16px}
  .hero h1{font-size:52px;line-height:1.18;margin:0 0 12px;word-break:keep-all}
  .hero p{font-size:30px;color:var(--sub);margin:0;line-height:1.4;
    font-weight:600;word-break:keep-all}
  .steps{margin-bottom:22px}
  .stepline{display:flex;align-items:center;gap:18px;font-size:30px;
    font-weight:700;padding:14px 0;border-bottom:3px solid var(--line)}
  .stepline:last-child{border-bottom:none}
  .stepline i{flex:0 0 54px;width:54px;height:54px;border-radius:50%;
    background:var(--act);color:#fff;font-style:normal;font-weight:900;
    font-size:28px;display:flex;align-items:center;justify-content:center}
  .start{background:var(--ok);border-color:#0A4F1E;color:#fff;
    justify-content:center;font-size:44px;min-height:120px}
  /* 시작하기는 항상 화면에 보이도록 하단 고정 */
  .startbar{position:fixed;left:0;right:0;bottom:0;z-index:60;
    background:var(--paper);border-top:5px solid var(--ink);
    padding:16px 18px calc(16px + env(safe-area-inset-bottom));}
  .startbar .start{margin:0;max-width:820px;margin-left:auto;margin-right:auto}
  .title{padding-bottom:170px}
  .cover{font-size:25px !important;padding:20px !important;margin-top:20px !important}
  .start:active{background:#0A4F1E;color:#fff}
  .stale{background:#FFF4E0;border:5px solid var(--waitline);border-radius:18px;
    padding:24px;margin-bottom:28px;font-size:29px;line-height:1.5;font-weight:700}
  .cover{font-size:27px;color:var(--sub);line-height:1.6;font-weight:600;
    background:#F0EFEA;border-radius:16px;padding:24px;margin-top:26px}

  /* 상단바 */
  .topbar{display:flex;align-items:center;gap:16px;margin-bottom:16px;min-height:76px}
  .backbtn{width:76px;height:76px;min-height:76px;flex:0 0 76px;padding:0;
    font-size:40px;font-weight:800;line-height:1;
    border:4px solid var(--ink);border-radius:50%;background:var(--card);color:var(--ink);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    aspect-ratio:1/1;overflow:hidden}
  .backbtn:active{background:var(--ink);color:var(--card)}
  .backspacer{width:76px;flex:0 0 76px}
  .step{font-size:30px;font-weight:800;color:var(--sub)}

  .bar{height:16px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:28px}
  .bar > i{display:block;height:100%;background:var(--ok);border-radius:99px;transition:width .35s ease}

  h1{font-size:58px;line-height:1.25;font-weight:900;margin:0 0 16px;letter-spacing:-.03em}
  .hint{font-size:32px;color:var(--sub);margin:0 0 24px;padding-left:18px;
    border-left:8px solid var(--act);line-height:1.5;font-weight:600}

  /* 선택 버튼 */
  .opts{display:flex;flex-direction:column;gap:22px;padding-top:20px}
  button{font-family:inherit;font-size:44px;font-weight:800;
    min-height:130px;padding:26px 30px;border:5px solid var(--ink);border-radius:20px;
    background:var(--card);color:var(--ink);width:100%;text-align:left;cursor:pointer;
    display:flex;align-items:center;transition:transform .12s ease,background .12s ease}
  button:active{background:var(--ink);color:var(--card);transform:scale(.97)}
  button.chosen{background:var(--act);border-color:var(--act);color:#fff;transform:scale(.97);
    box-shadow:0 0 0 8px rgba(179,0,15,.28)}
  button:focus-visible{outline:6px solid var(--act);outline-offset:4px}
  button.dim{border-color:var(--sub);color:var(--sub);font-size:36px;min-height:104px;font-weight:700}
  button.dim:active,button.dim.chosen{background:var(--sub);border-color:var(--sub);color:#fff}

  /* 결과 */
  .rtop{padding:10px 0 32px;border-bottom:8px solid var(--ink);margin-bottom:40px}
  .rtop h1{font-size:64px;margin-bottom:20px}
  .rtop p{margin:0;font-size:32px;color:var(--sub);line-height:1.5;font-weight:600}

  .sec{margin-bottom:40px}
  .secsub{font-size:30px;color:var(--sub);margin:0 0 6px;font-weight:700}

  /* 카드 — 상태 스티커를 카드마다 부착 */
  .card{background:var(--card);border:5px solid var(--ink);border-radius:22px;
    padding:64px 20px 28px;margin-top:44px;position:relative;
    max-width:100%;box-sizing:border-box;overflow-wrap:break-word}
  .badge{position:absolute;top:-32px;right:14px;color:#fff;
    font-size:32px;font-weight:900;border-radius:16px;padding:14px 24px;
    letter-spacing:-.02em;border:4px solid #fff;
    box-shadow:0 5px 14px rgba(0,0,0,.22)}
  .b-ok{background:var(--ok)}
  .b-wait{background:var(--wait)}
  .cnum{position:absolute;top:-26px;left:20px;background:var(--ink);color:#fff;
    font-size:28px;font-weight:900;border-radius:99px;
    width:60px;height:60px;display:flex;align-items:center;justify-content:center}
  .card h2{font-size:44px;font-weight:900;margin:6px 0 16px;line-height:1.3;
    overflow-wrap:break-word;max-width:100%}
  .card .sum{font-size:32px;color:var(--sub);margin:0 0 24px;line-height:1.55;font-weight:600}

  .tel{display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;width:100%;max-width:100%;box-sizing:border-box;
    min-height:130px;padding:18px 10px;
    background:var(--act);color:#fff;border-radius:18px;
    text-decoration:none;margin-top:10px;
    border:5px solid var(--act-press)}
  .tel .lab{display:flex;align-items:center;gap:10px;
    font-size:26px;font-weight:800;opacity:.92}
  .tel .num{font-size:36px;font-weight:900;letter-spacing:-.02em;
    white-space:nowrap;line-height:1.1}
  .tel svg{width:32px;height:32px;flex:0 0 32px;fill:#fff}
  .tel:active{background:var(--act-press)}
  @media (max-width:380px){
    .tel .num{font-size:33px}
    .tel .lab{font-size:24px}
  }

  .catlabel{font-size:28px;font-weight:900;color:var(--sub);
    margin:38px 0 -20px;padding-left:6px;letter-spacing:-.01em}
  .telalt{display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin-top:10px;padding:14px 16px;background:#F2F7F5;
    border:3px solid var(--line);border-radius:14px;
    font-size:22px;color:var(--sub);font-weight:600;line-height:1.35}
  .telalt .tcopy{flex:0 0 auto;min-height:64px;padding:10px 18px;
    font-size:24px;font-weight:800;border:3px solid var(--act);
    border-radius:12px;background:#fff;color:var(--act);width:auto}
  .telalt .tcopy:active{background:var(--act);color:#fff}
  .warn{margin-top:22px;padding:20px;background:#FFF0D6;
    border-radius:14px;font-size:29px;line-height:1.5;
    border-left:10px solid var(--waitline);font-weight:700;
    max-width:100%;box-sizing:border-box;overflow-wrap:break-word}

  .more{margin-top:22px;border-top:4px solid var(--line);padding-top:6px}
  .more summary{font-size:34px;font-weight:800;color:var(--act);
    padding:26px 0;cursor:pointer;list-style:none;min-height:96px;
    display:flex;align-items:center;justify-content:space-between;gap:16px}
  .more summary::-webkit-details-marker{display:none}
  .more summary::after{content:"▼";font-size:44px;line-height:1;
    color:var(--act);flex:0 0 auto}
  .more[open] summary::after{content:"▲"}
  .mbody{max-width:100%;overflow-wrap:break-word;word-wrap:break-word}
  .row{font-size:31px;margin:24px 0;line-height:1.5;font-weight:600;color:var(--ink);
    max-width:100%;overflow-wrap:break-word}
  .row b{display:block;color:#fff;background:var(--sub);font-weight:800;
    font-size:24px;margin-bottom:12px;letter-spacing:.06em;
    padding:6px 16px;border-radius:8px;width:fit-content}
  .note{margin-top:22px;padding:20px;background:#F0EFEA;border-radius:14px;
    font-size:28px;line-height:1.55;max-width:100%;box-sizing:border-box;
    overflow-wrap:break-word}

  .tip{background:#FFF4E0;border:5px solid var(--waitline);border-radius:22px;
    padding:28px;margin-top:24px;font-size:32px;line-height:1.55;font-weight:600}
  .tip b{display:block;font-size:38px;margin-bottom:14px;color:var(--waitline);font-weight:900}

  .restmore{margin-top:34px;border-top:none}
  .restmore > summary{justify-content:center;border:5px dashed var(--line);
    border-radius:18px;padding:26px;color:var(--sub)}

  .skip{margin-bottom:32px}
  .skip summary{font-size:30px;font-weight:800;color:var(--sub);padding:28px 0;
    cursor:pointer;list-style:none;min-height:92px;display:flex;align-items:center}
  .skip summary{justify-content:space-between;gap:16px}
  .skip summary::-webkit-details-marker{display:none}
  .skip summary::after{content:"▼";font-size:40px;line-height:1;flex:0 0 auto}
  .skip[open] summary::after{content:"▲"}
  .mini{font-size:29px;color:var(--sub);padding:22px 0;border-top:3px solid var(--line);line-height:1.45}
  .mini small{font-size:26px}

  .restart{justify-content:center;font-size:38px;border-color:var(--sub);color:var(--sub)}
  .foot{margin-top:40px;padding-top:32px;border-top:4px solid var(--line);
    font-size:26px;color:var(--sub);line-height:1.6;font-weight:600}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<div class="wrap" id="app"></div>

<script>

/* ---------- 판정 엔진 (3값 논리) ---------- */
function evalRule(r,p){
  if(r.op==='AND'||r.op==='OR') return evalGroup(r,p);
  var a=p[r.f];
  if(a===undefined||a===UNKNOWN) return UNKNOWN;
  switch(r.op){
    case '>=': return a>=r.v;
    case '<=': return a<=r.v;
    case '==': return a===r.v;
    case '!=': return a!==r.v;
    case 'in': return r.v.indexOf(a)!==-1;
    default: return UNKNOWN;
  }
}
function evalGroup(g,p){
  var res=g.rules.map(function(r){return evalRule(r,p)});
  if(g.op==='AND'){
    if(res.indexOf(false)!==-1) return false;
    if(res.indexOf(UNKNOWN)!==-1) return UNKNOWN;
    return true;
  }
  if(res.indexOf(true)!==-1) return true;
  if(res.indexOf(UNKNOWN)!==-1) return UNKNOWN;
  return false;
}
function blockers(r,p,out){
  out=out||{failed:[],unknown:[]};
  if(r.op==='AND'||r.op==='OR'){ r.rules.forEach(function(x){blockers(x,p,out)}); return out; }
  var v=evalRule(r,p);
  if(v===false) out.failed.push(r.f);
  if(v===UNKNOWN) out.unknown.push(r.f);
  return out;
}

function inSeason(p){
  if(!p.season || p.season==='always') return true;
  var m=new Date().getMonth()+1;
  return p.season.indexOf(m)!==-1;
}
function monthsUntil(p){
  if(!p.season || p.season==='always') return 0;
  var m=new Date().getMonth()+1, best=99;
  p.season.forEach(function(s){ var d=(s-m+12)%12; if(d<best) best=d; });
  return best;
}
function diagnose(profile){
  var out={eligible:[],maybe:[],ineligible:[],later:[],tips:[]};
  PROGRAMS.forEach(function(pg){
    var v=evalGroup(pg.rules,profile), b=blockers(pg.rules,profile);
    var uniq=function(a){return a.filter(function(x,i){return a.indexOf(x)===i})};
    var item={p:pg,missing:uniq(b.unknown),failed:uniq(b.failed)};
    if(v===false){ out.ineligible.push(item); return; }
    if(!inSeason(pg)){ item.wait=monthsUntil(pg); out.later.push(item); return; }
    if(v===true) out.eligible.push(item);
    else out.maybe.push(item);
  });
  /* 중요도 순: 현금·돌봄처럼 삶에 큰 영향을 주는 것을 먼저 */
  /* 순서 기준: 지금 바로 신청해서 도움이 되는 것 → 상황이 생겼을 때 쓰는 것 */
  var PRIORITY={
    'basic-pension':0, 'ltc-apply':1, 'housing-support':2,
    'welfare-membership':2.5, 'pension-national':2.6,
    'care-custom':3, 'care-ltc':4, 'seoul-home-care':5,
    'meal-delivery':6, 'meal':7,
    'subway-free':8, 'health-checkup':9, 'vaccine':10, 'dementia-check':11,
    'job-public':12, 'job-service':13, 'job-market':14, 'job-place':15,
    'gyeongrodang':16, 'counsel':17, 'card':18,
    'senior-center-program':19, '50plus':20,
    /* 아래는 해당 상황이 생겼을 때 필요한 것 */
    'smart-safety':21, 'foodbank':22, 'banchan':23,
    'home-repair':24, 'energy-voucher':25,
    'welfare-device':26, 'long-term-care-insurance-reduce':27,
    'denture-implant':13.5, 'hearing-aid':13.6,
    'mental-health':17.5, 'legal-aid':18.5,
    /* 아래는 해당 상황이 생겼을 때 필요한 것 */
    'senior-protection':29,
    'emergency-support':30, 'eye-surgery':31, 'funeral-support':32
  };
  var order={verified:0,partial:1,unverified:2};
  [out.eligible,out.maybe].forEach(function(l){
    l.sort(function(a,b){
      var pa=PRIORITY[a.p.id], pb=PRIORITY[b.p.id];
      if(pa===undefined) pa=99; if(pb===undefined) pb=99;
      return pa-pb || order[a.p.conf]-order[b.p.conf];
    });
  });

  // 대체 경로 안내
  var jobs=PROGRAMS.filter(function(x){return x.category==='일자리'}).map(function(x){return x.id});
  var jobItems=out.ineligible.filter(function(i){return jobs.indexOf(i.p.id)!==-1});
  // 나이·거주지·거동 때문에 막힌 경우는 취업 안내가 무의미
  var hard=['age','residence_gu','mobility'];
  var blockedByHard=jobItems.some(function(i){
    return i.failed.some(function(f){return hard.indexOf(f)!==-1});
  });
  if(jobItems.length===jobs.length && !blockedByHard){
    out.tips.push({t:'일자리를 찾고 계신다면',
      m:'다른 일자리 사업은 어렵지만 취업알선형은 조건 제한이 없습니다. 영등포시니어클럽에 연중 상담할 수 있습니다.'});
  }
  if(profile.care_need===true && (profile.ltc_grade===null||profile.ltc_grade===UNKNOWN)){
    out.tips.push({t:'장기요양 등급을 먼저 신청해 보세요',
      m:'등급을 받으면 요양보호사 방문, 목욕 도움, 주야간 보호를 이용할 수 있습니다. 국민건강보험공단 1577-1000으로 전화하세요.'});
  }
  if(profile.mobility==='homebound'){
    out.tips.push({t:'집으로 찾아오는 서비스부터 신청하세요',
      m:'노인맞춤돌봄서비스와 찾아가는 상담은 직접 집으로 방문합니다. 도시락 배달도 요청할 수 있습니다.'});
  }
  return out;
}

var HERO_SVG='<svg viewBox="0 0 400 210" role="img" aria-label="어르신과 상담원이 지원 목록을 함께 보는 그림"><rect x="150" y="26" width="128" height="160" rx="10" fill="#fff" stroke="#000" stroke-width="6"/><rect x="170" y="52" width="60" height="11" rx="5" fill="#0C6152"/><rect x="170" y="80" width="88" height="10" rx="5" fill="#C9C7C0"/><rect x="170" y="104" width="88" height="10" rx="5" fill="#C9C7C0"/><rect x="170" y="128" width="88" height="10" rx="5" fill="#C9C7C0"/><circle cx="252" cy="150" r="26" fill="#0E6428" stroke="#fff" stroke-width="5"/><path d="M240 150l8 9 16-18" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="72" cy="74" r="30" fill="#fff" stroke="#000" stroke-width="6"/><path d="M46 74a26 26 0 0152 0" fill="none" stroke="#8A4B00" stroke-width="7" stroke-linecap="round"/><path d="M30 186c0-30 19-48 42-48s42 18 42 48z" fill="#8A4B00" stroke="#000" stroke-width="6" stroke-linejoin="round"/><circle cx="330" cy="74" r="30" fill="#fff" stroke="#000" stroke-width="6"/><path d="M288 186c0-30 19-48 42-48s42 18 42 48z" fill="#0C6152" stroke="#000" stroke-width="6" stroke-linejoin="round"/></svg>';

var actx=null;
function ensureAudio(){
  try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state!=='running') actx.resume();
  }catch(e){}
}

/* iOS는 한 번의 탭에 딸린 '사용자 제스처'를 하나의 자원처럼 다룬다.
   전화 링크 위에서 오디오를 재개하면 그 제스처가 오디오에 소비된 것으로
   처리되어, 뒤따르는 tel: 이동이 '자동 전화'로 차단된다.
   따라서 링크 위에서는 오디오에 손대지 않는다. */
function isPhoneTarget(el){
  return !!(el && el.closest && el.closest('a[href^="tel:"]'));
}

document.addEventListener('visibilitychange',function(){
  if(!document.hidden) ensureAudio();
});
window.addEventListener('pageshow',ensureAudio);
window.addEventListener('focus',ensureAudio);
document.addEventListener('touchstart',function(e){
  if(isPhoneTarget(e.target)) return;
  ensureAudio();
},{passive:true});

function tick(el){
  if(isPhoneTarget(el)) return;   // 전화 버튼에서는 소리를 내지 않는다
  try{
    if(!actx || actx.state!=='running') return;  // 여기서 resume하지 않는다
    var o=actx.createOscillator(), g=actx.createGain();
    o.frequency.value=660; o.type='sine';
    g.gain.setValueAtTime(0.10, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.09);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+0.09);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate(30);
}

var DATA_CHECKED='2026-07-19';
function monthsSinceCheck(){
  var d=new Date(DATA_CHECKED), now=new Date();
  return (now.getFullYear()-d.getFullYear())*12 + (now.getMonth()-d.getMonth());
}

function renderTitle(){
  window.scrollTo(0,0);
  var stale=monthsSinceCheck();
  var h='<div class="title">'+
    '<div class="hero">'+HERO_SVG+
      '<h1>받을 수 있는<br>도움 찾기</h1>'+
      '<p>몇 가지만 여쭤보고<br>알려드립니다</p>'+
    '</div>';

  if(stale>=6){
    h+='<div class="stale">이 정보는 '+stale+'개월 전에 확인한 것입니다. '+
       '조건이 바뀌었을 수 있으니 신청 전에 꼭 전화로 물어보세요.</div>';
  }

  h+='<div class="steps">'+
     '<div class="stepline"><i>1</i>질문에 답하기</div>'+
     '<div class="stepline"><i>2</i>받을 수 있는 것 보기</div>'+
     '<div class="stepline"><i>3</i>전화로 신청하기</div>'+
     '</div>'+
     '<div class="cover">지원사업 '+PROGRAMS.length+'가지를 담았습니다.<br>'+
     '이것이 전부는 아닙니다.<br>'+
     '더 궁금하시면 영등포구청<br>02-2670-3408<br><br>'+
     '확인일 '+DATA_CHECKED.replace(/-/g,'. ')+'</div>'+
     '</div>'+
     '<div class="startbar"><button class="start" id="go">시작하기</button></div>';
  app.innerHTML=h;
  var b=document.getElementById('go');
  b.onclick=function(){
    if(b.dataset.done) return;
    b.dataset.done='1'; b.classList.add('chosen'); tick(b);
    setTimeout(function(){ state.started=true; render(); },180);
  };
}

function visibleQuestions(){
  return QUESTIONS.filter(function(q){
    if(!q.showIf) return true;
    return state.profile[q.showIf.f]===q.showIf.v;
  });
}

function render(){
  if(!state.started){ renderTitle(); return; }
  window.scrollTo(0,0);
  var list=visibleQuestions();
  if(state.idx>=list.length){ renderResult(); return; }
  var q=list[state.idx];
  var pct=Math.round(state.idx/list.length*100);

  var h='';
  h+='<div class="topbar">'+
     '<button class="backbtn" id="back" aria-label="앞으로">←</button>'+
     '<div class="step">'+list.length+'개 중 '+(state.idx+1)+'번째</div>'+
     '</div>'+
     '<div class="bar"><i style="width:'+pct+'%"></i></div>'+
     '<h1>'+esc(q.q)+'</h1>'+
     (q.hint?'<p class="hint">'+esc(q.hint)+'</p>':'')+
     '<div class="opts" id="opts"></div>';
  app.innerHTML=h;

  var box=document.getElementById('opts');
  q.opts.forEach(function(o){
    var b=mkBtn(o.t, function(){ answer(q.field,o.v); });
    if(o.dim) b.className='dim';
    box.appendChild(b);
  });

  var bk=document.getElementById('back');
  if(bk) bk.onclick=function(){
    tick(bk);
    if(state.idx===0){ state.started=false; render(); return; }
    var prev=state.history.pop();
    if(prev) delete state.profile[prev];
    state.idx--;
    render();
  };
}

function mkBtn(text,fn){
  var b=document.createElement('button');
  b.innerHTML='<span>'+esc(text)+'</span>';
  b.onclick=function(){
    if(b.dataset.done) return;
    b.dataset.done='1';
    b.classList.add('chosen');
    tick(b);
    setTimeout(fn,180); // 눌린 상태를 보여준 뒤 이동
  };
  return b;
}

function answer(field,val){
  state.profile[field]=val;
  state.history.push(field);
  state.idx++;
  render();
}

var PHONE_ICON='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.4.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg>';

/* Safari는 한 사이트에서 tel: 시도가 몇 번 쌓이면 '자동 전화'로 보고 차단한다.
   웹에서 이를 우회할 방법은 없다. 그래서 전화 버튼은 그대로 두되,
   차단되더라도 어르신이 번호를 보고 직접 걸 수 있게 항상 크게 병기한다. */
function telUI(tel){
  var digits=tel.replace(/[^0-9]/g,'');
  return '<a class="tel" href="tel:'+digits+'" data-tel="'+esc(tel)+'">'+
      '<span class="lab">'+PHONE_ICON+'전화 걸기</span>'+
      '<span class="num">'+esc(tel)+'</span></a>';
}

/* 전화 버튼을 눌렀는데도 화면이 그대로면 차단된 것으로 보고,
   그때만 도움말을 보여준다. 평소에는 아무것도 띄우지 않는다. */
document.addEventListener('click',function(e){
  var a=e.target.closest && e.target.closest('a.tel');
  if(!a || a.dataset.watching) return;
  a.dataset.watching='1';
  var left=false;
  var onHide=function(){ left=true; };
  document.addEventListener('visibilitychange',onHide,{once:true});
  setTimeout(function(){
    document.removeEventListener('visibilitychange',onHide);
    delete a.dataset.watching;
    if(left) return;                       // 전화 앱으로 넘어갔음 → 정상
    if(a.nextElementSibling &&
       a.nextElementSibling.className==='telalt') return;
    var d=document.createElement('div');
    d.className='telalt';
    d.innerHTML='<span>전화가 걸리지 않았습니다.<br>이 번호로 직접 걸어 주세요.</span>'+
      '<button class="tcopy" data-tel="'+a.dataset.tel+'">번호 복사</button>';
    a.parentNode.insertBefore(d, a.nextSibling);
  },1500);
});

document.addEventListener('click',function(e){
  var b=e.target.closest && e.target.closest('.tcopy');
  if(!b) return;
  var tel=b.getAttribute('data-tel');
  var done=function(){ b.textContent='복사했습니다';
    setTimeout(function(){ b.textContent='번호 복사'; },1600); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(tel).then(done,function(){});
  }else{
    var ta=document.createElement('textarea');
    ta.value=tel; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); done(); }catch(err){}
    document.body.removeChild(ta);
  }
});

function card(item,kind,n){
  var p=item.p;
  var unver=(p.conf==='unverified');
  var badge = p.needs_review
      ? '<span class="badge b-wait">변경됨</span>'
      : (kind==='good'
          ? '<span class="badge b-ok">신청 가능</span>'
          : '<span class="badge b-wait">확인 필요</span>');

  var h='<div class="card">'+badge+'<div class="cnum">'+n+'</div>'+
        '<h2>'+esc(p.name)+'</h2>'+
        '<p class="sum">'+esc(p.summary)+'</p>';

  if(p.tel) h+=telUI(p.tel);

  if(p.needs_review) h+='<div class="warn">이 사업의 안내가 최근 바뀌었습니다.<br>꼭 전화로 확인해 주세요.</div>';
  else if(unver) h+='<div class="warn">이 사업은 조건이 확실하지 않습니다.<br>신청 전에 꼭 전화로 물어보세요.</div>';
  else if(kind==='maybe' && item.missing.length){
    var q=item.missing.map(function(f){return ASK_KO[f]||FIELD_KO[f]||f});
    var show=q.slice(0,3);
    h+='<div class="warn">전화해서 이렇게 물어보세요<br><br>'+
       show.map(function(s){return '\u201c'+esc(s)+'?\u201d'}).join('<br>')+
       (q.length>3 ? '<br>\u201c그 밖에 조건이 더 있나요?\u201d' : '')+
       '</div>';
  }

  h+='<details class="more"><summary>자세히 보기</summary><div class="mbody">'+
     '<div class="row"><b>받는 것</b>'+esc(p.benefit)+'</div>'+
     '<div class="row"><b>신청 방법</b>'+esc(p.how)+'</div>'+
     '<div class="row"><b>신청 시기</b>'+esc(p.when)+'</div>';
  if(p.notes && p.notes.length) h+='<div class="note">'+p.notes.map(esc).join('<br><br>')+'</div>';
  h+='</div></details></div>';
  return h;
}

function renderResult(){
  var r=diagnose(state.profile);
  var now=r.eligible.length+r.maybe.length;

  var h='<div class="rtop"><h1>'+now+'가지를<br>찾았습니다</h1>'+
        '<p>지금 신청할 수 있는 것만<br>모았습니다.</p></div>';

  var n=0, TOP=4;

  if(r.eligible.length){
    var head=r.eligible.slice(0,TOP), rest=r.eligible.slice(TOP);
    h+='<div class="sec">';
    head.forEach(function(i){ h+=card(i,'good',++n) });
    if(rest.length){
      /* 나머지는 분야별로 묶어서 접어 둔다 */
      var byCat={}, order=[];
      rest.forEach(function(i){
        var c=i.p.category||'기타';
        if(!byCat[c]){ byCat[c]=[]; order.push(c); }
        byCat[c].push(i);
      });
      h+='<details class="more restmore"><summary>이것도 받으실 수 있어요 ('+rest.length+'개)</summary><div>';
      order.forEach(function(c){
        h+='<div class="catlabel">'+esc(c)+'</div>';
        byCat[c].forEach(function(i){ h+=card(i,'good',++n) });
      });
      h+='</div></details>';
    }
    h+='</div>';
  }

  if(r.maybe.length){
    h+='<div class="sec">';
    r.maybe.forEach(function(i){ h+=card(i,'maybe',++n) });
    h+='</div>';
  }

  if(!now){
    h+='<div class="sec"><div class="tip"><b>맞는 사업을 찾지 못했습니다</b>'+
       '영등포구청에 전화하시면<br>다른 도움을 알려드립니다.'+
       telUI('02-2670-3408')+'</div></div>';
  }

  if(r.tips.length){
    h+='<div class="sec">';
    r.tips.forEach(function(t){
      h+='<div class="tip"><b>'+esc(t.t)+'</b>'+esc(t.m)+'</div>';
    });
    h+='</div>';
  }

  /* 지금은 모집 기간이 아닌 사업 — 접어서 별도 안내 */
  if(r.later.length){
    var w=Math.min.apply(null, r.later.map(function(i){return i.wait}));
    h+='<details class="skip"><summary>가을에 신청하는 일자리 '+r.later.length+'개</summary>';
    h+='<div class="mini"><b>지금은 모집 기간이 아닙니다.</b><br>'+
       '<small>약 '+w+'개월 뒤인 11~12월에 모집합니다. 그때 다시 확인해 보세요.</small></div>';
    r.later.forEach(function(i){
      h+='<div class="mini">'+esc(i.p.name)+'<br><small>'+esc(i.p.when)+'</small></div>';
    });
    h+='</details>';
  }

  if(r.ineligible.length){
    h+='<details class="skip"><summary>해당 안 되는 사업 '+r.ineligible.length+'개</summary>';
    r.ineligible.forEach(function(i){
      var why=i.failed.map(function(f){return FIELD_KO[f]||f}).join(', ');
      h+='<div class="mini">'+esc(i.p.name)+'<br><small>'+esc(why)+' 조건에서 해당되지 않습니다</small></div>';
    });
    h+='</details>';
  }

  h+='<button class="restart" id="again">처음부터 다시</button>';
  h+='<div class="foot">이 안내는 참고용입니다.<br>'+
     '실제 신청 자격은 담당 기관에서 정합니다.<br><br>'+
     '2026년 7월 확인<br>영등포구청 · 보건복지부 · 서울시 자료</div>';

  app.innerHTML=h;
  document.getElementById('again').onclick=function(){
    tick(this); state={idx:0,profile:{},history:[],started:false}; render();
  };
  document.querySelectorAll('details').forEach(function(d){
    d.addEventListener('toggle',function(){ if(d.open) tick(d); });
  });
}

/* 외부 데이터 우선 로드 — programs-live.json만 교체하면 요건 갱신 가능.
   실패 시 내장 데이터로 동작하므로 오프라인에서도 앱이 죽지 않는다. */
fetch('programs-live.json?t='+Date.now())
  .then(function(r){ if(!r.ok) throw 0; return r.json(); })
  .then(function(d){
    if(d && d.programs && d.programs.length){
      PROGRAMS = d.programs;
      if(d.checked_at) DATA_CHECKED = d.checked_at;
      if(!state.started) renderTitle();
    }
  })
  .catch(function(){ /* 내장 데이터 유지 */ });

render();
</script>
