<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B4A6B">
<title>영등포 어르신 복지 찾기</title>
<style>
  /* 영등포 어르신 복지 찾기
     인상: 공공기관 안내문의 단정함.
     원칙 — 크기는 유지, 굵기는 두 단계(400/700)로 제한,
     장식은 최소화, 위계는 크기·여백·색으로만 만든다.
     본문 대비 7:1 이상 유지. */
  :root{
    /* 팔레트: 짙은 한색 계열(청록·남청)에 따뜻한 황토를 대비색으로.
       모든 색은 명도를 낮게 잡아 배경 대비 9:1 이상을 유지한다.
       — 색을 쓰되 시인성을 잃지 않는다. */

    /* 텍스트 3단계 */
    --ink:#141A1F;
    --ink-2:#3F4A54;
    --ink-3:#6B757E;

    /* 지면 */
    --paper:#FBF9F4;      /* 미색 종이 */
    --card:#FFFFFF;
    --rule:#DFD9CD;
    --rule-2:#EFEAE0;

    /* 구조 — 남청 */
    --deep:#183753;
    --deep-2:#0F2537;
    --deep-pale:#EDF1F6;

    /* 행동 — 청록 (전화·주요 버튼) */
    --act:#0B4F42;
    --act-2:#073830;
    --act-pale:#EEF3F1;

    /* 강조 — 황토 (따뜻함을 주는 유일한 난색) */
    --accent:#8A5A18;
    --accent-pale:#FBF3E4;

    /* 상태 */
    --ok:#0E6428;
    --wait:#8A4B00;
    --wait-pale:#FBF3E4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%;overflow-x:hidden;width:100%;
    scroll-padding-bottom:calc(120px + env(safe-area-inset-bottom));
    overscroll-behavior-x:none;touch-action:pan-y}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    font-size:34px;line-height:1.6;font-weight:400;
    word-break:keep-all;overflow-x:hidden;width:100%;
    overscroll-behavior-x:none;touch-action:pan-y;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;width:100%;
    padding:24px 24px calc(56px + env(safe-area-inset-bottom));
    min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
  .wrap *{max-width:100%}
  .wrap svg{max-width:none}
  a,button,summary{touch-action:auto}

  /* 상단 식별 */
  .apphead{position:sticky;top:0;z-index:50;
    background:var(--deep);color:#fff;
    padding:calc(16px + env(safe-area-inset-top)) 24px 16px;
    border-bottom:3px solid var(--accent);
    font-size:26px;font-weight:700;letter-spacing:.02em;
    display:flex;align-items:center;gap:12px}
  .apphead .dotmark{width:13px;height:13px;border-radius:50%;
    background:rgba(255,255,255,.85);flex:0 0 13px}

  /* 타이틀 */
  .title{display:flex;flex-direction:column;padding:12px 0 184px}
  .hero{background:var(--card);border:1px solid var(--rule);border-radius:4px;
    border-top:5px solid var(--deep);
    padding:38px 26px 36px;text-align:center;margin-bottom:36px}
  .hero svg{width:100%;max-width:260px;height:auto;display:block;margin:0 auto 28px}
  .hero h1{font-size:56px;line-height:1.14;margin:0 0 18px;font-weight:700;
    letter-spacing:-.04em}
  .hero p{font-size:30px;color:var(--ink-2);margin:0;line-height:1.45;font-weight:400}

  .steps{margin-bottom:36px;padding:0 4px}
  .stepline{display:flex;align-items:center;gap:22px;font-size:30px;
    font-weight:400;padding:22px 0;border-bottom:1px solid var(--rule)}
  .stepline:last-child{border-bottom:none}
  .stepline i{flex:0 0 46px;width:46px;height:46px;border-radius:50%;
    background:var(--accent-pale);color:var(--accent);
    border:1px solid var(--accent);font-style:normal;font-weight:700;
    font-size:24px;display:flex;align-items:center;justify-content:center}

  .cover{font-size:25px;color:var(--ink-3);line-height:1.65;font-weight:400;
    border-top:1px solid var(--rule);padding:26px 4px 0}
  .stale{background:var(--wait-pale);border-left:3px solid var(--wait);
    padding:22px 24px;margin-bottom:30px;font-size:27px;line-height:1.5;
    color:var(--ink-2)}

  /* 진행 */
  .topbar{display:flex;align-items:center;gap:18px;margin-bottom:20px;min-height:68px}
  .backbtn{width:68px;height:68px;min-height:68px;flex:0 0 68px;padding:0;
    font-size:32px;font-weight:400;line-height:1;
    border:1px solid var(--rule);border-radius:50%;background:var(--card);color:var(--ink-2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;aspect-ratio:1/1}
  .backbtn:active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .backspacer{width:68px;flex:0 0 68px}
  .step{font-size:26px;font-weight:400;color:var(--ink-3);letter-spacing:.03em}

  .bar{height:5px;background:var(--rule);overflow:hidden;margin-bottom:46px}
  .bar > i{display:block;height:100%;background:var(--accent);
    transition:width .4s cubic-bezier(.4,0,.2,1)}

  h1{font-size:52px;line-height:1.22;font-weight:700;margin:0 0 18px;letter-spacing:-.04em}
  .hint{font-size:28px;color:var(--ink-2);margin:0 0 24px;padding:0 0 0 20px;
    border-left:3px solid var(--accent);line-height:1.5;font-weight:400}

  /* 선택 버튼 */
  .opts{display:flex;flex-direction:column;gap:14px;padding-top:18px}
  button{font-family:inherit;font-size:38px;font-weight:400;
    min-height:120px;padding:24px 28px;border:1px solid var(--rule);border-radius:4px;
    background:var(--card);color:var(--ink);width:100%;text-align:left;cursor:pointer;
    display:flex;align-items:center;
    transition:background .14s ease,border-color .14s ease}
  button:active{background:var(--deep);border-color:var(--deep);color:#fff}
  button.chosen{background:var(--deep);border-color:var(--deep);color:#fff}
  button:focus-visible{outline:3px solid var(--act);outline-offset:2px}
  button.dim{color:var(--ink-3);font-size:31px;min-height:96px}
  button.dim:active,button.dim.chosen{background:var(--ink-2);border-color:var(--ink-2);color:#fff}

  /* 결과 머리말 */
  .rtop{padding:8px 0 30px;border-bottom:1px solid var(--ink);margin-bottom:40px}
  .rtop h1{font-size:56px;margin-bottom:18px}
  .rtop p{margin:0;font-size:28px;color:var(--ink-2);line-height:1.5;font-weight:400}

  /* 통합창구 — 유일한 강조 */
  .gatebox{background:var(--deep);color:#fff;border-radius:4px;max-width:100%;
    border-top:5px solid var(--accent);
    padding:36px 22px 30px;margin-bottom:48px;box-sizing:border-box}
  .gatetitle{font-size:38px;font-weight:700;line-height:1.2;
    margin-bottom:14px;letter-spacing:-.035em}
  .gatesub{font-size:26px;margin:0 0 28px;line-height:1.45;
    font-weight:400;color:rgba(255,255,255,.82)}
  .gcard{background:var(--card);border-radius:3px;padding:28px 18px 24px;margin-top:14px;
    color:var(--ink);max-width:100%;box-sizing:border-box}
  .gcard h2{font-size:34px;font-weight:700;margin:0 0 14px;line-height:1.28;
    letter-spacing:-.03em;display:block}
  .gcard h2 .cicon{display:block;margin:0 0 12px;width:40px;height:40px}
  .gcard .sum{font-size:27px;color:var(--ink-2);margin:0 0 22px;line-height:1.5;font-weight:400}

  .sec{margin-bottom:44px;max-width:100%}
  .seclead{font-size:26px;font-weight:700;color:var(--ink-3);
    margin:0 0 10px;padding-left:2px;letter-spacing:.06em}
  .secsub{font-size:26px;color:var(--ink-2);margin:0 0 6px;font-weight:400}

  /* 카드 — 테두리 하나, 그림자 없음 */
  .card{background:var(--card);border:1px solid var(--rule);border-radius:4px;
    border-left:5px solid var(--deep);
    padding:52px 20px 28px 22px;margin-top:36px;position:relative;
    max-width:100%;box-sizing:border-box;overflow-wrap:break-word}
  .badge{position:absolute;top:-1px;right:-1px;max-width:calc(100% - 24px);
    white-space:nowrap;overflow:hidden;color:#fff;
    font-size:24px;font-weight:700;padding:9px 18px;
    letter-spacing:.02em;border-radius:0 3px 0 4px}
  .b-ok{background:var(--ok)}
  .b-wait{background:var(--wait)}
  .card:has(.b-ok){border-left-color:var(--ok)}
  .card:has(.b-wait){border-left-color:var(--wait)}
  .cnum{position:absolute;top:14px;left:20px;color:var(--ink-3);
    font-size:23px;font-weight:700;letter-spacing:.06em}
  .card h2{font-size:38px;font-weight:700;margin:6px 0 16px;line-height:1.28;
    letter-spacing:-.035em;overflow-wrap:break-word;max-width:100%;
    display:block}
  .card h2 .cicon{display:block;margin:0 0 14px;width:44px;height:44px}
  .card .sum{font-size:28px;color:var(--ink-2);margin:0 0 24px;line-height:1.55;font-weight:400}

  /* 전화 */
  .tel{display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;width:100%;max-width:100%;box-sizing:border-box;
    min-height:116px;padding:18px 12px;
    background:var(--act);color:#fff;border-radius:4px;
    text-decoration:none;margin-top:6px}
  .tel .lab{display:flex;align-items:center;gap:10px;
    font-size:23px;font-weight:400;color:rgba(255,255,255,.8);letter-spacing:.03em}
  .tel .num{font-weight:700;letter-spacing:-.01em;line-height:1.15;
    max-width:100%;white-space:nowrap;font-size:clamp(26px, 8.2vw, 38px)}
  .tel svg{width:26px;height:26px;flex:0 0 26px;fill:currentColor}
  .tel:active{background:var(--act-2)}
  .gcard .tel{background:var(--act)}
  .gcard .tel .num{font-size:clamp(24px, 7.2vw, 34px)}
  .gcard .tel:active{background:var(--act-2)}
  @media (max-width:380px){ .tel .lab{font-size:21px} }

  .telalt{display:flex;align-items:center;justify-content:space-between;gap:14px;
    margin-top:12px;padding:18px;background:var(--wait-pale);
    border-left:3px solid var(--wait);
    font-size:24px;color:var(--ink-2);font-weight:400;line-height:1.45}
  .telalt .tcopy{flex:0 0 auto;min-height:58px;padding:10px 20px;
    font-size:23px;font-weight:700;border:1px solid var(--act);
    border-radius:3px;background:#fff;color:var(--act);width:auto}
  .telalt .tcopy:active{background:var(--act);color:#fff}

  .warn{margin-top:22px;padding:20px 22px;background:var(--wait-pale);
    font-size:26px;line-height:1.5;border-left:3px solid var(--wait);
    color:var(--ink-2);max-width:100%;box-sizing:border-box;overflow-wrap:break-word}

  /* 자세히 보기 */
  .more{margin-top:24px;border-top:1px solid var(--rule-2);padding-top:2px}
  .more summary{font-size:28px;font-weight:400;color:var(--ink-2);
    padding:24px 0;cursor:pointer;list-style:none;min-height:80px;
    display:flex;align-items:center;justify-content:space-between;gap:16px}
  .more summary::-webkit-details-marker{display:none}
  .more summary::after{content:"▼";font-size:24px;line-height:1;flex:0 0 auto;
    transition:transform .22s ease;transform-origin:center}
  .more[open] > summary::after{transform:rotate(180deg)}
  .mbody{max-width:100%;overflow-wrap:break-word;padding-bottom:8px}
  .row{font-size:28px;margin:24px 0;line-height:1.55;font-weight:400;
    max-width:100%;overflow-wrap:break-word}
  .row b{display:block;color:var(--ink-3);font-weight:700;
    font-size:22px;margin-bottom:6px;letter-spacing:.08em}
  .row > span{display:block}
  .note{margin-top:20px;padding:20px 22px;background:var(--accent-pale);
    font-size:26px;line-height:1.55;max-width:100%;box-sizing:border-box;
    overflow-wrap:break-word;border-left:3px solid var(--accent)}

  .tip{background:var(--card);border:1px solid var(--rule);
    border-left:3px solid var(--act);border-radius:4px;
    padding:26px 24px;margin-top:20px;font-size:27px;line-height:1.55;font-weight:400;
    color:var(--ink-2)}
  .tip b{display:block;font-size:31px;margin-bottom:12px;color:var(--ink);font-weight:700}

  .catlabel{font-size:24px;font-weight:700;color:var(--accent);
    margin:48px 0 -18px;padding-left:2px;letter-spacing:.1em;
    display:flex;align-items:center}

  .restmore{margin-top:36px;border-top:none}
  .restmore > summary{justify-content:center;border:1px solid var(--rule);
    border-radius:4px;padding:26px;color:var(--ink-2);background:var(--card)}

  .skip{margin-bottom:32px}
  .skip summary{font-size:26px;font-weight:400;color:var(--ink-3);padding:26px 0;
    cursor:pointer;list-style:none;min-height:80px;
    display:flex;align-items:center;justify-content:space-between;gap:16px}
  .skip summary::-webkit-details-marker{display:none}
  .skip summary::after{content:"▼";font-size:22px;line-height:1;flex:0 0 auto;
    transition:transform .22s ease;transform-origin:center}
  .skip[open] > summary::after{transform:rotate(180deg)}
  .mini{font-size:26px;color:var(--ink-2);padding:22px 0;
    border-top:1px solid var(--rule-2);line-height:1.45}
  .mini small{font-size:23px;color:var(--ink-3)}

  .startbar{position:fixed;left:0;right:0;bottom:0;z-index:60;
    max-width:100vw;box-sizing:border-box;
    background:var(--paper);border-top:1px solid var(--rule);
    padding:18px 24px calc(18px + env(safe-area-inset-bottom))}
  .startbar .start{margin:0 auto;max-width:820px}
  .start{background:var(--act);border-color:var(--act);color:#fff;
    justify-content:center;font-size:38px;font-weight:700;min-height:108px}
  .start:active{background:var(--act-2);border-color:var(--act-2);color:#fff}

  .restart{justify-content:center;font-size:30px;color:var(--ink-2);margin-top:10px}
  .foot{margin-top:44px;padding-top:30px;border-top:1px solid var(--rule);
    font-size:23px;color:var(--ink-3);line-height:1.7;font-weight:400}

  .cicon{width:1.05em;height:1.05em;flex:0 0 auto;vertical-align:-.14em;
    margin-right:.32em;fill:none;stroke:var(--deep);stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}
  .cicon.icon-fill{fill:var(--deep);stroke:none}
  .catlabel .cicon{stroke:var(--accent);stroke-width:2;margin-right:.3em}
  .catlabel .cicon.icon-fill{fill:var(--accent)}
  .gcard .cicon{stroke:var(--act)}
  .gcard .cicon.icon-fill{fill:var(--act)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

/* ══════════════════════════════════════════════
   THEME B — 큰 타이포 · 넓은 여백 · 면 강조
   레이아웃은 미니멀, 타이포는 맥시멀.
   제목과 본문의 크기 대비를 3배 이상으로 벌린다.
   ══════════════════════════════════════════════ */
body.theme-b{
  --ink:#191F28;        /* 제목 */
  --ink-2:#333D4B;      /* 본문 */
  --ink-3:#6B7684;      /* 보조 */
  --paper:#F7F8FA;      /* 바탕 */
  --card:#FFFFFF;
  --rule:#ECEEF2;       /* 구분선 */
  --rule-2:#F2F4F6;
  --shadow-sm:0 1px 3px rgba(25,31,40,.04), 0 4px 12px rgba(25,31,40,.04);
  --deep:#0A0D12;
  --deep-2:#000000;
  --deep-pale:#F2F4F6;
  --act:#0B5FFF;
  --act-2:#0048CC;
  --act-pale:#EDF3FF;
  --accent:#0B5FFF;
  --accent-pale:#EDF3FF;
  --ok:#00753F;
  --wait:#B35C00;
  --wait-pale:#FFF6E9;
  background:var(--paper);
  font-size:24px;line-height:1.6;font-weight:500;
  letter-spacing:-.02em;
}
body.theme-b .wrap{min-height:100dvh;padding:20px 20px calc(56px + env(safe-area-inset-bottom))}

/* 상단 — 최소한으로 */
body.theme-b .apphead{
  background:rgba(247,248,250,.9);backdrop-filter:blur(20px);
  color:var(--ink-2);border-bottom:1px solid var(--rule-2);
  padding:calc(11px + env(safe-area-inset-top)) 20px 11px;
  font-size:21px;font-weight:600;letter-spacing:-.01em;
}
body.theme-b .apphead .dotmark{
  width:10px;height:10px;background:var(--act);flex:0 0 10px;border-radius:50%
}

/* 타이틀 — 초대형 */
/* 시안 참고 — 파란 면 히어로 카드 */
body.theme-b .hero{
  background:var(--act);border:none;border-radius:22px;
  padding:28px 22px 26px;margin:4px 0 22px;text-align:left
}
body.theme-b .hero svg{max-width:88px;margin:0 0 22px;opacity:.95}
body.theme-b .hero svg *{stroke:#fff}
body.theme-b .hero h1{
  font-size:42px;font-weight:700;line-height:1.26;letter-spacing:-.04em;
  margin:0 0 14px;color:#fff
}
body.theme-b .hero p{
  font-size:23px;color:rgba(255,255,255,.86);line-height:1.55;font-weight:500
}

body.theme-b .steps{
  box-shadow:var(--shadow-sm);background:var(--card);border-radius:22px;padding:4px 22px;margin-bottom:22px
}
body.theme-b .stepline{
  font-size:22px;padding:15px 0;gap:16px;font-weight:600;min-height:64px;box-sizing:border-box;
  border-bottom:1px solid var(--rule);color:var(--ink)
}
body.theme-b .stepline i{
  width:42px;height:42px;flex:0 0 42px;border-radius:14px;border:none;
  background:var(--act-pale);color:var(--act);font-size:20px;font-weight:700
}
body.theme-b .cover{
  font-size:20px;line-height:1.65;color:var(--ink-3);
  border-top:none;background:var(--card);border-radius:20px;
  padding:26px;font-weight:500
}
body.theme-b .stale{
  background:var(--wait-pale);border:none;border-radius:20px;
  padding:18px 20px;font-size:22px;color:#9A5B00;font-weight:600
}

/* 진행 */
body.theme-b .topbar{min-height:56px;margin-bottom:18px;align-items:center}
body.theme-b .backbtn{
  width:56px;height:56px;min-height:56px;flex:0 0 56px;
  border:none;background:var(--card);color:var(--ink-2);font-size:26px;border-radius:18px;
  box-shadow:var(--shadow-sm)
}
body.theme-b .backbtn:active{background:var(--rule);color:var(--ink)}
body.theme-b .backspacer{width:56px;flex:0 0 56px}
body.theme-b .step{font-size:20px;letter-spacing:-.01em;color:var(--ink-3);font-weight:600}
body.theme-b .bar{height:6px;background:#E1E5EA;border-radius:99px;margin-bottom:28px}
body.theme-b .bar > i{background:var(--act);border-radius:99px}

body.theme-b h1{
  font-size:38px;font-weight:700;letter-spacing:-.035em;
  line-height:1.22;margin:0 0 28px
}
/* 설명문은 버튼으로 오인되지 않도록 카드 형태를 피한다 */
body.theme-b .hint{
  font-size:21px;color:var(--ink-2);background:transparent;
  border:none;border-left:4px solid var(--act);border-radius:0;
  padding:4px 0 4px 18px;margin:0 0 30px;font-weight:500;line-height:1.55
}

/* 선택 — 면으로 채운 큰 버튼 */
body.theme-b .opts{gap:12px;padding-top:6px;border-top:none}
body.theme-b button{
  font-size:26px;font-weight:600;min-height:76px;padding:18px 20px;
  border:none;border-radius:22px;background:var(--card);color:var(--ink);
  transition:transform .16s cubic-bezier(.2,0,.2,1),background .16s ease
}
body.theme-b button{box-shadow:var(--shadow-sm)}
body.theme-b button:active{background:var(--rule-2);transform:scale(.99)}
body.theme-b button.chosen{
  background:var(--act-pale);color:var(--act);
  box-shadow:inset 0 0 0 2px var(--act);transform:scale(.98)
}
body.theme-b button.chosen::after{
  content:"✓";margin-left:auto;font-size:26px;font-weight:700;color:var(--act)
}

/* ---------- 판정 엔진 (3값 논리) ---------- */
function evalRule(r,p){
  if(r.op==='AND'||r.op==='OR') return evalGroup(r,p);
  var a=p[r.f];
  if(a===undefined||a===UNKNOWN) return UNKNOWN;
  switch(r.op){
    case '>=': return a>=r.v;
    case '<=': return a<=r.v;
    case '==': return a===r.v;
    case '!=': return a!==r.v;
    case 'in': return r.v.indexOf(a)!==-1;
    default: return UNKNOWN;
  }
}
function evalGroup(g,p){
  var res=g.rules.map(function(r){return evalRule(r,p)});
  if(g.op==='AND'){
    if(res.indexOf(false)!==-1) return false;
    if(res.indexOf(UNKNOWN)!==-1) return UNKNOWN;
    return true;
  }
  if(res.indexOf(true)!==-1) return true;
  if(res.indexOf(UNKNOWN)!==-1) return UNKNOWN;
  return false;
}
function blockers(r,p,out){
  out=out||{failed:[],unknown:[]};
  if(r.op==='AND'||r.op==='OR'){ r.rules.forEach(function(x){blockers(x,p,out)}); return out; }
  var v=evalRule(r,p);
  if(v===false) out.failed.push(r.f);
  if(v===UNKNOWN) out.unknown.push(r.f);
  return out;
}

  var m=new Date().getMonth()+1;
  return p.season.indexOf(m)!==-1;
}
function monthsUntil(p){
  if(!p.season || p.season==='always') return 0;
  var m=new Date().getMonth()+1, best=99;
  p.season.forEach(function(s){ var d=(s-m+12)%12; if(d<best) best=d; });
  return best;
}
function diagnose(profile){
  var out={eligible:[],maybe:[],ineligible:[],later:[],tips:[]};
  PROGRAMS.forEach(function(pg){
    var v=evalGroup(pg.rules,profile), b=blockers(pg.rules,profile);
    var uniq=function(a){return a.filter(function(x,i){return a.indexOf(x)===i})};
    var item={p:pg,missing:uniq(b.unknown),failed:uniq(b.failed)};
    if(v===false){ out.ineligible.push(item); return; }
    if(!inSeason(pg)){ item.wait=monthsUntil(pg); out.later.push(item); return; }
    if(v===true) out.eligible.push(item);
    else out.maybe.push(item);
  });
  /* 중요도 순: 현금·돌봄처럼 삶에 큰 영향을 주는 것을 먼저 */
  /* 순서 기준: 지금 바로 신청해서 도움이 되는 것 → 상황이 생겼을 때 쓰는 것 */
  var PRIORITY={
    'basic-pension':0, 'ltc-apply':1, 'housing-support':2,
    'welfare-membership':2.5, 'pension-national':2.6,
    'care-custom':3, 'care-ltc':4, 'seoul-home-care':5,
    'meal-delivery':6, 'meal':7,
    'subway-free':8, 'health-checkup':9, 'vaccine':10, 'dementia-check':11,
    'job-public':12, 'job-service':13, 'job-market':14, 'job-place':15,
    'gyeongrodang':16, 'counsel':17, 'card':18,
    'senior-center-program':19, '50plus':20,
    /* 아래는 해당 상황이 생겼을 때 필요한 것 */
    'smart-safety':21, 'foodbank':22, 'banchan':23,
    'home-repair':24, 'energy-voucher':25,
    'welfare-device':26, 'long-term-care-insurance-reduce':27,
    'denture-implant':13.5, 'hearing-aid':13.6,
    'mental-health':17.5, 'legal-aid':18.5,
    /* 아래는 해당 상황이 생겼을 때 필요한 것 */
    'culture-card':19.5, 'welfare-edu':19.6,
    'senior-shop':20.5, 'centenarian-support':20.6,
    'senior-protection':29,
    'emergency-support':30, 'eye-surgery':31, 'funeral-support':32
  };
  var order={verified:0,partial:1,unverified:2};
  [out.eligible,out.maybe].forEach(function(l){
    l.sort(function(a,b){
      var pa=PRIORITY[a.p.id], pb=PRIORITY[b.p.id];
      if(pa===undefined) pa=99; if(pb===undefined) pb=99;
      return pa-pb || order[a.p.conf]-order[b.p.conf];
    });
  });

  // 대체 경로 안내
  var jobs=PROGRAMS.filter(function(x){return x.category==='일자리'}).map(function(x){return x.id});
  var jobItems=out.ineligible.filter(function(i){return jobs.indexOf(i.p.id)!==-1});
  // 나이·거주지·거동 때문에 막힌 경우는 취업 안내가 무의미
  var hard=['age','residence_gu','mobility'];
  var blockedByHard=jobItems.some(function(i){
    return i.failed.some(function(f){return hard.indexOf(f)!==-1});
  });
  if(jobItems.length===jobs.length && !blockedByHard){
    out.tips.push({t:'일자리를 찾고 계신다면',
      m:'다른 일자리 사업은 어렵지만 취업알선형은 조건 제한이 없습니다. 영등포시니어클럽에 연중 상담할 수 있습니다.'});
  }
  if(profile.care_need===true && (profile.ltc_grade===null||profile.ltc_grade===UNKNOWN)){
    out.tips.push({t:'장기요양 등급을 먼저 신청해 보세요',
      m:'등급을 받으면 요양보호사 방문, 목욕 도움, 주야간 보호를 이용할 수 있습니다. 국민건강보험공단 1577-1000으로 전화하세요.'});
  }
  if(profile.mobility==='homebound'){
    out.tips.push({t:'집으로 찾아오는 서비스부터 신청하세요',
      m:'노인맞춤돌봄서비스와 찾아가는 상담은 직접 집으로 방문합니다. 도시락 배달도 요청할 수 있습니다.'});
  }
  return out;
}

var actx=null;
function ensureAudio(){
  try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state!=='running') actx.resume();
  }catch(e){}
}

/* iOS는 한 번의 탭에 딸린 '사용자 제스처'를 하나의 자원처럼 다룬다.
   전화 링크 위에서 오디오를 재개하면 그 제스처가 오디오에 소비된 것으로
   처리되어, 뒤따르는 tel: 이동이 '자동 전화'로 차단된다.
   따라서 링크 위에서는 오디오에 손대지 않는다. */
function isPhoneTarget(el){
  return !!(el && el.closest && el.closest('a[href^="tel:"]'));
}

document.addEventListener('visibilitychange',function(){
  if(!document.hidden) ensureAudio();
});
window.addEventListener('pageshow',ensureAudio);
window.addEventListener('focus',ensureAudio);
document.addEventListener('touchstart',function(e){
  if(isPhoneTarget(e.target)) return;
  ensureAudio();
},{passive:true});

function tick(el){
  if(isPhoneTarget(el)) return;   // 전화 버튼에서는 소리를 내지 않는다
  try{
    if(!actx || actx.state!=='running') return;  // 여기서 resume하지 않는다
    var o=actx.createOscillator(), g=actx.createGain();
    o.frequency.value=660; o.type='sine';
    g.gain.setValueAtTime(0.10, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.09);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+0.09);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate(30);
}

document.addEventListener('click',function(e){
  var a=e.target.closest && e.target.closest('a.tel');

  a.dataset.watching='1';
  var left=false;
  var onHide=function(){ left=true; };
  document.addEventListener('visibilitychange',onHide,{once:true});
  setTimeout(function(){
    document.removeEventListener('visibilitychange',onHide);
    delete a.dataset.watching;
    if(left) return;                       // 전화 앱으로 넘어갔음 → 정상

       a.nextElementSibling.className==='telalt') return;

}

function renderResult(){
  var r=diagnose(state.profile);
  var now=r.eligible.length+r.maybe.length;

  var gateN=r.eligible.filter(function(i){return i.p.gateway}).length;
  var restN=r.eligible.length-gateN;

  var h='<div class="rtop"><h1><em>'+now+'</em>가지를 찾았습니다</h1>'+
        '<p>받을 가능성이 있는 복지와<br>상담처를 모았습니다.</p></div>';

  /* 요약 — 무엇을 먼저 해야 하는지 한눈에 */
  h+='<div class="summary">'+
     (gateN?'<div class="srow"><span>바로 전화할 곳</span><b>'+gateN+'곳</b></div>':'')+
     (r.maybe.length?'<div class="srow"><span>먼저 확인할 지원</span><b>'+r.maybe.length+'개</b></div>':'')+
     (restN?'<div class="srow"><span>신청할 수 있는 지원</span><b>'+restN+'개</b></div>':'')+
     '</div>';

  var n=0, TOP=4;

  /* 통합창구: 한 번의 전화로 여러 지원을 함께 처리해 주는 곳.
     42개를 각각 신청하는 부담을 줄여 주므로 맨 위에 따로 보여준다. */
  var gates=r.eligible.filter(function(i){ return i.p.gateway; });
  if(gates.length){
    h+='<div class="gatebox">'+
       '<div class="gatetitle">먼저 여기에 전화해 보세요</div>'+
       '<p class="gatesub">전화 한 번으로 받을 수 있는 지원을<br>함께 확인하고 연결해 드립니다.</p>';
    gates.forEach(function(i){
      h+='<div class="gcard"><h2>'+catIcon(i.p.category)+esc(i.p.name)+'</h2>'+
         '<p class="sum">'+esc(i.p.summary)+'</p>'+
         telUI(i.p.tel, i.p.org)+'</div>';
    });
    h+='</div>';
  }

  r.eligible = r.eligible.filter(function(i){ return !i.p.gateway; });

  if(r.eligible.length){
    var head=r.eligible.slice(0,TOP), rest=r.eligible.slice(TOP);
    h+='<div class="sec">';
    if(gates.length) h+='<div class="seclead">따로 신청하실 수 있는 것</div>';
    head.forEach(function(i){ h+=card(i,'good',++n) });
    if(rest.length){
      /* 나머지는 분야별로 묶어서 접어 둔다 */
      var byCat={}, order=[];
      rest.forEach(function(i){
        var c=i.p.category||'기타';
        if(!byCat[c]){ byCat[c]=[]; order.push(c); }
        byCat[c].push(i);
      });
      h+='<details class="more restmore"><summary>이것도 받으실 수 있어요 ('+rest.length+'개)</summary><div>';
      order.forEach(function(c){
        h+='<div class="catlabel">'+catIcon(c)+esc(c)+'</div>';
        byCat[c].forEach(function(i){ h+=card(i,'good',++n) });
      });
      h+='</div></details>';
    }
    h+='</div>';
  }

  if(r.maybe.length){
    h+='<div class="sec">';
    r.maybe.forEach(function(i){ h+=card(i,'maybe',++n) });
    h+='</div>';
  }

  if(!now){
    h+='<div class="sec"><div class="tip"><b>맞는 사업을 찾지 못했습니다</b>'+
       '영등포구청에 전화하시면<br>다른 도움을 알려드립니다.'+
       telUI('02-2670-3408')+'</div></div>';
  }

  if(r.tips.length){
    h+='<div class="sec">';
    r.tips.forEach(function(t){
      h+='<div class="tip"><b>'+esc(t.t)+'</b>'+esc(t.m)+'</div>';
    });
    h+='</div>';
  }

  /* 지금은 모집 기간이 아닌 사업 — 접어서 별도 안내 */
  if(r.later.length){
    var w=Math.min.apply(null, r.later.map(function(i){return i.wait}));
    h+='<details class="skip"><summary>가을에 신청하는 일자리 '+r.later.length+'개</summary>';
    h+='<div class="mini"><b>지금은 모집 기간이 아닙니다.</b><br>'+
       '<small>약 '+w+'개월 뒤인 11~12월에 모집합니다. 그때 다시 확인해 보세요.</small></div>';
    r.later.forEach(function(i){
      h+='<div class="mini">'+esc(i.p.name)+'<br><small>'+esc(i.p.when)+'</small></div>';
    });
    h+='</details>';
  }

  if(r.ineligible.length){
    h+='<details class="skip"><summary>해당 안 되는 사업 '+r.ineligible.length+'개</summary>';
    r.ineligible.forEach(function(i){
      var why=i.failed.map(function(f){return FIELD_KO[f]||f}).join(', ');
      h+='<div class="mini">'+esc(i.p.name)+'<br><small>'+esc(why)+' 조건에서 해당되지 않습니다</small></div>';
    });
    h+='</details>';
  }

  h+='<button class="restart" id="again">처음부터 다시</button>';
  h+='<div class="foot">이 안내는 참고용입니다.<br>'+
     '실제 신청 자격은 담당 기관에서 정합니다.<br><br>'+
     '2026년 7월 확인<br>영등포구청 · 보건복지부 · 서울시 자료</div>';

  app.innerHTML=h;
  document.getElementById('again').onclick=function(){
    if(!confirm('처음부터 다시 시작할까요?')) return;
    tick(this); state={idx:0,profile:{},history:[],started:false}; render();
  };
  document.querySelectorAll('details').forEach(function(d){
    d.addEventListener('toggle',function(){
      var s=d.querySelector(':scope > summary');
      if(s) s.setAttribute('aria-expanded', d.open?'true':'false');
      if(d.open) tick(d);
    });
  });
}

/* 외부 데이터 우선 로드 — programs-live.json만 교체하면 요건 갱신 가능.
   실패 시 내장 데이터로 동작하므로 오프라인에서도 앱이 죽지 않는다. */
fetch('programs-live.json?t='+Date.now())
  .then(function(r){ if(!r.ok) throw 0; return r.json(); })
  .then(function(d){
    if(d && d.programs && d.programs.length){
      PROGRAMS = d.programs;
      if(d.checked_at) DATA_CHECKED = d.checked_at;
      if(!state.started) renderTitle();
    }
  })
  .catch(function(){ /* 내장 데이터 유지 */ });

/* 디자인 A/B 전환 */
(function(){
  var t=document.getElementById('themetoggle');
  var b=false;
  try{ b = sessionStorage.getItem('theme')==='b'; }catch(e){}
  function apply(){
    document.body.classList.toggle('theme-b', b);
    t.textContent = b ? 'B' : 'A';
    try{ sessionStorage.setItem('theme', b?'b':'a'); }catch(e){}
  }
  t.addEventListener('click', function(e){
    e.stopPropagation();
    b=!b; apply();
  });
  apply();
})();

render();
</script>
</body>
</html>
