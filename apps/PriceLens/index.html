<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E3B2E">
<title>PriceLens — 사진으로 상품 찾기</title>
<meta name="description" content="상품을 촬영하면 같은 상품을 찾아드립니다.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root { --paper:#F5F6F2; --ink:#12241C; --pine:#0E3B2E; --pine-soft:#E4EEE8;
    --tag:#F25C1F; --tag-soft:#FDEBE1; --line:#D8DDD4; --muted:#5B6A61; --radius:18px; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.6; word-break:keep-all;
    max-width:480px; margin:0 auto; padding:0 20px calc(40px + env(safe-area-inset-bottom));}
  header{padding:calc(18px + env(safe-area-inset-top)) 0 14px; display:flex; align-items:center; gap:8px;
    border-bottom:1px solid var(--line)}
  .brand{font-weight:800; font-size:18px} .brand em{font-style:normal;color:var(--tag)}
  .disclosure{font-size:12px; color:var(--muted); padding:12px 0; border-bottom:2px solid var(--tag); line-height:1.55}
  .lede{padding:26px 0 20px; font-size:16px}
  .app-link{display:block; background:var(--pine); color:#fff; text-decoration:none; text-align:center;
    border-radius:18px; padding:20px; font-size:18px; font-weight:800; margin-bottom:28px}
  h2{font-size:16px; font-weight:800; margin-bottom:10px}
  .pick{display:flex; align-items:center; gap:14px; background:#fff; border:1.5px solid var(--tag);
    border-radius:var(--radius); padding:16px; text-decoration:none; color:var(--ink)}
  .pick-thumb{flex:none; width:52px; height:52px; border-radius:12px; background:var(--tag-soft);
    display:grid; place-items:center; font-size:24px}
  .pick b{display:block; font-size:15px} .pick small{color:var(--muted); font-size:12px}
  .pick-arrow{margin-left:auto; color:var(--tag); font-size:22px}
  footer{margin-top:36px; font-size:11px; color:var(--muted); line-height:1.6}
</style>
</head>
<body>
<header><span class="brand">Price<em>Lens</em></span></header>

<p class="disclosure">* 이 페이지는 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>

<p class="lede">상품을 촬영하면 같은 상품을 찾아드립니다.</p>

<a class="app-link" href="./app.html">📷 사진으로 상품 찾기</a>

<h2>추천 상품</h2>
<!-- PARTNERS_LINK: href를 발급받은 link.coupang.com 링크로 교체 -->
<a class="pick" href="#" rel="nofollow sponsored">
  <span class="pick-thumb">🧴</span>
  <span><b>추천 상품 준비 중</b><small>COUPANG · link.coupang.com</small></span>
  <span class="pick-arrow">›</span>
</a>

<footer>이 서비스의 상품 링크에는 쿠팡 파트너스 활동의 일환으로 제공되는 링크가 포함될 수 있으며, 이에 따라 일정액의 수수료를 제공받을 수 있습니다.<br>© 2026 PriceLens</footer>
</body>
</html>
