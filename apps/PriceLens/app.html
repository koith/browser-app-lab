<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0E3B2E">
<title>PriceLens — 사진으로 상품 찾기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root {
    --paper:#F5F6F2; --ink:#12241C; --pine:#0E3B2E; --pine-soft:#E4EEE8;
    --tag:#F25C1F; --line:#D8DDD4; --muted:#5B6A61; --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.5;
    padding:0 18px calc(30px + env(safe-area-inset-bottom)); word-break:keep-all;
    max-width:480px; margin:0 auto; min-height:100vh;
  }
  header{padding:calc(16px + env(safe-area-inset-top)) 0 8px; display:flex; align-items:center}
  .brand{font-weight:800; font-size:17px} .brand em{font-style:normal;color:var(--tag)}
  header a{color:var(--muted); text-decoration:none; font-size:13px; margin-left:auto}

  .screen{display:none} .screen.on{display:block}
  button{font-family:inherit; cursor:pointer; -webkit-tap-highlight-color:transparent; border:0}

  /* 홈: 큰 촬영 버튼 */
  #home{padding-top:8vh; text-align:center}
  #home .lede{color:var(--muted); font-size:15px; margin-bottom:26px}
  .btn-shoot{
    width:100%; background:var(--pine); color:#fff; border-radius:24px;
    padding:38px 20px; font-size:26px; font-weight:800;
    box-shadow:0 16px 34px -14px rgba(14,59,46,.5);
  }
  .btn-shoot span{display:block; font-size:44px; margin-bottom:8px}
  .btn-pick{
    margin-top:14px; width:100%; background:var(--pine-soft); color:var(--pine);
    border-radius:16px; padding:16px; font-size:16px; font-weight:700;
  }

  /* 로딩 */
  #loading{padding-top:16vh; text-align:center}
  #loading img{width:56%; max-height:200px; object-fit:contain; border-radius:16px; background:#000; margin-bottom:22px}
  .spinner{display:inline-block; width:22px; height:22px; border:3px solid var(--line);
    border-top-color:var(--pine); border-radius:50%; animation:sp .8s linear infinite; margin-bottom:10px}
  @keyframes sp{to{transform:rotate(360deg)}}
  #loading p{color:var(--muted); font-size:15px}

  /* 결과: 상품 1개 + 네/아니오 */
  #result{padding-top:12px; text-align:center}
  .match-img{
    width:100%; aspect-ratio:1; object-fit:contain; background:#fff;
    border:1px solid var(--line); border-radius:var(--radius); margin-bottom:14px;
  }
  .match-title{font-size:17px; font-weight:700; line-height:1.4; margin-bottom:4px}
  .match-src{font-size:13px; color:var(--muted); margin-bottom:18px}
  .best-strip{
    background:var(--pine-soft); color:var(--pine); border-radius:14px;
    padding:12px 14px; font-size:15px; font-weight:700; margin-bottom:16px;
  }
  .best-strip small{display:block; font-weight:600; font-size:12px; color:var(--muted); margin-top:3px}
  .ask{font-size:21px; font-weight:800; margin-bottom:16px}
  .yn{display:flex; gap:12px}
  .yn button{flex:1; border-radius:20px; padding:24px 10px; font-size:23px; font-weight:800}
  .btn-yes{background:var(--tag); color:#fff}
  .btn-no{background:#fff; color:var(--ink); border:2px solid var(--line)}
  .retry-hint{margin-top:14px; font-size:13px; color:var(--muted)}

  /* 재촬영 안내 */
  #retake{padding-top:10vh; text-align:center}
  #retake .big{font-size:21px; font-weight:800; margin-bottom:10px}
  #retake p{color:var(--muted); font-size:14.5px; margin-bottom:24px}
  .err{color:#C22F12; font-size:14px; margin-top:12px}

  footer{margin-top:34px; font-size:11px; color:var(--muted); text-align:center; line-height:1.6}
</style>
</head>
<body>

<header>
  <span class="brand">Price<em>Lens</em></span>
  <a href="./index.html">소개 ›</a>
</header>

<input type="file" id="camInput" accept="image/*" capture="environment" hidden>
<input type="file" id="fileInput" accept="image/*" hidden>

<div class="screen on" id="home">
  <p class="lede">상품을 찍으면 같은 상품을 찾아드립니다</p>
  <button class="btn-shoot" id="btnShoot"><span>📷</span>촬영하기</button>
  <button class="btn-pick" id="btnPick">🖼️ 사진 선택</button>
  <div class="err" id="homeErr"></div>
</div>

<div class="screen" id="loading">
  <img id="loadingImg" alt="">
  <div><span class="spinner"></span></div>
  <p>같은 상품을 찾는 중…</p>
</div>

<div class="screen" id="result">
  <img class="match-img" id="matchImg" alt="찾은 상품 이미지">
  <div class="match-title" id="matchTitle"></div>
  <div class="match-src" id="matchSrc"></div>
  <div class="best-strip" id="bestStrip">최저가 확인 중…</div>
  <div class="ask">이 상품이 맞나요?</div>
  <div class="yn">
    <button class="btn-no" id="btnNo">아니오</button>
    <button class="btn-yes" id="btnYes">네</button>
  </div>
  <div class="retry-hint" id="retryHint"></div>
</div>

<div class="screen" id="retake">
  <div class="big">사진을 다시 찍어보세요</div>
  <p>제품의 로고나 이름이 크고 선명하게 나오도록,<br>밝은 곳에서 정면으로 촬영하면 더 잘 찾습니다.</p>
  <button class="btn-shoot" id="btnReshoot"><span>📷</span>다시 촬영</button>
  <button class="btn-pick" id="btnRepick">🖼️ 사진 선택</button>
</div>

<footer>이 서비스의 상품 링크에는 쿠팡 파트너스 활동의 일환으로 제공되는 링크가 포함될 수 있으며, 이에 따라 일정액의 수수료를 제공받을 수 있습니다.</footer>

<script>
const API = 'https://browser-app-lab.vercel.app/api/pricelens';
const $ = id => document.getElementById(id);
let matches = [], idx = 0, noCount = 0, retried = false;

function show(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
  window.scrollTo(0, 0);
}

function pickFile(input){
  input.onchange = () => {
    const f = input.files[0];
    if (!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      const img = new Image();
      img.onload = () => {
        const max = 1600, r = Math.min(1, max / Math.max(img.width, img.height));
        const c = document.createElement('canvas');
        c.width = Math.round(img.width * r); c.height = Math.round(img.height * r);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        const dataUrl = c.toDataURL('image/jpeg', 0.88);
        $('loadingImg').src = dataUrl;
        identify(dataUrl.split(',')[1]); // 찍자마자 즉시 검색
      };
      img.src = rd.result;
    };
    rd.readAsDataURL(f);
    input.value = '';
  };
  input.click();
}

async function identify(b64){
  show('loading');
  $('homeErr').textContent = '';
  try {
    const res = await fetch(API + '/identify', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ imageBase64: b64 })
    });
    const data = await res.json().catch(() => null);
    if (!res.ok) throw new Error((data && data.error) || 'HTTP ' + res.status);
    matches = (data.matches || []);
    idx = 0; noCount = 0;
    if (!matches.length) return show('retake');
    render();
  } catch (e) {
    if (!retried) { retried = true; return identify(b64); } // 일시 오류 대비 1회 재시도
    show('home');
    const msg = /Load failed|Failed to fetch/i.test(e.message)
      ? '서버 응답 없음 — 잠시 후 다시 시도해 주세요'
      : e.message;
    $('homeErr').textContent = '검색 실패: ' + msg;
  }
  retried = false;
}

function render(){
  const m = matches[idx];
  $('matchImg').src = m.image;
  $('matchImg').onerror = () => { next(); }; // 이미지가 깨지면 다음 매치로
  $('matchTitle').textContent = m.title;
  $('matchSrc').textContent = m.source || '';
  $('retryHint').textContent = matches.length > 1 ? '아니오를 누르면 다음으로 유사한 상품을 보여드립니다. (' + (idx+1) + '/' + matches.length + ')' : '';
  show('result');
  prefetchBest(m); // 확인 화면 뜨는 동안 최저가 미리 조회
}

function next(){
  idx++;
  if (noCount >= 3 || idx >= matches.length) return show('retake');
  render();
}

$('btnShoot').onclick = () => pickFile($('camInput'));
$('btnPick').onclick = () => pickFile($('fileInput'));
$('btnReshoot').onclick = () => pickFile($('camInput'));
$('btnRepick').onclick = () => pickFile($('fileInput'));
$('btnNo').onclick = () => { noCount++; next(); };
$('btnYes').onclick = () => {
  const b = bestReady;
  if (b) {
    window.open(b.link, '_blank');
    $('retryHint').textContent = (b.price ? '최저가 ' + b.price + ' · ' + b.source : b.source || '') +
      ' — 쇼핑 앱이 홈으로 열렸다면 돌아와서 네를 한 번 더 누르세요.';
  } else {
    // 아직 조회 중: 완료되면 버튼이 "최저가로 이동"으로 바뀜 (사파리 팝업 차단 때문에 자동 열기 불가)
    $('btnYes').textContent = '최저가 찾는 중…';
    $('btnYes').disabled = true;
    pendingOpen = true;
  }
};

let bestReady = null, pendingOpen = false, bestSeq = 0;

function showBest(){
  const b = bestReady;
  if (!b) return;
  const dest = b.isCatalog
    ? '네를 누르면 판매처별 가격비교 페이지로 이동합니다 (배송비 포함 비교 가능)'
    : '네를 누르면 이 판매 페이지로 이동합니다';
  $('bestStrip').innerHTML = b.price
    ? '최저가 ' + b.price + '<small>' + (b.source || '') + ' · ' + dest + '</small>'
    : '가격 정보를 찾지 못했습니다<small>' + dest + '</small>';
}

function prefetchBest(m){
  bestReady = null; pendingOpen = false;
  $('btnYes').textContent = '네'; $('btnYes').disabled = false;
  $('bestStrip').innerHTML = '최저가 확인 중…';
  const seq = ++bestSeq;
  fetch(API + '/prices', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ query: m.title })
  })
  .then(r => r.json())
  .then(d => {
    if (seq !== bestSeq) return; // 다른 매치로 넘어갔으면 무시
    bestReady = (d && d.best) ? d.best : { title: m.title, link: m.link, price: null, source: m.source };
    showBest();
    if (pendingOpen) { $('btnYes').textContent = '최저가로 이동'; $('btnYes').disabled = false; }
  })
  .catch(() => {
    if (seq !== bestSeq) return;
    bestReady = { title: m.title, link: m.link, price: null, source: m.source }; // 실패 시 찾은 페이지로
    showBest();
    if (pendingOpen) { $('btnYes').textContent = '판매 페이지로 이동'; $('btnYes').disabled = false; }
  });
}
</script>
</body>
</html>
