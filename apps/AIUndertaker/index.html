<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Undertaker">
<title>동의 기반 디지털 장의사</title>
<style>
  :root{
    --bg:#161514; --bg2:#1f1d1b; --card:#252220; --line:#332f2b;
    --txt:#ece7e1; --sub:#9c948a; --amber:#e0a458; --amber-dim:#8a6a3c;
    --green:#5aa06a; --red:#c76a5a; --blue:#5a86c7;
    --radius:14px; --safe: env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
  body{padding-bottom:calc(64px + var(--safe))}
  h1,h2,h3{margin:0;font-weight:600}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:16px}
  .hidden{display:none!important}

  header{position:sticky;top:0;z-index:20;background:rgba(22,21,20,.92);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px}
  header .row{display:flex;align-items:center;gap:10px;min-height:32px}
  header h1{font-size:18px;letter-spacing:-.3px;flex:1}
  .back{color:var(--amber);font-size:16px;font-weight:500;display:flex;align-items:center;gap:2px}
  .hbtn{color:var(--amber);font-size:15px;font-weight:500;padding:4px 6px}

  main{padding:14px 16px 20px;max-width:640px;margin:0 auto}
  .muted{color:var(--sub)}
  .tiny{font-size:12px}
  .center{text-align:center}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:12px}
  .card.tap:active{background:var(--bg2)}
  .listrow{display:flex;align-items:center;gap:12px;background:var(--card);
    border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:10px}
  .listrow:active{background:var(--bg2)}
  .listrow .grow{flex:1;min-width:0}
  .listrow .title{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .listrow .meta{font-size:13px;color:var(--sub);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chev{color:var(--sub);font-size:20px}

  .badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;
    letter-spacing:.2px;white-space:nowrap}
  .b-draft{background:#3a3430;color:var(--sub)}
  .b-verified{background:rgba(90,160,106,.16);color:var(--green)}
  .b-searching{background:rgba(90,134,199,.16);color:var(--blue)}
  .b-review{background:rgba(224,164,88,.16);color:var(--amber)}
  .b-requesting{background:rgba(224,164,88,.16);color:var(--amber)}
  .b-closed{background:#2c2926;color:var(--sub)}
  .b-locked{background:rgba(199,106,90,.14);color:var(--red)}

  label{display:block;font-size:13px;color:var(--sub);margin:12px 0 6px}
  input[type=text],input[type=email],input[type=url],input[type=date],textarea,select{
    width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;
    color:var(--txt);padding:12px;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--amber-dim)}
  textarea{min-height:70px;resize:vertical}

  .btn{display:block;width:100%;text-align:center;background:var(--amber);color:#1a1613;
    font-weight:600;font-size:16px;padding:14px;border-radius:12px;margin-top:14px}
  .btn:active{opacity:.85}
  .btn.sec{background:var(--bg2);color:var(--txt);border:1px solid var(--line)}
  .btn.danger{background:rgba(199,106,90,.16);color:var(--red);border:1px solid rgba(199,106,90,.3)}
  .btn.sm{padding:9px 14px;font-size:14px;width:auto;display:inline-block;margin-top:0}
  .btnrow{display:flex;gap:8px;margin-top:12px}
  .btnrow .btn{margin-top:0}

  .gate{background:rgba(199,106,90,.09);border:1px solid rgba(199,106,90,.28);
    border-radius:var(--radius);padding:14px;margin-bottom:12px;font-size:14px;line-height:1.5}
  .gate b{color:var(--red)}

  .seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:11px;
    padding:3px;margin-bottom:14px;overflow-x:auto}
  .seg button{flex:1;min-width:max-content;font-size:13px;font-weight:600;color:var(--sub);
    padding:8px 10px;border-radius:8px;white-space:nowrap}
  .seg button.on{background:var(--card);color:var(--txt)}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
    padding:6px 10px;border-radius:20px;background:var(--bg2);border:1px solid var(--line);
    color:var(--sub);margin:0 6px 6px 0}
  .pill.on{background:rgba(224,164,88,.15);border-color:var(--amber-dim);color:var(--amber)}

  .kv{display:flex;gap:8px;font-size:13px;padding:4px 0}
  .kv .k{color:var(--sub);min-width:74px}
  .kv .v{flex:1;word-break:break-all}
  a{color:var(--blue)}

  .fab{position:fixed;right:18px;bottom:calc(78px + var(--safe));width:54px;height:54px;
    border-radius:27px;background:var(--amber);color:#1a1613;font-size:30px;font-weight:300;
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.4);z-index:30}
  .fab:active{opacity:.85}

  nav{position:fixed;left:0;right:0;bottom:0;z-index:25;background:rgba(22,21,20,.94);
    backdrop-filter:blur(12px);border-top:1px solid var(--line);
    display:flex;padding-bottom:var(--safe)}
  nav button{flex:1;padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--sub);font-size:10px;font-weight:600}
  nav button.on{color:var(--amber)}
  nav .ic{font-size:20px;line-height:1}

  .empty{text-align:center;color:var(--sub);padding:48px 20px;font-size:14px;line-height:1.6}
  .empty .big{font-size:34px;margin-bottom:10px;opacity:.6}

  /* modal */
  .sheet{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);
    display:flex;align-items:flex-end;justify-content:center}
  .sheet .inner{background:var(--bg2);width:100%;max-width:640px;border-radius:18px 18px 0 0;
    border-top:1px solid var(--line);padding:18px 16px calc(20px + var(--safe));
    max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .sheet h2{font-size:18px;margin-bottom:4px}
  .grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 14px}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(90px + var(--safe));
    background:#2f2b27;border:1px solid var(--line);color:var(--txt);font-size:14px;
    padding:11px 16px;border-radius:12px;z-index:80;box-shadow:0 6px 18px rgba(0,0,0,.4);
    opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1}

  .divlbl{font-size:12px;font-weight:600;color:var(--amber-dim);text-transform:uppercase;
    letter-spacing:.6px;margin:18px 0 8px}
  .note{font-size:12px;color:var(--sub);line-height:1.5;margin-top:6px}
  .srclink{display:inline-block;font-size:13px;padding:8px 12px;background:var(--bg2);
    border:1px solid var(--line);border-radius:20px;margin:0 6px 8px 0;color:var(--blue)}
</style>
</head>
<body>

<header>
  <div class="row">
    <button class="back hidden" id="backBtn">‹ 뒤로</button>
    <h1 id="hTitle">디지털 장의사</h1>
    <button class="hbtn hidden" id="hAction"></button>
  </div>
</header>

<main id="main"></main>

<button class="fab hidden" id="fab">+</button>

<nav id="nav">
  <button data-tab="cases" class="on"><span class="ic">🗂️</span>케이스</button>
  <button data-tab="audit"><span class="ic">📜</span>감사로그</button>
  <button data-tab="settings"><span class="ic">⚙️</span>설정</button>
</nav>

<div id="sheetHost"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   동의 기반 디지털 장의사 — MVP (단일 파일 / IndexedDB)
   핵심 안전장치: 신원확인 게이트.
   케이스가 VERIFIED 되기 전에는 단서/검색/후보/삭제요청 전부 잠금.
   ============================================================ */

// ---------- IndexedDB ----------
const DB_NAME='undertaker', DB_VER=1;
const STORES=['cases','clues','terms','candidates','requests','audit'];
let db;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{const d=e.target.result;
    STORES.forEach(s=>{if(!d.objectStoreNames.contains(s)){
      const os=d.createObjectStore(s,{keyPath:'id'});
      if(s!=='cases'&&s!=='audit')os.createIndex('caseId','caseId',{unique:false});
      if(s==='requests')os.createIndex('candidateId','candidateId',{unique:false});
    }});};
  r.onsuccess=e=>{db=e.target.result;res();};
  r.onerror=e=>rej(e.target.error);
});}
function tx(store,mode='readonly'){return db.transaction(store,mode).objectStore(store);}
function put(store,obj){return new Promise((res,rej)=>{const r=tx(store,'readwrite').put(obj);r.onsuccess=()=>res(obj);r.onerror=()=>rej(r.error);});}
function del(store,id){return new Promise((res,rej)=>{const r=tx(store,'readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function getAll(store){return new Promise((res,rej)=>{const r=tx(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function get(store,id){return new Promise((res,rej)=>{const r=tx(store).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function byCase(store,caseId){return (await getAll(store)).filter(x=>x.caseId===caseId);}

// ---------- utils ----------
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const now=()=>new Date().toISOString();
const fmt=iso=>{if(!iso)return'—';const d=new Date(iso);
  return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function sha256(str){
  try{const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);}
  catch(e){return 'nohash';}
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}

// ---------- audit ----------
async function audit(action,{caseId=null,target=null,reason=null}={}){
  await put('audit',{id:uid(),actor:state.user+' ('+state.role+')',action,caseId,target,reason,at:now()});
}

// ---------- state ----------
const state={
  user:localStorage.getItem('u_user')||'담당자',
  role:localStorage.getItem('u_role')||'OPERATOR', // ADMIN|VERIFIER|OPERATOR|VIEWER
  tab:'cases', view:'list', caseId:null, subtab:'verify'
};
function saveUser(){localStorage.setItem('u_user',state.user);localStorage.setItem('u_role',state.role);}

// ---------- status helpers ----------
const CASE_FLOW=['DRAFT','VERIFIED','SEARCHING','REVIEW','REQUESTING','CLOSED'];
const badgeClass={DRAFT:'b-draft',VERIFIED:'b-verified',SEARCHING:'b-searching',
  REVIEW:'b-review',REQUESTING:'b-requesting',CLOSED:'b-closed'};
const statusKo={DRAFT:'초안',VERIFIED:'신원확인됨',SEARCHING:'검색중',REVIEW:'검토',
  REQUESTING:'삭제요청중',CLOSED:'종결'};
const isVerified=c=>c && c.status!=='DRAFT';

// ============================================================
//  RENDER
// ============================================================
const main=()=>document.getElementById('main');
function setHeader(title,{back=false,action=null}={}){
  document.getElementById('hTitle').textContent=title;
  const b=document.getElementById('backBtn');b.classList.toggle('hidden',!back);
  const a=document.getElementById('hAction');
  if(action){a.textContent=action.label;a.onclick=action.fn;a.classList.remove('hidden');}
  else a.classList.add('hidden');
}
function nav(tab){state.tab=tab;state.view='list';state.caseId=null;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  render();}

async function render(){
  document.getElementById('fab').classList.add('hidden');
  if(state.view==='case'){return renderCase();}
  if(state.tab==='cases')return renderCases();
  if(state.tab==='audit')return renderAudit();
  if(state.tab==='settings')return renderSettings();
}

// ----- Cases list -----
async function renderCases(){
  setHeader('디지털 장의사');
  document.getElementById('nav').classList.remove('hidden');
  const cases=(await getAll('cases')).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  const fab=document.getElementById('fab');
  if(canWrite()){fab.classList.remove('hidden');fab.onclick=openNewCase;}
  if(!cases.length){
    main().innerHTML=`<div class="empty"><div class="big">🗂️</div>
      아직 케이스가 없습니다.<br>우측 하단 + 로 삭제 의뢰 케이스를 만드세요.</div>`;
    return;
  }
  let h='';
  for(const c of cases){
    const cand=await byCase('candidates',c.id);
    h+=`<div class="listrow" onclick="openCase('${c.id}')">
      <div class="grow">
        <div class="title">${esc(c.subjectName)}</div>
        <div class="meta">${c.isAgent?'대리인 의뢰 · ':''}후보 ${cand.length}건 · ${fmt(c.createdAt)}</div>
      </div>
      <span class="badge ${badgeClass[c.status]}">${statusKo[c.status]}</span>
      <span class="chev">›</span>
    </div>`;
  }
  main().innerHTML=h;
}

// ----- Case detail -----
async function openCase(id){state.view='case';state.caseId=id;state.subtab='verify';render();}
window.openCase=openCase;

async function renderCase(){
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('nav').classList.add('hidden');
  const c=await get('cases',state.caseId);
  if(!c){nav('cases');return;}
  setHeader(c.subjectName,{back:true});
  document.getElementById('backBtn').onclick=()=>nav('cases');

  const verified=isVerified(c);
  const tabs=[['verify','신원확인'],['clues','단서'],['terms','검색어'],['cands','후보'],['reqs','삭제요청']];
  let seg='<div class="seg">'+tabs.map(([k,l])=>
    `<button class="${state.subtab===k?'on':''}" onclick="setSub('${k}')">${l}${k!=='verify'&&!verified?' 🔒':''}</button>`
  ).join('')+'</div>';

  let body='';
  if(state.subtab==='verify')body=await subVerify(c);
  else if(!verified)body=gateBlock();
  else if(state.subtab==='clues')body=await subClues(c);
  else if(state.subtab==='terms')body=await subTerms(c);
  else if(state.subtab==='cands')body=await subCands(c);
  else if(state.subtab==='reqs')body=await subReqs(c);

  main().innerHTML=`<div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px">
        <h2 style="flex:1;font-size:17px">${esc(c.subjectName)}</h2>
        <span class="badge ${badgeClass[c.status]}">${statusKo[c.status]}</span>
      </div>
      <div class="kv"><span class="k">유형</span><span class="v">${c.isAgent?'대리인 의뢰':'본인 의뢰'}</span></div>
      <div class="kv"><span class="k">보존기한</span><span class="v">${c.retentionUntil||'미설정'}</span></div>
    </div>${seg}${body}`;
}
function setSub(k){state.subtab=k;render();}
window.setSub=setSub;

function gateBlock(){
  return `<div class="gate">🔒 <b>신원확인 게이트</b><br>
    이 케이스는 아직 <b>신원확인이 완료되지 않았습니다.</b>
    본인(또는 적법 대리인)임이 확인되기 전에는 단서 입력·검색어 생성·후보 수집·삭제요청이
    모두 잠깁니다. 이것이 이 시스템을 감시 도구가 아닌 <b>본인 삭제 지원 도구</b>로
    유지하는 핵심 장치입니다.<br><br>
    ‘신원확인’ 탭에서 확인 절차를 완료하세요.</div>`;
}

// ----- sub: verification (THE GATE) -----
async function subVerify(c){
  if(isVerified(c)){
    return `<div class="card">
      <div class="kv"><span class="k">상태</span><span class="v" style="color:var(--green)">✔ 신원확인 완료</span></div>
      <div class="kv"><span class="k">방법</span><span class="v">${esc(c.verifyMethod||'—')}</span></div>
      <div class="kv"><span class="k">확인자</span><span class="v">${esc(c.verifiedBy||'—')}</span></div>
      <div class="kv"><span class="k">확인일</span><span class="v">${fmt(c.verifiedAt)}</span></div>
      <div class="note">확인에 사용한 신분/위임 서류는 목적 달성 후 즉시 파기하는 것을 원칙으로 합니다.
      이 앱은 서류 자체를 저장하지 않고 ‘확인 사실’만 기록합니다.</div>
    </div>`;
  }
  const canVerify=state.role==='VERIFIER'||state.role==='ADMIN';
  return `<div class="gate">이 케이스는 <b>초안(DRAFT)</b> 상태입니다. 신원확인 전에는 이후 단계가 잠깁니다.</div>
    <div class="card">
      <h3 style="font-size:15px;margin-bottom:6px">신원 / 대리권 확인</h3>
      <div class="note" style="margin-bottom:6px">본인 의뢰: 신분 확인. 대리인 의뢰: 위임 근거 확인.
      서류는 외부에서 확인 후, 여기에는 <b>확인 사실만</b> 남깁니다.</div>
      <label>확인 방법</label>
      <select id="vMethod">
        <option value="본인 신분 확인">본인 신분 확인</option>
        <option value="대리인 위임장 확인">대리인 위임장 확인</option>
        <option value="법정대리 권한 확인">법정대리 권한 확인</option>
        <option value="기타(메모)">기타(메모)</option>
      </select>
      <label>확인 메모(선택)</label>
      <input type="text" id="vNote" placeholder="예: 신분증 대조 완료, 위임장 원본 확인">
      ${canVerify
        ? `<button class="btn" onclick="doVerify('${c.id}')">✔ 신원확인 완료 처리</button>`
        : `<div class="gate" style="margin-top:12px">현재 역할(<b>${state.role}</b>)은 신원확인 권한이 없습니다.
           설정에서 역할을 <b>VERIFIER</b> 또는 <b>ADMIN</b>으로 바꾸면 확인할 수 있습니다.</div>`}
    </div>`;
}
async function doVerify(id){
  const c=await get('cases',id);
  c.status='VERIFIED';c.verifyMethod=document.getElementById('vMethod').value;
  c.verifyNote=document.getElementById('vNote').value.trim();
  c.verifiedBy=state.user;c.verifiedAt=now();
  await put('cases',c);
  await audit('VERIFY_CASE',{caseId:id,reason:c.verifyMethod});
  toast('신원확인 완료 — 이후 단계가 열렸습니다');
  state.subtab='clues';render();
}
window.doVerify=doVerify;

// ----- sub: clues -----
async function subClues(c){
  const clues=await byCase('clues',c.id);
  let h='';
  if(canWrite())h+=`<button class="btn sec" onclick="openClue('${c.id}')">+ 단서 추가</button>`;
  if(!clues.length){h+=`<div class="empty"><div class="big">🧩</div>의뢰인이 제공한 단서를 입력하세요.<br>

  }

// 거대 서비스명: 단독 검색어로 쓰지 않음(노이즈). site: 재료로만.
const BIG_SERVICES=['dcinside','naver','google','daum','youtube','facebook','instagram',
  'twitter','x.com','tistory','blog.naver.com','cafe.naver.com','wikipedia','namu.wiki',
  'reddit','github','linkedin','tiktok'];
// 로컬파트에 붙여볼 흔한 도메인
const COMMON_DOMAINS=['gmail.com','naver.com','daum.net','hanmail.net','kakao.com','nate.com','outlook.com','hotmail.com'];
function domainOf(u){try{return new URL(u.startsWith('http')?u:'https://'+u).hostname.replace(/^www\./,'');}catch(e){return null;}}
function isBig(v){const s=(v||'').toLowerCase().trim();return BIG_SERVICES.some(b=>s===b||s===b.replace('.com','')||s.includes(b));}
function localPart(e){const s=(e||'').trim();const i=s.indexOf('@');return i>0?s.slice(0,i):s;}

// 단서로부터 "조합 우선" 검색어 목록을 만든다. (승인 개념 없음)
function buildQueriesFromClues(clues){
  const val=k=>clues.filter(c=>c.kind===k&&c.value).map(c=>c.value.trim()).filter(Boolean);
  const realNames=clues.filter(c=>c.kind==='realname'||c.kind==='name').map(c=>c.value.trim()).filter(Boolean);
  const nicks=val('nickname');
  const emailsRaw=val('email');
  const phones=val('phone');
  const regions=val('region');
  const orgs=clues.filter(c=>c.kind==='company'||c.kind==='school').map(c=>c.value.trim()).filter(Boolean);
  const urlDomains=clues.filter(c=>['sns_url','blog_url','home_url','github','profile','post_url'].includes(c.kind)&&c.value)
    .map(c=>domainOf(c.value)).filter(Boolean);
  const postUrls=clues.filter(c=>c.kind==='post_url'&&c.value).map(c=>c.value.trim());

  const out=[]; const seen=new Set();
  const add=(q,why)=>{const k=q.trim();if(!k||seen.has(k))return;seen.add(k);out.push([k,why]);};
  const identifiers=[...realNames,...emailsRaw,...phones];

  // "핸들(handle)" = 닉네임 + 이메일 로컬파트. 둘 다 "사람 아이디"로 취급해 동일하게 분해·조합한다.
  const handles=[];
  nicks.forEach(n=>{ if(!isBig(n)) handles.push({v:n,src:'닉네임'}); });
  emailsRaw.forEach(e=>{ const lp=localPart(e); if(lp&&!isBig(lp)) handles.push({v:lp,src:'이메일ID'}); });

  // 1) 전화 완전일치
  phones.forEach(p=>add(`"${p}"`,'전화번호 노출'));

  // 2) 이메일: 전체 완전일치 + (도메인 없으면 흔한 도메인 붙여 추정)
  emailsRaw.forEach(e=>{
    if(e.includes('@')) add(`"${e}"`,'이메일 전체 완전일치');
  });

  // 3) 게시글 URL 직접
  postUrls.forEach(u=>add(u,'제출한 게시글 URL'));

  // 4) 핸들(닉네임/이메일ID) 분해·조합 — 구글링에서 당연히 하는 것들
  handles.forEach(h=>{
    const n=h.v;
    // 4a) 로컬파트 × 흔한 도메인 (이메일일 가능성) — 완전일치는 동명이인 강력 배제
    COMMON_DOMAINS.forEach(d=>add(`"${n}@${d}"`,`${h.src} × ${d}`));
    // 4b) 핸들 × 실명 (같이 나오면 거의 본인)
    realNames.forEach(rn=>add(`"${n}" "${rn}"`,`${h.src} × 실명`));
    // 4c) 핸들 × 지역/소속
    regions.forEach(r=>add(`"${n}" ${r}`,`${h.src} × 지역`));
    orgs.forEach(o=>add(`"${n}" ${o}`,`${h.src} × 소속`));
    // 4d) 핸들 × 제출 URL 도메인
    urlDomains.forEach(d=>add(`"${n}" site:${d}`,`${h.src} × ${d}`));
    // 4e) 핸들 단독 완전일치 (보조)
    add(`"${n}"`,`${h.src} 단독`);
  });

  // 5) 실명 조합 (핸들 없이도)
  realNames.forEach(rn=>{
    regions.forEach(r=>add(`"${rn}" ${r}`,`실명 × 지역`));
    orgs.forEach(o=>add(`"${rn}" ${o}`,`실명 × 소속`));
  });

  return {queries:out, hasIdentifier: identifiers.length>0 || handles.length>0, nickCount:handles.length};
}

const DEFAULT_API='https://browser-app-lab.vercel.app/api/search';
// 단서 → 조합 검색어 → 검색 → 후보 등록 (승인 단계 없음, 원샷)
async function searchFromClues(caseId){
  const SEARCH_API=(localStorage.getItem('u_api')||DEFAULT_API).trim();
  if(!SEARCH_API){toast('설정에서 검색 서버 주소를 먼저 넣으세요');return;}
  const c=await get('cases',caseId);
  if(!isVerified(c)){toast('신원확인된 케이스만 검색할 수 있습니다');return;}
  const clues=await byCase('clues',caseId);
  if(!clues.length){toast('단서를 먼저 입력하세요');return;}

  const {queries,hasIdentifier,nickCount}=buildQueriesFromClues(clues);
  if(!queries.length){toast('검색어를 만들 단서가 부족합니다');return;}
  if(!hasIdentifier){
    toast('⚠️ 실명·이메일·지역 등 식별자가 없어 정밀도가 낮습니다');
  }

  // 생성된 검색어를 terms에 기록(참고·감사용)
  const existingTerms=new Set((await byCase('terms',caseId)).map(t=>t.query));
  for(const [q,why] of queries){
    if(existingTerms.has(q))continue;existingTerms.add(q);
    await put('terms',{id:uid(),caseId,query:q,rationale:why,status:'AUTO',createdAt:now()});
  }

  toast('검색 중… 검색어 '+queries.length+'개');
  await audit('SEARCH_FROM_CLUES',{caseId,reason:queries.length+'개 쿼리'});
  const existing=new Set((await byCase('candidates',caseId)).map(x=>x.url));
  let added=0, failed=0, firstErr='';

  for(const [q,why] of queries){
    try{
      const r=await fetch(SEARCH_API,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({q,count:20,verified:true})
      });
      if(!r.ok){
        failed++;
        if(!firstErr){let t='';try{t=(await r.text()).slice(0,80);}catch(e){}firstErr='HTTP '+r.status+(t?' '+t:'');}
        continue;
      }
      const data=await r.json();
      for(const item of (data.results||[])){
        if(!item.url||existing.has(item.url))continue;
        existing.add(item.url);
        const hash=await sha256(item.url+'|'+(item.title||''));
        await put('candidates',{id:uid(),caseId,url:item.url,title:item.title||'',
          platform:item.platform||domainName(item.url),ocr:'',hash,
          fromQuery:q,confirmed:'UNCONFIRMED',capturedAt:now()});
        added++;
      }
    }catch(e){failed++;if(!firstErr)firstErr='요청실패 '+(e&&e.message?e.message:String(e)).slice(0,80);}
  }
  const cc=await get('cases',caseId);if(cc.status==='VERIFIED'||cc.status==='SEARCHING'){cc.status='REVIEW';await put('cases',cc);}
  if(added)toast(added+'개 후보 등록'+(failed?` (검색 ${failed}건 실패)`:''));
  else if(failed)toast('검색 실패: '+(firstErr||'원인 불명'));
  else toast('새 후보 없음 (중복 제외)');
  state.subtab='cands';render();
}
window.searchFromClues=searchFromClues;

  return h;

async function subReqs(c){
  const cands=await byCase('candidates',c.id);
  const reqs=await byCase('requests',c.id);
  let h='';
  if(!reqs.length){h+=`<div class="empty"><div class="big">✉️</div>‘후보’ 탭에서 본인 확인된 항목에 삭제요청을 만드세요.</div>`;}
  const flow=['DRAFT','SENT','ACK','REMOVED','REJECTED'];
  const rko={DRAFT:'작성',SENT:'발송',ACK:'접수확인',REMOVED:'삭제완료',REJECTED:'거부',RESUBMIT:'재요청'};
  for(const r of reqs.sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt))){
    const cd=cands.find(x=>x.id===r.candidateId);
    h+=`<div class="card">
      <div style="display:flex;gap:8px;align-items:center">
        <div style="flex:1;min-width:0" class="title">${esc(cd?cd.title||cd.url:'(후보 삭제됨)')}</div>
        <span class="badge ${r.status==='REMOVED'?'b-verified':r.status==='REJECTED'?'b-locked':'b-requesting'}">${rko[r.status]||r.status}</span>
      </div>
      <div class="kv"><span class="k">창구</span><span class="v">${esc(r.channel||'—')}</span></div>
      ${r.note?`<div class="kv"><span class="k">회신</span><span class="v">${esc(r.note)}</span></div>`:''}
      <div class="kv"><span class="k">갱신</span><span class="v">${fmt(r.updatedAt)}</span></div>
      ${canWrite()?`<label>상태 변경</label>
        <select onchange="updReq('${r.id}','${c.id}',this.value)">
          ${flow.concat(['RESUBMIT']).map(s=>`<option value="${s}" ${r.status===s?'selected':''}>${rko[s]}</option>`).join('')}
        </select>
        <label>회신/메모</label>
        <input type="text" value="${esc(r.note||'')}" onchange="noteReq('${r.id}',this.value)" placeholder="플랫폼 회신 내용">
      `:''}
    </div>`;
  }
  return h;
}
async function mkReq(candId,caseId){
  const cd=await get('candidates',candId);
  const ch=prompt('삭제 요청 창구를 입력하세요 (예: 플랫폼 신고, 방심위, 이메일)','플랫폼 신고창구');
  if(ch===null)return;
  await put('requests',{id:uid(),caseId,candidateId:candId,channel:ch,status:'DRAFT',
    note:'',requestedBy:state.user,updatedAt:now(),createdAt:now()});
  await audit('CREATE_REQUEST',{caseId,target:cd.url,reason:ch});
  const c=await get('cases',caseId);if(c.status==='REVIEW'){c.status='REQUESTING';await put('cases',c);}
  state.subtab='reqs';render();toast('삭제요청 생성됨');
}
window.mkReq=mkReq;
async function updReq(id,caseId,val){const r=await get('requests',id);r.status=val;r.updatedAt=now();
  await put('requests',r);await audit('UPDATE_REQUEST',{caseId,reason:val});render();}
window.updReq=updReq;
async function noteReq(id,val){const r=await get('requests',id);r.note=val;r.updatedAt=now();await put('requests',r);}
window.noteReq=noteReq;

// ----- new case -----
function openNewCase(){
  sheet(`<h2>새 삭제 의뢰 케이스</h2>
    <div class="note">생성 후 <b>신원확인</b>을 완료해야 이후 단계가 열립니다.</div>
    <label>의뢰인(정보주체) 이름</label>
    <input type="text" id="ncName" placeholder="본인 이름">
    <label>의뢰 유형</label>
    <div style="margin-top:6px">
      <span class="pill on" id="pSelf" onclick="pickType('self')">본인 의뢰</span>
      <span class="pill" id="pAgent" onclick="pickType('agent')">대리인 의뢰</span>
    </div>
    <button class="btn" onclick="createCase()">케이스 생성</button>`);
  sheetHost._type='self';
}
window.openNewCase=openNewCase;
function pickType(t){sheetHost._type=t;
  document.getElementById('pSelf').classList.toggle('on',t==='self');
  document.getElementById('pAgent').classList.toggle('on',t==='agent');}
window.pickType=pickType;
async function createCase(){
  const name=document.getElementById('ncName').value.trim();
  if(!name){toast('이름을 입력하세요');return;}
  const c={id:uid(),subjectName:name,isAgent:sheetHost._type==='agent',status:'DRAFT',
    retentionUntil:null,createdAt:now()};
  await put('cases',c);await audit('CREATE_CASE',{caseId:c.id,target:name});
  closeSheet();openCase(c.id);toast('케이스 생성 — 신원확인을 진행하세요');
}
window.createCase=createCase;

// ----- audit view -----
async function renderAudit(){
  setHeader('감사 로그');document.getElementById('nav').classList.remove('hidden');
  if(state.role!=='ADMIN'){
    main().innerHTML=`<div class="gate">감사 로그는 <b>ADMIN</b> 역할만 열람할 수 있습니다.
      설정에서 역할을 변경하세요.</div>`;return;
  }
  const logs=(await getAll('audit')).sort((a,b)=>b.at.localeCompare(a.at)).slice(0,300);
  if(!logs.length){main().innerHTML=`<div class="empty"><div class="big">📜</div>기록된 활동이 없습니다.</div>`;return;}
  let h='';
  for(const l of logs){
    h+=`<div class="card" style="padding:11px 14px">
      <div style="display:flex;gap:8px"><b style="font-size:14px;flex:1">${esc(l.action)}</b>
        <span class="tiny muted">${new Date(l.at).toLocaleString('ko-KR')}</span></div>
      <div class="tiny muted" style="margin-top:3px">${esc(l.actor)}${l.reason?' · '+esc(l.reason):''}${l.target?' · '+esc(l.target.slice(0,50)):''}</div>
    </div>`;
  }
  main().innerHTML=`<div class="note" style="margin-bottom:10px">최근 300건. 실제 운영에서는 변경불가(WORM/해시체인) 저장소로 오프로드합니다.</div>`+h;
}

// ----- settings -----
async function renderSettings(){
  setHeader('설정');document.getElementById('nav').classList.remove('hidden');
  const roles=['ADMIN','VERIFIER','OPERATOR','VIEWER'];
  const roleDesc={ADMIN:'전체 권한 · 감사로그 · 파기',VERIFIER:'신원확인 전담',
    OPERATOR:'단서·검색·후보·요청',VIEWER:'읽기 전용'};
  main().innerHTML=`
    <div class="card">
      <h3 style="font-size:15px;margin-bottom:4px">담당자</h3>
      <label>이름</label>
      <input type="text" id="stUser" value="${esc(state.user)}">
      <label>역할 (RBAC 시뮬레이션)</label>
      ${roles.map(r=>`<span class="pill ${state.role===r?'on':''}" onclick="setRole('${r}')">${r}</span>`).join('')}
      <div class="note">${roleDesc[state.role]}</div>
      <button class="btn sm sec" style="margin-top:12px" onclick="saveSettings()">저장</button>
    </div>
    <div class="divlbl">검색 서버 (자동 검색)</div>
    <div class="card">
      <div class="note" style="margin-bottom:8px">‘자동 검색’이 호출할 서버 함수 주소입니다. 비워두면 자동 검색이 비활성화됩니다.</div>
      <input type="url" id="stApi" value="${esc(localStorage.getItem('u_api')||'https://browser-app-lab.vercel.app/api/search')}" placeholder="https://.../api/search">
      <button class="btn sm sec" style="margin-top:10px" onclick="saveApi()">서버 주소 저장</button>
    </div>
    <div class="divlbl">검색 엔진 (수동 열기용)</div>
    <div class="card">
      <div class="note" style="margin-bottom:8px">‘검색 열기’가 사용할 검색엔진입니다.</div>
      ${['brave','google'].map(e=>`<span class="pill ${(localStorage.getItem('u_engine')||'brave')===e?'on':''}" onclick="setEngine('${e}')">${e==='brave'?'Brave':'Google'}</span>`).join('')}
    </div>
    <div class="divlbl">데이터</div>
    <div class="card">
      <div class="note" style="margin-bottom:10px">이 앱은 데이터를 이 기기(IndexedDB)에만 저장합니다.
      실제 운영에서는 서버측 암호화·보존기한 자동 파기가 적용됩니다.</div>
      <button class="btn sm sec" onclick="exportData()">전체 백업(JSON)</button>
      <button class="btn sm danger" style="margin-top:8px" onclick="wipeAll()">전체 데이터 삭제</button>
    </div>
    <div class="divlbl">이 시스템에 대하여</div>
    <div class="card">
      <div class="note">대상 = <b>의뢰인 본인</b> 또는 적법 대리인. 공개 자료만 대상.
      신원확인 게이트 통과 전에는 검색·후보·요청이 잠깁니다.
      사람에 대한 평가·프로파일링·자동 동일인 매칭은 하지 않습니다.
      목적은 <b>삭제 지원 업무의 효율화</b>이며, 개인 활동 DB 구축이 아닙니다.</div>
    </div>`;
}
function setRole(r){state.role=r;saveUser();renderSettings();}
window.setRole=setRole;
function saveSettings(){state.user=document.getElementById('stUser').value.trim()||'담당자';saveUser();toast('저장됨');}
window.saveSettings=saveSettings;
function setEngine(e){localStorage.setItem('u_engine',e);renderSettings();toast(e==='brave'?'Brave':'Google'+' 선택');}
window.setEngine=setEngine;
function saveApi(){const v=document.getElementById('stApi').value.trim();localStorage.setItem('u_api',v);toast('서버 주소 저장됨');}
window.saveApi=saveApi;

async function exportData(){
  const dump={};for(const s of STORES)dump[s]=await getAll(s);
  dump._exportedAt=now();
  const blob=new Blob([JSON.stringify(dump,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='undertaker-backup-'+Date.now()+'.json';a.click();
  await audit('EXPORT_BACKUP',{});toast('백업 생성됨');
}
window.exportData=exportData;
async function wipeAll(){
  if(!confirm('모든 케이스/후보/로그를 삭제합니다. 되돌릴 수 없습니다. 계속할까요?'))return;
  for(const s of STORES){const all=await getAll(s);for(const x of all)await del(s,x.id);}
  toast('전체 삭제됨');nav('cases');
}
window.wipeAll=wipeAll;

// ---------- helpers ----------
function canWrite(){return state.role==='OPERATOR'||state.role==='ADMIN'||state.role==='VERIFIER';}

// ---------- sheet ----------
const sheetHost=Object.assign(document.getElementById('sheetHost'),{});
function sheet(inner){
  sheetHost.innerHTML=`<div class="sheet" onclick="if(event.target===this)closeSheet()">
    <div class="inner"><div class="grab"></div>${inner}</div></div>`;
}
function closeSheet(){sheetHost.innerHTML='';}
window.closeSheet=closeSheet;

// ---------- nav wiring ----------
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>nav(b.dataset.tab));
document.getElementById('backBtn').onclick=()=>nav('cases');

// ---------- boot ----------
(async()=>{await openDB();render();})();
</script>
