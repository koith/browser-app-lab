<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#10141B">
<title>AIOS 콘솔</title>
<style>
  :root{
    --ink:#10141B; --surface:#1A202B; --raised:#222A38; --line:#2A3342;
    --text:#E8ECF3; --dim:#8B96A8; --faint:#5A6478;
    --proposal:#5EC8E5; --critique:#F0A868; --rebuttal:#B08CF0;
    --conclude:#7DD3A0; --rule:#E8C468; --danger:#E58989;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--ink);color:var(--text);font-family:var(--sans);
       font-size:15px;line-height:1.55;overscroll-behavior:none}

  /* ---- 헤더: 커널 상태 ---- */
  header{position:sticky;top:0;z-index:10;background:rgba(16,20,27,.92);
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
    display:flex;align-items:center;gap:10px}
  .kdot{width:8px;height:8px;border-radius:50%;background:var(--conclude);
    box-shadow:0 0 8px var(--conclude);flex:none}
  .kdot.busy{background:var(--critique);box-shadow:0 0 8px var(--critique);
    animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.35}}
  h1{font-family:var(--mono);font-size:15px;font-weight:700;letter-spacing:.08em}
  h1 small{color:var(--faint);font-weight:400;margin-left:6px}
  #gear{margin-left:auto;color:var(--dim);background:none;border:0;font-size:19px;padding:4px}

  /* ---- 본문 ---- */
  main{padding:16px 16px calc(env(safe-area-inset-bottom) + 130px);max-width:640px;margin:0 auto}
  .pane{display:none}.pane.on{display:block}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    color:var(--faint);text-transform:uppercase;margin:20px 0 8px}
  .eyebrow:first-child{margin-top:0}

  /* ---- 회의 소집 폼 ---- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
  .seg{display:flex;background:var(--raised);border-radius:10px;padding:3px;margin-bottom:10px}
  .seg button{flex:1;border:0;background:none;color:var(--dim);font:600 13px var(--sans);
    padding:8px 0;border-radius:8px}
  .seg button.on{background:var(--ink);color:var(--text)}
  input[type=text],input[type=password]{width:100%;background:var(--raised);
    border:1px solid var(--line);border-radius:10px;color:var(--text);
    font:15px var(--sans);padding:11px 12px;-webkit-appearance:none}
  input::placeholder{color:var(--faint)}
  .btn{width:100%;margin-top:10px;border:0;border-radius:10px;padding:13px;
    font:700 15px var(--sans);color:var(--ink);background:var(--text)}
  .btn:disabled{opacity:.4}
  .btn.gold{background:var(--rule)}

  /* ---- 회의록 스트림 ---- */
  .turn{display:flex;gap:10px;margin-top:10px;animation:rise .3s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}}
  .rail{width:3px;border-radius:2px;flex:none}
  .turn .body{flex:1;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px}
  .who{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
  .who b{font-size:13px}
  .chip{font:600 10px var(--mono);letter-spacing:.06em;padding:1px 7px;
    border-radius:99px;border:1px solid}
  .t-proposal .rail{background:var(--proposal)} .t-proposal .chip{color:var(--proposal);border-color:var(--proposal)}
  .t-critique .rail{background:var(--critique)} .t-critique .chip{color:var(--critique);border-color:var(--critique)}
  .t-rebuttal .rail{background:var(--rebuttal)} .t-rebuttal .chip{color:var(--rebuttal);border-color:var(--rebuttal)}
  .t-conclude .rail{background:var(--conclude)} .t-conclude .chip{color:var(--conclude);border-color:var(--conclude)}
  .t-conclude .body{border-color:var(--conclude)}
  .turn p{font-size:14px;color:#CBD3E0;white-space:pre-wrap;word-break:break-word}
  .turn .body{cursor:pointer;position:relative}
  .turn.clip p{display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden}
  .turn.clip .body::after{content:"⌄ 전체 보기";position:absolute;right:10px;bottom:6px;
    font:600 11px var(--mono);color:var(--dim);background:var(--surface);padding-left:16px}
  .turn.t-conclude.clip .body::after{background:#182018}
  .turn .body.open{cursor:default}

  /* ---- 승격 배너 (signature) ---- */
  .promo{margin-top:12px;border:1px solid var(--rule);border-radius:12px;
    background:linear-gradient(180deg,rgba(232,196,104,.14),rgba(232,196,104,.04));
    padding:12px 14px;animation:rise .4s ease}
  .promo .tag{font:700 11px var(--mono);letter-spacing:.14em;color:var(--rule)}
  .promo p{margin-top:4px;font-weight:600}
  .promo small{color:var(--dim)}

  /* ---- 피드백 게이지 ---- */
  .gauge{font-family:var(--mono);letter-spacing:3px;color:var(--rule);font-size:13px}
  .fbrow{display:flex;gap:8px;margin-top:10px}
  .fbrow input{flex:1}
  .fbrow .send{flex:none;width:auto;margin:0;padding:0 16px;background:var(--rule)}
  .quick{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
  .quick button{border:1px solid var(--line);background:var(--raised);color:var(--dim);
    font:12px var(--sans);border-radius:99px;padding:5px 11px}

  /* ---- 규칙 탭 ---- */
  .rule-item{display:flex;align-items:center;gap:10px;background:var(--surface);
    border:1px solid var(--line);border-left:3px solid var(--rule);
    border-radius:12px;padding:11px 12px;margin-top:8px}
  .rule-item .tx{flex:1;font-size:14px;word-break:break-word}
  .rule-item .sc{font:600 10px var(--mono);color:var(--dim)}
  .off{border:1px solid var(--line);background:none;color:var(--danger);
    font:600 12px var(--sans);border-radius:8px;padding:6px 10px;flex:none}
  .cand{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
    padding:10px 12px;margin-top:8px;background:var(--surface);
    border:1px dashed var(--line);border-radius:12px;font-size:13px;color:var(--dim)}
  .cand span:first-child{flex:1;word-break:break-word}
  .empty{color:var(--faint);font-size:13px;padding:14px 2px}

  /* ---- 로그 탭 ---- */
  .log{font:11.5px var(--mono);color:var(--dim)}
  .log div{padding:5px 0;border-bottom:1px solid rgba(42,51,66,.5);
    display:flex;gap:10px;white-space:nowrap;overflow:hidden}
  .log .tp{color:var(--text)}
  .log .tp.r{color:var(--rule)} .log .tp.c{color:var(--conclude)}

  /* ---- 기록 탭 ---- */
  .hist-item{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-top:8px}
  .hist-item .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .hist-item .org{font:600 10px var(--mono);letter-spacing:.06em;color:var(--ink);
    background:var(--dim);border-radius:99px;padding:2px 8px}
  .hist-item .time{margin-left:auto;font:11px var(--mono);color:var(--faint)}
  .hist-item .ttl{font-size:15px;font-weight:600;margin-bottom:3px;word-break:break-word}
  .hist-item .concl{font-size:13px;color:var(--dim);line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .hist-item .meta{margin-top:6px;font:11px var(--mono);color:var(--faint)}
  .backbtn{background:none;border:0;color:var(--proposal);font:600 14px var(--sans);
    padding:6px 0;margin-bottom:4px}

  /* ---- 하단 탭바 ---- */
  nav{position:fixed;bottom:0;left:0;right:0;z-index:10;
    background:rgba(16,20,27,.94);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);display:flex;
    padding:6px 8px calc(env(safe-area-inset-bottom) + 6px)}
  nav button{flex:1;background:none;border:0;color:var(--faint);
    font:600 11px var(--sans);padding:7px 0 3px}
  nav button .ic{display:block;font-size:19px;margin-bottom:2px}
  nav button.on{color:var(--text)}
  nav button .n{display:inline-block;min-width:16px;font:700 10px var(--mono);
    color:var(--ink);background:var(--rule);border-radius:99px;margin-left:3px}

  /* ---- 설정 시트 ---- */
  #sheet{position:fixed;inset:0;z-index:20;display:none}
  #sheet.on{display:block}
  #sheet .dim{position:absolute;inset:0;background:rgba(0,0,0,.5)}
  #sheet .box{position:absolute;left:0;right:0;bottom:0;background:var(--surface);
    border-radius:18px 18px 0 0;padding:18px 16px calc(env(safe-area-inset-bottom)+18px);
    border-top:1px solid var(--line)}
  #sheet h2{font-size:16px;margin-bottom:12px}
  #sheet label{display:block;font-size:12px;color:var(--dim);margin:12px 0 5px}
  .danger-btn{margin-top:16px;width:100%;border:1px solid var(--danger);color:var(--danger);
    background:none;border-radius:10px;padding:11px;font:600 14px var(--sans)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>

<header>
  <span class="kdot" id="kdot"></span>
  <h1>AIOS<small>kernel v0.1</small></h1>
  <button id="gear" aria-label="설정">⚙︎</button>
</header>

<main>
  <!-- 회의 -->
  <section class="pane on" id="pane-meet">
    <div class="eyebrow">Task 생성</div>
    <div class="card">
      <div class="seg" id="orgSeg">
        <button class="on" data-org="publishing">출판사</button>
        <button data-org="gamestudio">게임 스튜디오</button>
      </div>
      <input type="text" id="taskTitle" placeholder="안건 — 예: 신간 제목 후보 검토" autocomplete="off">
      <button class="btn" id="convene">회의 소집</button>
    </div>

    <div id="transcript"></div>

    <div id="fbBox" style="display:none">
      <div class="eyebrow">편집장 피드백 <span class="gauge" id="gauge"></span></div>
      <div class="card">
        <div class="fbrow">
          <input type="text" id="fbText" placeholder="피드백 입력" autocomplete="off">
          <button class="btn send" id="fbSend">보내기</button>
        </div>
        <div class="quick">
          <button data-q="제목이 너무 길다">제목이 너무 길다</button>
          <button data-q="근거가 부족하다">근거가 부족하다</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 규칙 -->
  <section class="pane" id="pane-rules">
    <div class="eyebrow">승격된 규칙</div>
    <div id="ruleList"></div>
    <div class="eyebrow">규칙 후보</div>
    <div id="candList"></div>
  </section>

  <!-- 기록 -->
  <section class="pane" id="pane-history">
    <div class="eyebrow">지난 회의</div>
    <div id="histList"></div>
    <div id="histDetail" style="display:none">
      <button class="backbtn" id="histBack">← 목록으로</button>
      <div id="histTurns"></div>
    </div>
  </section>

  <!-- 로그 -->
  <section class="pane" id="pane-log">
    <div class="eyebrow">이벤트 버스</div>
    <div class="log" id="logList"></div>
  </section>
</main>

<nav>
  <button class="on" data-pane="meet"><span class="ic">◉</span>회의</button>
  <button data-pane="rules"><span class="ic">§</span>규칙<span class="n" id="ruleN" style="display:none"></span></button>
  <button data-pane="history"><span class="ic">⧉</span>기록</button>
  <button data-pane="log"><span class="ic">≣</span>로그</button>
</nav>

<div id="sheet">
  <div class="dim"></div>
  <div class="box">
    <h2>설정</h2>
    <label>추론 엔진</label>
    <div class="seg" id="engineSeg">
      <button class="on" data-e="mock">Mock (오프라인)</button>
      <button data-e="claude">Claude API</button>
    </div>
    <label>Anthropic API 키 (Claude 엔진용 · 이 기기에만 저장)</label>
    <input type="password" id="apiKey" placeholder="sk-ant-…">
    <button class="danger-btn" id="wipe">데이터 초기화 (규칙·경험·로그 삭제)</button>
  </div>
</div>

<script src="aios-kernel.js"></script>
<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);
  const T = AIOS.Topics;

  /* ---- 설정 ---- */
  const cfg = {
    get engine(){ return localStorage.getItem("aios:engine") || "mock" },
    set engine(v){ localStorage.setItem("aios:engine", v) },
    get key(){ return localStorage.getItem("aios:apikey") || "" },
    set key(v){ localStorage.setItem("aios:apikey", v) },
  };
  const makeLLM = () => cfg.engine === "claude" && cfg.key
    ? new AIOS.ClaudeLLM(cfg.key) : new AIOS.MockLLM();

  /* ---- 커널 부팅 + 조직 App 설치 ---- */
  let kernel, currentTask = null, org = "publishing";
  const ORGS = {
    publishing: { type: "publishing.title_review", agents: [
      ["기획 AI","독자가 집어 들 기획을 만든다","당신은 출판 기획자다. 제목/컨셉/타깃을 제안하라."],
      ["비평 AI","약한 기획을 통과시키지 않는다","당신은 냉정한 편집 비평가다. 논리·시장성 허점을 지적하라."],
      ["시장조사 AI","데이터 없는 직감을 걸러낸다","당신은 시장분석가다. 경쟁·트렌드 관점에서 검증하라."],
    ]},
    gamestudio: { type: "game.concept_review", agents: [
      ["게임 디렉터 AI","재미의 최종 책임자","당신은 게임 디렉터다. 핵심 재미 관점에서 제안하라."],
      ["레벨 디자인 AI","플레이 경험을 공간으로 설계","당신은 레벨 디자이너다. 난이도 곡선 관점에서 발언하라."],
      ["QA 비평 AI","출시 전 모든 구멍을 찾는다","당신은 QA 리드다. 엣지케이스로 반박하라."],
    ]},
  };
  function boot(){
    kernel = AIOS.createKernel({ llm: makeLLM(), turnDelay: 450 });
    for (const o of Object.values(ORGS))
      for (const [name, goal, system] of o.agents)
        kernel.registerAgent({ name, role: name, goal, system,
          capabilities: [o.type.split(".")[0] + ".*"] });
    wire();
    renderRules(); renderLog(); renderHistory();
  }

  /* ---- 이벤트 → 화면 ---- */
  const tr = $("#transcript");
  // LLM이 뱉는 마크다운 기호를 모바일에서 읽기 쉽게 경량 정리
  function tidy(md){
    return String(md)
      .replace(/\r/g, "")
      .replace(/^#{1,6}\s*/gm, "▸ ")        // 헤더 → 불릿
      .replace(/\*\*(.+?)\*\*/g, "$1")       // 볼드 제거
      .replace(/^\s*[-*]\s+/gm, "• ")        // 리스트 마커
      .replace(/^\s*\|.*\|\s*$/gm, m =>       // 표 행 → 화살표 구분
        m.replace(/\|/g, " · ").replace(/[-\s·]{4,}/g, "").trim())
      .replace(/^[\s·]*---[\s·]*$/gm, "─────")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  }
  function buildTurn(kind, chip, name, text){
    const d = document.createElement("div");
    d.className = "turn t-" + kind + " clip";
    d.innerHTML = `<div class="rail"></div><div class="body">
      <div class="who"><b></b><span class="chip">${chip}</span></div><p></p></div>`;
    d.querySelector("b").textContent = name;
    d.querySelector("p").textContent = tidy(text);
    const body = d.querySelector(".body");
    body.addEventListener("click", () => {
      d.classList.toggle("clip");
      body.classList.toggle("open", !d.classList.contains("clip"));
    });
    requestAnimationFrame(() => {           // 짧은 발언은 접기 해제
      const p = d.querySelector("p");
      if (p.scrollHeight <= p.clientHeight + 4){
        d.classList.remove("clip"); body.style.cursor = "default";
      }
    });
    return d;
  }
  function turnCard(kind, chip, name, text){
    const d = buildTurn(kind, chip, name, text);
    tr.appendChild(d);
    d.scrollIntoView({ behavior:"smooth", block:"end" });
  }
  function wire(){
    kernel.subscribe(T.TURN_PROPOSAL, ev => turnCard("proposal","제안",ev.payload.agent_name,ev.payload.content));
    kernel.subscribe(T.TURN_CRITIQUE, ev => turnCard("critique","반론",ev.payload.agent_name,ev.payload.content));
    kernel.subscribe(T.TURN_REBUTTAL, ev => turnCard("rebuttal","재반론",ev.payload.agent_name,ev.payload.content));
    kernel.subscribe(T.MEETING_CONCLUDED, ev => {
      turnCard("conclude","결론","의장",ev.payload.conclusion.decision);
      renderHistory();
    });
    kernel.subscribe(T.RULE_PROMOTED, ev => {
      const d = document.createElement("div");
      d.className = "promo";
      d.innerHTML = `<div class="tag">RULE PROMOTED</div><p></p>
        <small>이후 모든 회의의 프롬프트에 자동 주입됩니다 · 적용: ${ev.payload.scope}</small>`;
      d.querySelector("p").textContent = "“" + ev.payload.text + "”";
      tr.appendChild(d);
      d.scrollIntoView({ behavior:"smooth", block:"end" });
    });
    kernel.subscribe("*", ev => { addLog(ev); renderRules(); });
    kernel.subscribe(T.RULE_CANDIDATE, renderGauge);
  }

  /* ---- 회의 소집 ---- */
  $("#convene").onclick = async () => {
    const title = $("#taskTitle").value.trim() ||
      (org === "publishing" ? "신간 제목 후보 검토" : "신작 컨셉 리뷰");
    tr.innerHTML = ""; $("#fbBox").style.display = "none";
    $("#convene").disabled = true; $("#kdot").classList.add("busy");
    try {
      currentTask = await kernel.createTask(title, "최선의 결론 도출", ORGS[org].type);
      $("#fbBox").style.display = "block"; renderGauge();
    } catch (e) { alert("회의 실패: " + e.message); }
    $("#convene").disabled = false; $("#kdot").classList.remove("busy");
  };
  $("#orgSeg").onclick = e => {
    const b = e.target.closest("button"); if (!b) return;
    org = b.dataset.org;
    for (const x of $("#orgSeg").children) x.classList.toggle("on", x === b);
    $("#taskTitle").placeholder = org === "publishing"
      ? "안건 — 예: 신간 제목 후보 검토" : "안건 — 예: 신작 로그라이크 컨셉 리뷰";
  };

  /* ---- 피드백 ---- */
  function sendFb(text){
    if (!currentTask || !text) return;
    kernel.submitFeedback(currentTask.id, "human:편집장", text);
    $("#fbText").value = ""; renderGauge();
  }
  $("#fbSend").onclick = () => sendFb($("#fbText").value.trim());
  $("#fbText").addEventListener("keydown", e => { if (e.key === "Enter") sendFb(e.target.value.trim()); });
  document.querySelector(".quick").onclick = e => {
    const b = e.target.closest("button"); if (b) sendFb(b.dataset.q);
  };
  function renderGauge(){
    const c = kernel.candidates();
    $("#gauge").textContent = c.length
      ? c.map(x => "●".repeat(x.count) + "○".repeat(Math.max(0, 3 - x.count))).join("  ")
      : "";
  }

  /* ---- 규칙 탭 ---- */
  function renderRules(){
    const rules = kernel.store.query("rules", { active: 1 });
    $("#ruleN").style.display = rules.length ? "" : "none";
    $("#ruleN").textContent = rules.length;
    $("#ruleList").innerHTML = rules.length ? "" :
      `<div class="empty">아직 없습니다. 같은 피드백이 3회 쌓이면 규칙으로 승격됩니다.</div>`;
    for (const r of rules) {
      const d = document.createElement("div");
      d.className = "rule-item";
      d.innerHTML = `<div class="tx"><div></div><div class="sc">적용: ${r.scope}</div></div>
        <button class="off">해제</button>`;
      d.querySelector(".tx div").textContent = r.text;
      d.querySelector(".off").onclick = () => { kernel.deactivate(r.id); renderRules(); };
      $("#ruleList").appendChild(d);
    }
    const cands = kernel.candidates();
    $("#candList").innerHTML = cands.length ? "" : `<div class="empty">누적 중인 후보가 없습니다.</div>`;
    for (const c of cands) {
      const d = document.createElement("div");
      d.className = "cand";
      d.innerHTML = `<span></span><span class="gauge">${"●".repeat(c.count)}${"○".repeat(Math.max(0,3-c.count))}</span>`;
      d.querySelector("span").textContent = c.normalized_text;
      $("#candList").appendChild(d);
    }
  }

  /* ---- 기록 탭 ---- */
  const ORG_LABEL = { "publishing.title_review":"출판사", "game.concept_review":"게임 스튜디오" };
  const CHIP = { proposal:["제안","proposal"], critique:["반론","critique"],
                 rebuttal:["재반론","rebuttal"] };
  function fmtTime(iso){
    if (!iso) return "";
    const d = new Date(iso), n = new Date();
    const hm = d.toTimeString().slice(0,5);
    return d.toDateString() === n.toDateString()
      ? `오늘 ${hm}` : `${d.getMonth()+1}/${d.getDate()} ${hm}`;
  }
  function renderHistory(){
    const meetings = kernel.store.query("meetings").reverse();  // 최신 먼저
    const list = $("#histList");
    $("#histDetail").style.display = "none";
    list.style.display = "";
    if (!meetings.length){
      list.innerHTML = `<div class="empty">아직 회의 기록이 없습니다. 첫 회의를 소집해 보세요.</div>`;
      return;
    }
    list.innerHTML = "";
    for (const m of meetings){
      const task = kernel.store.load("tasks", m.task_id) || {};
      const org = ORG_LABEL[task.task_type] || (task.task_type||"").split(".")[0] || "조직";
      const when = (kernel.store.query("events", { topic:"meeting.concluded" })
        .find(e => e.payload && e.payload.meeting_id === m.id) || {}).ts;
      const d = document.createElement("div");
      d.className = "hist-item";
      d.innerHTML = `<div class="top"><span class="org"></span><span class="time"></span></div>
        <div class="ttl"></div><div class="concl"></div>
        <div class="meta">${(m.turns||[]).length}개 발언 · 참여 ${(m.participants||[]).length}</div>`;
      d.querySelector(".org").textContent = org;
      d.querySelector(".time").textContent = fmtTime(when);
      d.querySelector(".ttl").textContent = task.title || "(제목 없음)";
      d.querySelector(".concl").textContent = tidy((m.conclusion||{}).decision || "");
      d.onclick = () => openMeeting(m, task, org);
      list.appendChild(d);
    }
  }
  function openMeeting(m, task, org){
    $("#histList").style.display = "none";
    $("#histDetail").style.display = "";
    const box = $("#histTurns");
    box.innerHTML = `<div class="eyebrow">${org} · ${task.title||""}</div>`;
    for (const u of m.turns||[]){
      const [chip, kind] = CHIP[u.turn_type] || ["발언","proposal"];
      box.appendChild(buildTurn(kind, chip, u.agent_name, u.content));
    }
    box.appendChild(buildTurn("conclude","결론","의장",(m.conclusion||{}).decision||""));
    window.scrollTo({ top:0, behavior:"smooth" });
  }
  $("#histBack").onclick = renderHistory;

  /* ---- 로그 탭 ---- */
  function addLog(ev){
    const d = document.createElement("div");
    const cls = ev.topic.startsWith("rule") ? "tp r" :
                ev.topic.includes("concluded") ? "tp c" : "tp";
    d.innerHTML = `<span>${ev.ts.slice(11,19)}</span><span class="${cls}">${ev.topic}</span>`;
    $("#logList").prepend(d);
  }
  function renderLog(){
    $("#logList").innerHTML = "";
    for (const ev of kernel.store.query("events").slice(-80)) addLog(ev);
  }

  /* ---- 탭 전환 ---- */
  document.querySelector("nav").onclick = e => {
    const b = e.target.closest("button"); if (!b) return;
    for (const x of document.querySelectorAll("nav button")) x.classList.toggle("on", x === b);
    for (const p of document.querySelectorAll(".pane"))
      p.classList.toggle("on", p.id === "pane-" + b.dataset.pane);
    if (b.dataset.pane === "history") renderHistory();
  };

  /* ---- 설정 시트 ---- */
  $("#gear").onclick = () => { $("#sheet").classList.add("on"); $("#apiKey").value = cfg.key; syncEngineSeg(); };
  $("#sheet .dim").onclick = () => { cfg.key = $("#apiKey").value.trim(); $("#sheet").classList.remove("on"); boot(); };
  $("#engineSeg").onclick = e => {
    const b = e.target.closest("button"); if (!b) return;
    cfg.engine = b.dataset.e; syncEngineSeg();
  };
  function syncEngineSeg(){
    for (const x of $("#engineSeg").children)
      x.classList.toggle("on", x.dataset.e === cfg.engine);
  }
  $("#wipe").onclick = () => {
    if (!confirm("규칙·경험·이벤트를 모두 삭제할까요?")) return;
    kernel.store.wipe(["rules","rule_candidates","experiences","events","tasks","meetings","feedback"]);
    tr.innerHTML = ""; $("#fbBox").style.display = "none"; currentTask = null;
    renderRules(); renderLog(); renderHistory(); $("#sheet").classList.remove("on");
  };

  boot();
})();
</script>
</body>
</html>
