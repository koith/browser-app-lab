<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<title>당근 통합검색</title>
<style>
:root{
  --carrot:#FF6F0F; --carrot-dark:#E5610B; --carrot-soft:#FFF1E5;
  --bg:#FFFFFF; --panel:#F7F8F8; --ink:#212124; --sub:#868B94;
  --line:#E5E7EB; --sold:#ADB1BA;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif}
body{padding-bottom:calc(24px + env(safe-area-inset-bottom))}
button{font-family:inherit}

header{position:sticky;top:0;z-index:20;background:var(--bg);
  padding:calc(8px + env(safe-area-inset-top)) 0 0;border-bottom:1px solid var(--line)}
.hrow{display:flex;align-items:center;gap:8px;padding:0 16px 10px}
.logo{font-size:17px;font-weight:800;letter-spacing:-.4px;color:var(--carrot);flex:none}
.searchRow{display:flex;gap:8px;padding:0 16px 10px}
.inputWrap{position:relative;flex:1;display:flex}
.inputWrap input{flex:1;font-size:16px;padding:11px 14px;border:none;border-radius:10px;
  background:var(--panel);color:var(--ink);outline:none}
.inputWrap input:focus{box-shadow:0 0 0 2px var(--carrot) inset}
.inputWrap input::-webkit-search-cancel-button{display:none}
.clearBtn{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:20px;height:20px;
  border:none;border-radius:50%;background:#C6CAD1;color:#fff;font-size:12px;line-height:20px;
  padding:0;display:none;align-items:center;justify-content:center;font-weight:700}
.clearBtn.show{display:flex}
.searchRow button{font-size:15px;font-weight:700;padding:0 18px;border:none;border-radius:10px;
  background:var(--carrot);color:#fff}
.searchRow button:active{background:var(--carrot-dark)}
.searchRow button:disabled{opacity:.45}

.tabs{display:flex;gap:22px;padding:0 16px;border-bottom:0}
.tab{position:relative;font-size:15px;font-weight:700;color:var(--sub);background:none;border:none;
  padding:2px 0 10px;cursor:pointer}
.tab.on{color:var(--ink)}
.tab.on::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2.5px;background:var(--carrot);border-radius:2px}
.members{color:var(--sub)}
.chipbar{display:flex;gap:8px;overflow-x:auto;padding:0 16px 10px;scrollbar-width:none}
.chipbar::-webkit-scrollbar{display:none}
.chip{flex:none;display:flex;align-items:center;gap:4px;white-space:nowrap;
  font-size:13.5px;font-weight:600;padding:8px 13px;border-radius:999px;
  border:1px solid var(--line);background:var(--bg);color:#4D5159}
.chip.on{background:var(--carrot-soft);border-color:var(--carrot);color:var(--carrot-dark)}
.chip.region{border-color:#D1D5DB;font-weight:700}
.chip.region.on{background:var(--carrot);border-color:var(--carrot);color:#fff}
.chip .caret{font-size:9px;opacity:.7}

main{padding:12px 16px 0}
body{overscroll-behavior-y:contain}
.ptr{position:fixed;left:0;right:0;top:0;display:flex;justify-content:center;pointer-events:none;z-index:15;
  opacity:0;transition:opacity .15s}
.ptr.show{opacity:1}
.ptrInner{margin-top:calc(env(safe-area-inset-top) + 6px);width:30px;height:30px;border-radius:50%;
  background:var(--bg);box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center}
.ptrIcon{width:16px;height:16px;border:2px solid var(--carrot-soft);border-top-color:var(--carrot);border-radius:50%}
.ptr.spin .ptrIcon{animation:spin .8s linear infinite}
.status{font-size:13px;color:var(--sub);margin:0 0 12px;line-height:1.5}
.status b{color:var(--ink);font-weight:700}
.status .err{color:#D93A3A}

.spinnerWrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:56px 0;color:var(--sub);font-size:13.5px}
.spinner{width:30px;height:30px;border:3px solid var(--carrot-soft);border-top-color:var(--carrot);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.inlineSpin{width:14px;height:14px;border:2px solid var(--carrot-soft);border-top-color:var(--carrot);
  border-radius:50%;display:inline-block;vertical-align:-2px;animation:spin .8s linear infinite;margin-right:6px}

.card{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);
  text-decoration:none;color:inherit}
.card.sold .thumb,.card.sold .title,.card.sold .price{opacity:.45}
.thumb{width:82px;height:82px;border-radius:8px;object-fit:cover;background:var(--panel);flex:none}
.info{min-width:0;flex:1;display:flex;flex-direction:column;justify-content:center;gap:3px}
.title{font-size:15px;font-weight:500;line-height:1.35;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.price{font-size:15px;font-weight:700}
.meta{font-size:12.5px;color:var(--sub);display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;background:#EDEEF0;color:#6B7078}
.ago{color:var(--carrot-dark);font-weight:600}
.empty{text-align:center;color:var(--sub);font-size:14px;padding:56px 16px;line-height:1.7}

/* 지역 선택 시트 */
.sheetBack{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;display:none}
.sheetBack.open{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--bg);
  border-radius:18px 18px 0 0;max-height:82vh;display:none;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom)}
.sheet.open{display:flex}
.sheetHead{display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 12px;border-bottom:1px solid var(--line)}
.sheetHead h2{font-size:16px;font-weight:800;margin:0}
.sheetHead .cnt{font-size:13px;color:var(--carrot);font-weight:700}
.sheetBody{overflow-y:auto;padding:4px 18px 12px;-webkit-overflow-scrolling:touch}
.provRow{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px}
.provRow span{font-size:13.5px;font-weight:800;color:var(--ink)}
.provRow button{font-size:12.5px;font-weight:700;border:none;background:none;color:var(--carrot);padding:4px}
.guWrap{display:flex;flex-wrap:wrap;gap:7px}
.gu{font-size:13px;font-weight:600;padding:8px 12px;border-radius:999px;
  border:1px solid var(--line);background:var(--bg);color:#4D5159}
.gu.on{background:var(--carrot-soft);border-color:var(--carrot);color:var(--carrot-dark)}
.sheetFoot{padding:12px 18px 16px;border-top:1px solid var(--line);display:flex;gap:8px}
.sheetFoot button{flex:1;font-size:15px;font-weight:700;padding:13px;border-radius:10px;border:none}
.btnClear{background:var(--panel);color:#4D5159;flex:0 0 88px !important}
.btnDone{background:var(--carrot);color:#fff}
.tagInputRow{display:flex;gap:8px;margin:14px 0 12px}
.tagInputRow input{flex:1;font-size:16px;padding:11px 13px;border:none;border-radius:10px;
  background:var(--panel);color:var(--ink);outline:none}
.tagInputRow input:focus{box-shadow:0 0 0 2px var(--carrot) inset}
.tagInputRow button{font-size:14px;font-weight:700;padding:0 16px;border:none;border-radius:10px;
  background:var(--carrot);color:#fff}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.tag{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
  padding:7px 10px 7px 12px;border-radius:999px;background:var(--carrot-soft);color:var(--carrot-dark)}
.tag b{font-weight:800;font-size:15px;line-height:1;opacity:.7;padding:0 2px}
.hintTxt{font-size:12.5px;color:var(--sub);line-height:1.6;margin:6px 0 4px}
.sheetLoad{padding:40px 0;text-align:center;color:var(--sub);font-size:13.5px}
</style>
</head>
<body>
<header>
  <div class="hrow"><div class="logo">당근 통합검색</div></div>
  <div class="tabs">
    <button class="tab on" id="tabSell">중고거래</button>
    <button class="tab" id="tabGroup">모임</button>
    <button class="tab" id="tabComm">동네생활</button>
  </div>
  <div class="searchRow">
    <div class="inputWrap">
      <input id="q" type="search" placeholder="검색어를 입력하세요" enterkeyhint="search" autocomplete="off">
      <button class="clearBtn" id="clearBtn" aria-label="검색어 지우기">✕</button>
    </div>
    <button id="goBtn">검색</button>
  </div>
  <div class="chipbar">
    <button class="chip region" id="regionChip">지역 선택 <span class="caret">▼</span></button>
    <button class="chip on" id="sortNew">최신순</button>
    <button class="chip" id="sortPrice">낮은가격순</button>
    <button class="chip" id="sortDist">가까운순</button>
    <button class="chip" id="onSaleChip">거래가능만</button>
    <button class="chip" id="excChip">제외어 <span class="caret">▼</span></button>
  </div>
</header>

<main>
  <div class="status" id="statusBox"></div>
  <div id="results"></div>
</main>

<div class="ptr" id="ptr"><div class="ptrInner"><div class="ptrIcon"></div></div></div>
<div class="sheetBack" id="sheetBack"></div>
<div class="sheet" id="sheet">
  <div class="sheetHead">
    <h2>검색 지역</h2>
    <span class="cnt" id="sheetCnt"></span>
  </div>
  <div class="sheetBody" id="sheetBody"><div class="sheetLoad">지역 목록 불러오는 중...</div></div>
  <div class="sheetFoot">
    <button class="btnClear" id="btnClear">전체 해제</button>
    <button class="btnDone" id="btnDone">완료</button>
  </div>
</div>

<div class="sheetBack" id="excBack"></div>
<div class="sheet" id="excSheet">
  <div class="sheetHead">
    <h2>제외할 단어</h2>
    <span class="cnt" id="excCnt"></span>
  </div>
  <div class="sheetBody">
    <div class="hintTxt">입력한 단어가 제목에 포함된 매물은 결과에서 숨겨집니다. 여러 개 등록할 수 있어요.</div>
    <div class="tagInputRow">
      <input id="excInput" type="text" placeholder="예: 부품, 고장, 삽니다" enterkeyhint="done" autocomplete="off">
      <button id="excAdd">추가</button>
    </div>
    <div class="tags" id="excTags"></div>
  </div>
  <div class="sheetFoot">
    <button class="btnClear" id="excClear">전체 삭제</button>
    <button class="btnDone" id="excDone">완료</button>
  </div>
</div>

<script>
const API='https://browser-app-lab.vercel.app/api';
const LS_REGIONS='dgn_regions_v1', LS_SEL='dgn_selected_v1', LS_DONGS='dgn_dongs_v1', LS_EXC='dgn_exclude_v1';
const MAX_DONGS=200, BATCH=45;

const COORDS={
"종로구":[37.573,126.979],"중구":[37.564,126.997],"용산구":[37.532,126.990],"성동구":[37.563,127.036],
"광진구":[37.538,127.082],"동대문구":[37.574,127.040],"중랑구":[37.606,127.093],"성북구":[37.589,127.017],
"강북구":[37.640,127.026],"도봉구":[37.669,127.047],"노원구":[37.654,127.056],"은평구":[37.603,126.929],
"서대문구":[37.579,126.936],"마포구":[37.566,126.902],"양천구":[37.517,126.866],"강서구":[37.551,126.849],
"구로구":[37.495,126.887],"금천구":[37.457,126.895],"영등포구":[37.526,126.896],"동작구":[37.512,126.940],
"관악구":[37.478,126.951],"서초구":[37.484,127.033],"강남구":[37.517,127.047],"송파구":[37.515,127.106],
"강동구":[37.530,127.124],
"수원시":[37.263,127.029],"성남시":[37.420,127.127],"고양시":[37.658,126.832],"용인시":[37.241,127.178],
"부천시":[37.503,126.766],"안산시":[37.322,126.831],"안양시":[37.394,126.957],"남양주시":[37.636,127.216],
"화성시":[37.199,126.831],"평택시":[36.992,127.113],"의정부시":[37.738,127.034],"시흥시":[37.380,126.803],
"파주시":[37.760,126.780],"광명시":[37.479,126.865],"김포시":[37.615,126.716],"군포시":[37.361,126.935],
"광주시":[37.429,127.255],"이천시":[37.272,127.435],"양주시":[37.785,127.046],"오산시":[37.150,127.077],
"구리시":[37.594,127.130],"안성시":[37.008,127.280],"포천시":[37.895,127.200],"의왕시":[37.345,126.968],
"하남시":[37.539,127.215],"여주시":[37.298,127.637],"동두천시":[37.904,127.060],"과천시":[37.429,126.988],
"가평군":[37.831,127.510],"양평군":[37.492,127.488],"연천군":[38.096,127.075],
"장안구":[37.304,127.010],"권선구":[37.258,126.972],"팔달구":[37.282,127.020],"영통구":[37.259,127.046],
"수정구":[37.450,127.146],"중원구":[37.430,127.137],"분당구":[37.383,127.119],"만안구":[37.387,126.932],
"동안구":[37.393,126.951],"상록구":[37.303,126.847],"단원구":[37.320,126.812],"덕양구":[37.637,126.832],
"일산동구":[37.659,126.775],"일산서구":[37.675,126.750],"처인구":[37.234,127.201],"기흥구":[37.280,127.115],
"수지구":[37.322,127.098],"원미구":[37.502,126.783],"소사구":[37.482,126.795],"오정구":[37.527,126.790]};

let regionsData=JSON.parse(localStorage.getItem(LS_REGIONS)||'null')||{list:[]};
let selected=new Set(JSON.parse(localStorage.getItem(LS_SEL)||'[]'));
let dongCache=JSON.parse(localStorage.getItem(LS_DONGS)||'{}');
let items=[], codeMeta={}, sortMode='new', onSaleOnly=false, myPos=null, searching=false;
let excluded=JSON.parse(localStorage.getItem(LS_EXC)||'[]');
let mode='sell';
const modeState={sell:{q:'',items:[],meta:{}},group:{q:'',items:[],meta:{}},comm:{q:'',items:[],meta:{}}};

const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ---------- 지역 시트 ---------- */
function openSheet(){ $('sheetBack').classList.add('open'); $('sheet').classList.add('open'); renderSheet(); }
function closeSheet(){ $('sheetBack').classList.remove('open'); $('sheet').classList.remove('open'); }
$('regionChip').onclick=openSheet;
$('sheetBack').onclick=closeSheet;
$('btnDone').onclick=()=>{ closeSheet(); if($('q').value.trim()&&selected.size) search(); };
$('btnClear').onclick=()=>{ selected.clear(); persistSel(); renderSheet(); updateRegionChip(); };

function persistSel(){ localStorage.setItem(LS_SEL, JSON.stringify([...selected])); }

function updateRegionChip(){
  const n=selected.size;
  const names=regionsData.list.filter(r=>selected.has(r.code)).map(r=>r.name);
  let label='지역 선택';
  if(n===1) label=names[0];
  else if(n>1) label=`${names[0]} 외 ${n-1}`;
  $('regionChip').innerHTML=`${esc(label)} <span class="caret">▼</span>`;
  $('regionChip').classList.toggle('on', n>0);
  $('sheetCnt').textContent=n?`${n}곳 선택`:'';
}

function renderSheet(){
  if(!regionsData.list.length){
    $('sheetBody').innerHTML='<div class="sheetLoad"><span class="inlineSpin"></span>지역 목록 불러오는 중...</div>';
    return;
  }
  const byProv={};
  for(const r of regionsData.list) (byProv[r.province] ||= []).push(r);
  let html='';
  for(const prov of ['서울특별시','경기도']){
    const list=byProv[prov]||[]; if(!list.length) continue;
    const allOn=list.every(r=>selected.has(r.code));
    html+=`<div class="provRow"><span>${prov} <span style="color:var(--sub);font-weight:600">${list.length}</span></span>
      <button data-prov="${prov}">${allOn?'전체 해제':'전체 선택'}</button></div><div class="guWrap">`+
      list.map(r=>`<button class="gu ${selected.has(r.code)?'on':''}" data-code="${r.code}">${esc(r.name)}</button>`).join('')+
      `</div>`;
  }
  $('sheetBody').innerHTML=html;
  $('sheetBody').querySelectorAll('.gu').forEach(b=>b.onclick=()=>{
    const c=b.dataset.code;
    selected.has(c)?selected.delete(c):selected.add(c);
    persistSel(); b.classList.toggle('on'); updateRegionChip();
  });
  $('sheetBody').querySelectorAll('.provRow button').forEach(b=>b.onclick=()=>{
    const list=(byProv[b.dataset.prov]||[]).map(r=>r.code);
    const on=list.every(c=>selected.has(c));
    list.forEach(c=>on?selected.delete(c):selected.add(c));
    persistSel(); renderSheet(); updateRegionChip();
  });
  updateRegionChip();
}

async function loadRegions(){
  try{
    const r=await fetch(`${API}/daangn-regions`); const d=await r.json();
    if(!r.ok||!d.list||!d.list.length) throw new Error(d.error||'목록 없음');
    regionsData={list:d.list};
    localStorage.setItem(LS_REGIONS, JSON.stringify(regionsData));
    if($('sheet').classList.contains('open')) renderSheet();
    updateRegionChip();
  }catch(e){
    if($('sheet').classList.contains('open'))
      $('sheetBody').innerHTML=`<div class="sheetLoad">지역 목록 로딩 실패<br>${esc(String(e.message||e))}</div>`;
  }
}

/* ---------- 정렬/필터 ---------- */
function setSort(m){
  sortMode=m;
  [['sortNew','new'],['sortPrice','price'],['sortDist','dist']].forEach(([id,mm])=>
    $(id).classList.toggle('on', mm===m));
  if(m==='dist'&&!myPos){
    navigator.geolocation.getCurrentPosition(
      p=>{ myPos=[p.coords.latitude,p.coords.longitude]; renderResults(); },
      ()=>{ setStatus('위치 권한이 없어 가까운순을 쓸 수 없습니다.', true); setSort('new'); });
  }
  renderResults();
}
$('sortNew').onclick=()=>setSort('new');
$('sortPrice').onclick=()=>setSort('price');
$('sortDist').onclick=()=>setSort('dist');
$('onSaleChip').onclick=()=>{
  onSaleOnly=!onSaleOnly;
  $('onSaleChip').classList.toggle('on', onSaleOnly);
  renderResults(); updateCount();
};




/* ---------- 검색어 초기화 버튼 ---------- */
function toggleClear(){ $('clearBtn').classList.toggle('show', !!$('q').value); }
$('q').addEventListener('input', toggleClear);
$('clearBtn').onclick=()=>{ $('q').value=''; toggleClear(); $('q').focus(); };

/* ---------- 탭 ---------- */
function setMode(m){
  if(mode===m) return;
  // 현재 탭 상태 저장
  modeState[mode]={q:$('q').value, items:items, meta:lastMeta};
  mode=m;
  $('tabSell').classList.toggle('on', m==='sell');
  $('tabGroup').classList.toggle('on', m==='group');
  $('tabComm').classList.toggle('on', m==='comm');
  const sell=(m==='sell');
  ['sortPrice','onSaleChip','sortDist'].forEach(id=>$(id).style.display=sell?'':'none');
  $('sortNew').style.display=(m==='comm'||sell)?'':'none';
  $('q').placeholder = m==='group' ? '모임 검색 (예: 등산, 독서)'
    : m==='comm' ? '동네생활 검색 (예: 맛집, 분실)' : '검색어를 입력하세요';
  // 새 탭 상태 복원 (자동 재검색 없음)
  const st=modeState[m];
  $('q').value=st.q||'';
  items=st.items||[]; lastMeta=st.meta||{};
  toggleClear();
  if(items.length){ renderResults(); updateCount(); }
  else { $('results').innerHTML=''; setStatus(''); }
}
$('tabSell').onclick=()=>setMode('sell');
$('tabGroup').onclick=()=>setMode('group');
$('tabComm').onclick=()=>setMode('comm');

/* ---------- 제외어 ---------- */
function openExc(){ $('excBack').classList.add('open'); $('excSheet').classList.add('open'); renderExc(); setTimeout(()=>$('excInput').focus(),150); }
function closeExc(){ $('excBack').classList.remove('open'); $('excSheet').classList.remove('open'); }
$('excChip').onclick=openExc;
$('excBack').onclick=closeExc;
$('excDone').onclick=closeExc;
$('excClear').onclick=()=>{ excluded=[]; saveExc(); renderExc(); };
$('excAdd').onclick=addExc;
$('excInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); addExc(); }});

function addExc(){
  const raw=$('excInput').value.trim();
  if(!raw) return;
  for(const w of raw.split(/[,\s]+/).filter(Boolean)){
    const t=w.toLowerCase();
    if(!excluded.includes(t)) excluded.push(t);
  }
  $('excInput').value='';
  saveExc(); renderExc();
}
function saveExc(){
  localStorage.setItem(LS_EXC, JSON.stringify(excluded));
  updateExcChip(); renderResults(); updateCount();
}
function updateExcChip(){
  const n=excluded.length;
  $('excChip').innerHTML=(n?`제외어 ${n}`:'제외어')+' <span class="caret">▼</span>';
  $('excChip').classList.toggle('on', n>0);
  const c=$('excCnt'); if(c) c.textContent=n?`${n}개`:'';
}
function renderExc(){
  $('excTags').innerHTML=excluded.length
    ? excluded.map((w,i)=>`<span class="tag">${esc(w)}<b data-i="${i}">×</b></span>`).join('')
    : '<div class="hintTxt" style="margin:0">등록된 제외어가 없습니다.</div>';
  $('excTags').querySelectorAll('b[data-i]').forEach(b=>b.onclick=()=>{
    excluded.splice(+b.dataset.i,1); saveExc(); renderExc();
  });
  updateExcChip();
}
function passExc(it){
  if(!excluded.length) return true;
  const t=(it.title||'').toLowerCase();
  return !excluded.some(w=>t.includes(w));
}

/* ---------- 검색 ---------- */
$('goBtn').onclick=search;
$('q').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.target.blur(); search(); }});

async function getDongs(r){
  if(dongCache[r.code]) return dongCache[r.code];
  const res=await fetch(`${API}/daangn-dongs?gu=${encodeURIComponent(r.name)}&province=${encodeURIComponent(r.province)}`);
  const d=await res.json();
  if(!res.ok||!d.list||!d.list.length) throw new Error(d.error||'동 목록 없음');
  dongCache[r.code]=d.list;
  localStorage.setItem(LS_DONGS, JSON.stringify(dongCache));
  return d.list;
}

function showSpinner(msg){
  $('results').innerHTML=`<div class="spinnerWrap"><div class="spinner"></div><div>${esc(msg)}</div></div>`;
}

let lastMeta={};
function updateCount(){
  if(searching||!lastMeta.codes) return;
  const shown=items.filter(i=>(!onSaleOnly||i.status==='on_sale')&&passExc(i)).length;
  let msg=`<b>${shown}건</b>`;
  if(onSaleOnly||excluded.length) msg+=` <span style="color:var(--sub)">/ 전체 ${items.length}</span>`;
  msg+=` · 동네 ${lastMeta.codes}곳 · ${lastMeta.sec}초`;
  if(lastMeta.capped) msg+=` · <span class="err">${MAX_DONGS}곳까지만 검색</span>`;
  if(lastMeta.err) msg+=` · <span class="err">${lastMeta.err}건 조회 실패</span>`;
  setStatus(msg);
}

async function search(keepView){
  const q=$('q').value.trim();
  if(!q){ setStatus('검색어를 입력하세요.', true); return; }
  if(!selected.size){ setStatus('지역을 먼저 선택하세요.', true); openSheet(); return; }
  if(searching) return;
  searching=true; $('goBtn').disabled=true;
  const prev=items;
  items=[]; lastMeta={};
  if(!keepView) setStatus('');
  const t0=Date.now();
  if(!keepView) showSpinner('동네 목록을 확인하는 중...');
  else setStatus('<span class="inlineSpin"></span>최신 정보로 갱신 중...');
  try{
    const chosen=regionsData.list.filter(r=>selected.has(r.code));
    let codes=[]; codeMeta={}; const dongFails=[];
    for(const r of chosen){
      try{
        for(const d of await getDongs(r)){ codes.push(d.code); codeMeta[d.code]={gu:d.gu||r.name, dong:d.dong}; }
      }catch(e){
        codes.push(r.code); codeMeta[r.code]={gu:r.name, dong:null}; dongFails.push(r.name);
      }
    }
    codes=[...new Set(codes)];
    let capped=false;
    if(codes.length>MAX_DONGS){ codes=codes.slice(0,MAX_DONGS); capped=true; }

    const batches=[]; for(let i=0;i<codes.length;i+=BATCH) batches.push(codes.slice(i,i+BATCH));
    const seen=new Set(); let errCount=0;
    for(let b=0;b<batches.length;b++){
      if(!items.length&&!keepView) showSpinner(`동네 ${codes.length}곳 검색 중... (${b+1}/${batches.length})`);
      else setStatus(`<span class="inlineSpin"></span>검색 중 (${b+1}/${batches.length}) · 현재 <b>${items.length}건</b>`);
      try{
        const ep=mode==='group'?'daangn-group':mode==='comm'?'daangn-community':'daangn';
        const r=await fetch(`${API}/${ep}?q=${encodeURIComponent(q)}&regions=${encodeURIComponent(batches[b].join(','))}`);
        const d=await r.json();
        if(!r.ok) throw new Error(d.error||('HTTP '+r.status));
        errCount+=(d.errors||[]).length;
        for(const it of d.items){
          if(seen.has(it.url)) continue;
          seen.add(it.url);
          const m=codeMeta[it.region]||{};
          items.push({...it,_i:items.length,gu:m.gu||guName(it.region),dong:it.dong||m.dong||null});
        }
        renderResults();
      }catch(e){ errCount++; }
    }
    lastMeta={codes:codes.length, sec:((Date.now()-t0)/1000).toFixed(1), capped, err:errCount+dongFails.length};
    searching=false;
    updateCount();
    if(!items.length) $('results').innerHTML='<div class="empty">검색 결과가 없습니다.<br>다른 검색어나 지역을 시도해보세요.</div>';
  }catch(e){
    searching=false;
    setStatus('검색 실패: '+esc(String(e.message||e)), true);
    if(keepView&&prev.length){ items=prev; renderResults(); } else $('results').innerHTML='';
  }finally{
    searching=false; $('goBtn').disabled=false;
  }
}


/* ---------- 당겨서 새로고침 ---------- */
(function(){
  let startY=null, pulling=false, dy=0;
  const THRESH=70;
  const ptr=$('ptr');
  const inSheet=t=>!!(t&&t.closest&&t.closest('.sheet'));
  document.addEventListener('touchstart',e=>{
    if(inSheet(e.target)||searching) return;
    if(window.scrollY<=0 && e.touches.length===1){ startY=e.touches[0].clientY; pulling=true; dy=0; }
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!pulling||startY===null) return;
    dy=e.touches[0].clientY-startY;
    if(dy>0&&window.scrollY<=0){ ptr.classList.toggle('show', dy>20); }
    else pulling=false;
  },{passive:true});
  document.addEventListener('touchend',()=>{
    if(!pulling){ ptr.classList.remove('show'); return; }
    pulling=false;
    if(dy>THRESH && $('q').value.trim() && selected.size && !searching){
      ptr.classList.add('spin');
      search(true).finally(()=>{ ptr.classList.remove('show','spin'); });
    }else{
      ptr.classList.remove('show','spin');
    }
    startY=null; dy=0;
  },{passive:true});
})();

/* ---------- 렌더 ---------- */
function guName(code){ return (code||'').replace(/-\d+$/,''); }
function dist(a,b){ const dx=(a[1]-b[1])*88, dy=(a[0]-b[0])*111; return Math.sqrt(dx*dx+dy*dy); }

function renderResults(){
  let arr=[...items];
  if(onSaleOnly) arr=arr.filter(i=>i.status==='on_sale');
  arr=arr.filter(passExc);
  if(sortMode==='price') arr.sort((a,b)=>(a.price??Infinity)-(b.price??Infinity)||a._i-b._i);
  else if(sortMode==='dist'&&myPos) arr.sort((a,b)=>{
    const ga=(a.gu||'').split(' ').pop(), gb=(b.gu||'').split(' ').pop();
    return (COORDS[ga]?dist(myPos,COORDS[ga]):Infinity)-(COORDS[gb]?dist(myPos,COORDS[gb]):Infinity)||a._i-b._i;
  });
  else if(mode==='group') arr.sort((a,b)=>(b.members??-1)-(a.members??-1)||a._i-b._i);
  else arr.sort((a,b)=>(b.sortTime??0)-(a.sortTime??0)||a._i-b._i);
  if(arr.length) $('results').innerHTML=arr.map(card).join('');
  else if(!searching&&items.length) $('results').innerHTML='<div class="empty">조건에 맞는 결과가 없습니다.</div>';
}

function card(it){
  if(mode==='group') return groupCard(it);
  if(mode==='comm') return commCard(it);
  const st=it.status==='sold'?'<span class="badge">판매완료</span>':'';
  const price=it.price===0?'나눔':it.price!=null?it.price.toLocaleString()+'원':'';
  const ago=it.sortTime?(it.isBoosted?'끌올 ':'')+fmtAgo((Date.now()-it.sortTime)/1000):'';
  return `<a class="card ${it.status==='sold'?'sold':''}" href="${it.url}" target="_blank" rel="noopener">
    ${it.thumb?`<img class="thumb" src="${it.thumb}" loading="lazy" alt="">`:'<div class="thumb"></div>'}
    <div class="info">
      <div class="title">${esc(it.title)}</div>
      <div class="price">${price}</div>
      <div class="meta">${st}<span>${esc(it.gu||guName(it.region))}${it.dong?' · '+esc(it.dong):''}</span>${ago?`<span class="ago">${ago}</span>`:''}</div>
    </div></a>`;
}

function groupCard(it){
  const mem=it.members!=null?`멤버 ${it.members.toLocaleString()}명`:'';
  return `<a class="card" href="${it.url}" target="_blank" rel="noopener">
    ${it.thumb?`<img class="thumb" src="${it.thumb}" loading="lazy" alt="">`:'<div class="thumb"></div>'}
    <div class="info">
      <div class="title">${esc(it.title)}</div>
      ${it.desc?`<div class="meta" style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(it.desc)}</div>`:''}
      <div class="meta"><span>${esc(it.place||it.gu||guName(it.region))}</span>${mem?`<span class="members">${mem}</span>`:''}</div>
    </div></a>`;
}


function commCard(it){
  const ago=it.sortTime?fmtAgo((Date.now()-it.sortTime)/1000):'';
  return `<a class="card" href="${it.url}" target="_blank" rel="noopener">
    ${it.thumb?`<img class="thumb" src="${it.thumb}" loading="lazy" alt="">`:''}
    <div class="info">
      <div class="title">${esc(it.title)}</div>
      ${it.desc?`<div class="meta" style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(it.desc)}</div>`:''}
      <div class="meta"><span>${esc(it.gu||guName(it.region))}</span>${it.author?`<span>${esc(it.author)}</span>`:''}${ago?`<span class="ago">${ago}</span>`:''}</div>
    </div></a>`;
}

function fmtAgo(s){
  if(s<60) return '방금 전';
  if(s<3600) return Math.floor(s/60)+'분 전';
  if(s<86400) return Math.floor(s/3600)+'시간 전';
  if(s<2592000) return Math.floor(s/86400)+'일 전';
  if(s<31536000) return Math.floor(s/2592000)+'개월 전';
  return Math.floor(s/31536000)+'년 전';
}
function setStatus(html,isErr){ $('statusBox').innerHTML=html?(isErr?`<span class="err">${html}</span>`:html):''; }

updateRegionChip();
updateExcChip();
toggleClear();
if(regionsData.list.length) renderSheet();
loadRegions();
</script>
